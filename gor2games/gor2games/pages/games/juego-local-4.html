<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Shooter</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0a0a0a;color:#f0f0f0;font-family:'Courier New',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;}
  h1{font-size:20px;letter-spacing:4px;color:#39ff14;text-shadow:0 0 12px rgba(57,255,20,0.8);margin-bottom:6px;}
  #info{display:flex;gap:24px;margin-bottom:10px;font-size:14px;color:#888;}
  #info span{color:#39ff14;font-weight:700;}
  canvas{border:1px solid rgba(57,255,20,0.2);display:block;box-shadow:0 0 20px rgba(57,255,20,0.15);}
  #msg{margin-top:10px;font-size:15px;color:#ffe600;letter-spacing:2px;min-height:20px;text-align:center;}
  .btn{margin-top:10px;background:linear-gradient(135deg,#39ff14,#00aa00);border:none;color:#000;font-family:'Courier New',monospace;font-size:13px;font-weight:700;padding:9px 22px;border-radius:8px;cursor:pointer;letter-spacing:2px;}
  #ctrl{margin-top:10px;font-size:12px;color:#444;}
</style>
</head>
<body>
<h1>🚀 SPACE SHOOTER</h1>
<div id="info">PUNTAJE: <span id="score">0</span> &nbsp;|&nbsp; VIDAS: <span id="lives">3</span> &nbsp;|&nbsp; OLEADA: <span id="wave">1</span></div>
<canvas id="c" width="480" height="380"></canvas>
<div id="msg">ESPACIO = disparar · Flechas/WASD = mover</div>
<button class="btn" id="btn-r" style="display:none" onclick="init()">▶ REINICIAR</button>
<div id="ctrl">Mobile: toca izq/der para mover, toca centro para disparar</div>

<script>
const C=document.getElementById("c"),ctx=C.getContext("2d");
const W=C.width,H=C.height;
let player,bullets,enemies,particles,score,lives,wave,loop,stars,dead;
const keys={};

function init(){
  score=0;lives=3;wave=1;dead=false;
  document.getElementById("score").textContent=0;
  document.getElementById("lives").textContent=3;
  document.getElementById("wave").textContent=1;
  document.getElementById("msg").textContent="";
  document.getElementById("btn-r").style.display="none";
  player={x:W/2,y:H-50,w:28,h:20,speed:4,shootCD:0};
  bullets=[];enemies=[];particles=[];
  stars=Array.from({length:80},()=>({x:Math.random()*W,y:Math.random()*H,s:Math.random()*1.5+0.5,sp:Math.random()*0.5+0.3}));
  spawnWave();
  clearInterval(loop);
  loop=setInterval(step,16);
}

function spawnWave(){
  const rows=Math.min(2+wave,5),cols=Math.min(4+wave*2,10);
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    enemies.push({x:40+c*(W-80)/Math.max(cols-1,1),y:30+r*36,w:22,h:14,hp:1,dir:1,t:Math.random()*Math.PI*2,shoot:Math.random()*200});
  }
}

function step(){
  // Player move
  if(keys["ArrowLeft"]||keys["a"]) player.x=Math.max(player.w/2,player.x-player.speed);
  if(keys["ArrowRight"]||keys["d"]) player.x=Math.min(W-player.w/2,player.x+player.speed);
  if((keys[" "]||keys["ArrowUp"]||keys["w"])&&player.shootCD<=0){
    bullets.push({x:player.x,y:player.y-14,r:4,vy:-8,owner:"p"});
    player.shootCD=15;
  }
  if(player.shootCD>0) player.shootCD--;

  // Enemies move & shoot
  enemies.forEach(e=>{
    e.x+=e.dir*(0.8+wave*0.15);
    e.y+=Math.sin(e.t)*0.4; e.t+=0.04;
    if(e.x>W-20||e.x<20){e.dir*=-1;e.y+=10;}
    e.shoot--;
    if(e.shoot<=0){bullets.push({x:e.x,y:e.y+8,r:3,vy:3+wave*0.3,owner:"e"});e.shoot=120+Math.random()*80-wave*8;}
  });

  // Bullets move
  bullets.forEach(b=>b.y+=b.vy);
  bullets=bullets.filter(b=>b.y>0&&b.y<H);

  // Collisions player bullets vs enemies
  bullets.filter(b=>b.owner==="p").forEach(b=>{
    enemies.forEach(e=>{
      if(Math.abs(b.x-e.x)<e.w/2+b.r&&Math.abs(b.y-e.y)<e.h/2+b.r){
        e.hp--; b.y=-99;
        spawnParticles(e.x,e.y,"#ff6600");
        if(e.hp<=0){score+=10;document.getElementById("score").textContent=score;}
      }
    });
    enemies=enemies.filter(e=>e.hp>0);
  });

  // Enemy bullets vs player
  bullets.filter(b=>b.owner==="e").forEach(b=>{
    if(Math.abs(b.x-player.x)<player.w/2+b.r&&Math.abs(b.y-player.y)<player.h/2+b.r){
      lives--;b.y=-99;spawnParticles(player.x,player.y,"#00aaff");
      document.getElementById("lives").textContent=lives;
      if(lives<=0){gameOver();return;}
    }
  });

  // Next wave
  if(enemies.length===0){wave++;document.getElementById("wave").textContent=wave;spawnWave();}

  // Particles
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;});
  particles=particles.filter(p=>p.life>0);

  // Stars scroll
  stars.forEach(s=>{s.y+=s.sp;if(s.y>H)s.y=0;});

  draw();
}

function spawnParticles(x,y,color){
  for(let i=0;i<8;i++) particles.push({x,y,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:20,color});
}

function draw(){
  ctx.fillStyle="#050508";ctx.fillRect(0,0,W,H);
  // Stars
  stars.forEach(s=>{ctx.fillStyle=`rgba(255,255,255,${s.s/2})`;ctx.fillRect(s.x,s.y,s.s,s.s);});
  // Particles
  particles.forEach(p=>{ctx.fillStyle=p.color;ctx.globalAlpha=p.life/20;ctx.fillRect(p.x-2,p.y-2,4,4);});
  ctx.globalAlpha=1;
  // Enemies
  enemies.forEach(e=>{
    ctx.fillStyle="#ff0055";ctx.shadowColor="#ff0055";ctx.shadowBlur=8;
    ctx.beginPath();ctx.moveTo(e.x,e.y-e.h/2);ctx.lineTo(e.x-e.w/2,e.y+e.h/2);ctx.lineTo(e.x+e.w/2,e.y+e.h/2);ctx.closePath();ctx.fill();
    ctx.shadowBlur=0;
  });
  // Player
  ctx.fillStyle="#39ff14";ctx.shadowColor="#39ff14";ctx.shadowBlur=10;
  ctx.beginPath();ctx.moveTo(player.x,player.y-player.h/2);ctx.lineTo(player.x-player.w/2,player.y+player.h/2);ctx.lineTo(player.x+player.w/2,player.y+player.h/2);ctx.closePath();ctx.fill();
  ctx.shadowBlur=0;
  // Bullets
  bullets.forEach(b=>{
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fillStyle=b.owner==="p"?"#ffe600":"#ff3366";
    ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=8;ctx.fill();ctx.shadowBlur=0;
  });
}

function gameOver(){
  dead=true;clearInterval(loop);
  document.getElementById("msg").textContent=`GAME OVER — ${score} pts`;
  document.getElementById("btn-r").style.display="inline-block";
  ctx.fillStyle="rgba(0,0,0,0.7)";ctx.fillRect(0,0,W,H);
  ctx.font="bold 26px 'Courier New'";ctx.fillStyle="#39ff14";ctx.textAlign="center";
  ctx.shadowColor="#39ff14";ctx.shadowBlur=16;ctx.fillText("GAME OVER",W/2,H/2);
  ctx.font="16px 'Courier New'";ctx.fillStyle="#ffe600";ctx.shadowBlur=0;ctx.fillText(`Puntaje: ${score}`,W/2,H/2+30);
}

document.addEventListener("keydown",e=>{keys[e.key]=true;if(e.key===" ")e.preventDefault();});
document.addEventListener("keyup",e=>{keys[e.key]=false;});

// Touch mobile
let touchX=null;
C.addEventListener("touchstart",e=>{touchX=e.touches[0].clientX;},{passive:true});
C.addEventListener("touchmove",e=>{
  if(!touchX)return;
  const dx=e.touches[0].clientX-touchX;
  player.x=Math.max(player.w/2,Math.min(W-player.w/2,player.x+dx*0.5));
  touchX=e.touches[0].clientX;
},{passive:true});
C.addEventListener("touchend",()=>{
  bullets.push({x:player.x,y:player.y-14,r:4,vy:-8,owner:"p"});
},{passive:true});

init();
</script>
</body>
</html>
