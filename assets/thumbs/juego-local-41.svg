<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="felt" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1a7a3a"/>
      <stop offset="100%" stop-color="#0a3a1a"/>
    </radialGradient>
    <radialGradient id="ball8" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="60%" stop-color="#111"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <radialGradient id="cue" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#c8c8c8"/>
    </radialGradient>
  </defs>
  <!-- Frame -->
  <rect x="0" y="0" width="200" height="150" fill="#3d1d0f"/>
  <!-- Felt -->
  <rect x="12" y="12" width="176" height="126" rx="6" fill="url(#felt)"/>
  <!-- Pockets -->
  <circle cx="12" cy="12" r="6" fill="#000"/>
  <circle cx="188" cy="12" r="6" fill="#000"/>
  <circle cx="12" cy="138" r="6" fill="#000"/>
  <circle cx="188" cy="138" r="6" fill="#000"/>
  <circle cx="100" cy="9" r="5" fill="#000"/>
  <circle cx="100" cy="141" r="5" fill="#000"/>
  <!-- Balls -->
  <circle cx="50" cy="75" r="8" fill="url(#cue)"/>
  <circle cx="130" cy="60" r="8" fill="url(#ball8)"/>
  <text x="130" y="64" font-family="Arial" font-size="10" font-weight="bold" fill="#fff" text-anchor="middle">8</text>
  <circle cx="150" cy="85" r="8" fill="#ff3344"/>
  <text x="150" y="89" font-family="Arial" font-size="9" font-weight="bold" fill="#fff" text-anchor="middle">3</text>
  <circle cx="115" cy="95" r="8" fill="#ffcc33"/>
  <text x="115" y="99" font-family="Arial" font-size="9" font-weight="bold" fill="#000" text-anchor="middle">1</text>
  <!-- Cue aiming line -->
  <line x1="20" y1="100" x2="50" y2="75" stroke="#d9b27a" stroke-width="2"/>
  <!-- Online badge -->
  <rect x="145" y="18" width="40" height="14" rx="7" fill="#3dd4f5"/>
  <text x="165" y="29" font-family="Arial" font-size="8" font-weight="bold" fill="#000" text-anchor="middle">ONLINE</text>
</svg>
