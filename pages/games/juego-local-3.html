<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Match</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0a0a0a;color:#f0f0f0;font-family:'Courier New',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:12px;}
  h1{font-size:20px;letter-spacing:4px;color:#a855f7;text-shadow:0 0 12px rgba(168,85,247,0.8);}
  #info{display:flex;gap:24px;font-size:14px;color:#888;}
  #info span{color:#ffe600;font-weight:700;}
  #grid{display:grid;grid-template-columns:repeat(4,80px);gap:10px;}
  .carta{width:80px;height:80px;border-radius:10px;cursor:pointer;font-size:32px;display:flex;align-items:center;justify-content:center;transition:transform 0.3s ease;background:#1a1a1a;border:2px solid rgba(168,85,247,0.2);user-select:none;}
  .carta.volteada,.carta.encontrada{background:#1a0030;border-color:#a855f7;box-shadow:0 0 12px rgba(168,85,247,0.5);}
  .carta.encontrada{opacity:0.6;cursor:default;pointer-events:none;}
  .carta.oculta{font-size:0;}
  #msg{font-size:15px;color:#ffe600;letter-spacing:2px;min-height:20px;text-align:center;}
  .btn{background:linear-gradient(135deg,#a855f7,#6d28d9);border:none;color:white;font-family:'Courier New',monospace;font-size:13px;font-weight:700;padding:9px 22px;border-radius:8px;cursor:pointer;letter-spacing:2px;}
</style>
</head>
<body>
<h1>🃏 MEMORY MATCH</h1>
<div id="info">INTENTOS: <span id="tries">0</span> &nbsp;|&nbsp; PARES: <span id="pairs">0</span>/8 &nbsp;|&nbsp; TIEMPO: <span id="timer">0s</span></div>
<div id="grid"></div>
<div id="msg">Encontrá todos los pares</div>
<button class="btn" onclick="init()">🔄 NUEVA PARTIDA</button>

<script>
const EMOJIS=["🎮","🕹️","👾","🚀","🎯","🔥","⚡","💎"];
let cartas=[],voltcadas=[],encontradas=0,intentos=0,bloqueado=false,tInicio=null,tLoop;

function init(){
  cartas=[]; voltcadas=[]; encontradas=0; intentos=0; bloqueado=false;
  clearInterval(tLoop); tInicio=null;
  document.getElementById("tries").textContent=0;
  document.getElementById("pairs").textContent=0;
  document.getElementById("timer").textContent="0s";
  document.getElementById("msg").textContent="Encontrá todos los pares";
  const vals=[...EMOJIS,...EMOJIS].sort(()=>Math.random()-0.5);
  const grid=document.getElementById("grid");
  grid.innerHTML="";
  vals.forEach((v,i)=>{
    const d=document.createElement("div");
    d.className="carta oculta";
    d.dataset.val=v;
    d.dataset.idx=i;
    d.addEventListener("click",()=>voltear(d));
    grid.appendChild(d);
    cartas.push(d);
  });
}

function voltear(d){
  if(bloqueado||d.classList.contains("volteada")||d.classList.contains("encontrada"))return;
  if(!tInicio){tInicio=Date.now();tLoop=setInterval(()=>{document.getElementById("timer").textContent=Math.floor((Date.now()-tInicio)/1000)+"s";},500);}
  d.classList.remove("oculta");
  d.classList.add("volteada");
  d.textContent=d.dataset.val;
  voltcadas.push(d);
  if(voltcadas.length===2){
    bloqueado=true; intentos++;
    document.getElementById("tries").textContent=intentos;
    setTimeout(()=>verificar(),600);
  }
}

function verificar(){
  const [a,b]=voltcadas;
  if(a.dataset.val===b.dataset.val){
    a.classList.add("encontrada"); b.classList.add("encontrada");
    encontradas++;
    document.getElementById("pairs").textContent=encontradas;
    if(encontradas===EMOJIS.length){clearInterval(tLoop);document.getElementById("msg").textContent=`🏆 COMPLETADO en ${intentos} intentos!`;}
  } else {
    a.classList.remove("volteada"); a.classList.add("oculta"); a.textContent="";
    b.classList.remove("volteada"); b.classList.add("oculta"); b.textContent="";
  }
  voltcadas=[]; bloqueado=false;
}

init();

// Escuchar teclado desde página padre (fix foco iframe)
window.addEventListener("message", e => {
  if(!e.data || e.data.type !== "keydown") return;
  document.dispatchEvent(new KeyboardEvent("keydown", {key: e.data.key, code: e.data.code, bubbles: true}));
});
</script>
</body>
</html>
