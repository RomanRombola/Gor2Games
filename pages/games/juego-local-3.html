<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Match</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0a0a0a;color:#f0f0f0;font-family:'Courier New',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:10px;padding:12px;}
  h1{font-size:18px;letter-spacing:4px;color:#a855f7;text-shadow:0 0 12px rgba(168,85,247,0.8);}
  #diff-row{display:flex;gap:6px;margin-bottom:2px;}
  .dif-btn{background:rgba(168,85,247,0.08);border:1px solid rgba(168,85,247,0.22);color:#a855f7;font-family:'Courier New',monospace;font-size:11px;font-weight:700;padding:5px 13px;border-radius:6px;cursor:pointer;transition:all .15s;letter-spacing:1px;}
  .dif-btn.active,.dif-btn:hover{background:rgba(168,85,247,0.2);border-color:rgba(168,85,247,0.5);}
  #info{display:flex;gap:16px;font-size:13px;color:#888;flex-wrap:wrap;justify-content:center;}
  #info b{color:#ffe600;font-weight:700;}
  #grid{display:grid;gap:8px;perspective:800px;}
  .carta{border-radius:10px;cursor:pointer;font-size:30px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a0030,#2a0040);border:2px solid rgba(168,85,247,0.25);user-select:none;position:relative;transition:transform .35s ease,box-shadow .3s;will-change:transform;transform-style:preserve-3d;}
  .carta .face{opacity:0;transition:opacity .15s .18s;}
  .carta.volteada,.carta.encontrada{transform:rotateY(180deg);background:#1a0030;border-color:#a855f7;box-shadow:0 0 14px rgba(168,85,247,0.5);}
  .carta.volteada .face,.carta.encontrada .face{opacity:1;transform:rotateY(180deg);}
  .carta.encontrada{opacity:0.6;cursor:default;pointer-events:none;animation:matchPulse .5s ease;}
  @keyframes matchPulse{0%{box-shadow:0 0 14px rgba(168,85,247,0.5);}50%{box-shadow:0 0 28px rgba(57,255,20,0.9);}100%{box-shadow:0 0 14px rgba(168,85,247,0.5);}}
  #msg{font-size:14px;color:#ffe600;letter-spacing:1px;min-height:20px;text-align:center;font-weight:700;}
  #combo-msg{font-size:12px;color:#39ff14;height:16px;font-weight:700;letter-spacing:1px;}
  .btn{background:linear-gradient(135deg,#a855f7,#6d28d9);border:none;color:white;font-family:'Courier New',monospace;font-size:12px;font-weight:700;padding:9px 22px;border-radius:8px;cursor:pointer;letter-spacing:2px;transition:transform .1s;}
  .btn:hover{transform:translateY(-1px);}
</style>
</head>
<body>
<h1>🃏 MEMORY MATCH</h1>
<div id="diff-row">
  <button class="dif-btn active" onclick="setDiff('easy',this)">FÁCIL 3×4</button>
  <button class="dif-btn" onclick="setDiff('medium',this)">MEDIO 4×4</button>
  <button class="dif-btn" onclick="setDiff('hard',this)">DIFÍCIL 4×6</button>
</div>
<div id="info">INTENTOS: <b id="tries">0</b> · PARES: <b id="pairs">0</b>/<b id="total">6</b> · TIEMPO: <b id="timer">0s</b> · MEJOR: <b id="best">—</b></div>
<div id="grid"></div>
<div id="combo-msg"></div>
<div id="msg">Encontrá todos los pares</div>
<button class="btn" onclick="init()">🔄 NUEVA PARTIDA</button>

<script>
const EMOJI_POOL=["🎮","🕹️","👾","🚀","🎯","🔥","⚡","💎","🎲","🏆","🧩","🎨","🎭","🌟","💀","🦄"];
const DIFFS={
  easy:  {cols:3,rows:4,pairs:6, size:80},
  medium:{cols:4,rows:4,pairs:8, size:76},
  hard:  {cols:4,rows:6,pairs:12,size:62},
};
let diff='easy',cartas=[],voltcadas=[],encontradas=0,intentos=0,bloqueado=false,tInicio=null,tLoop,combo=0,bests={};
try{bests=JSON.parse(localStorage.getItem('mm_bests')||'{}');}catch(e){}

function tono(freq,dur=140,type='sine'){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(0.15,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur/1000);
    o.connect(g);g.connect(ctx.destination);
    o.start();o.stop(ctx.currentTime+dur/1000);
  }catch(e){}
}

function setDiff(d,btn){
  diff=d;
  document.querySelectorAll('.dif-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  init();
}

function init(){
  const cfg=DIFFS[diff];
  cartas=[];voltcadas=[];encontradas=0;intentos=0;bloqueado=false;combo=0;
  clearInterval(tLoop);tInicio=null;
  document.getElementById('tries').textContent=0;
  document.getElementById('pairs').textContent=0;
  document.getElementById('total').textContent=cfg.pairs;
  document.getElementById('timer').textContent='0s';
  document.getElementById('best').textContent=bests[diff]?bests[diff]+'s':'—';
  document.getElementById('msg').textContent='Encontrá todos los pares';
  document.getElementById('msg').style.color='#ffe600';
  document.getElementById('combo-msg').textContent='';
  const emojis=EMOJI_POOL.slice(0,cfg.pairs);
  const vals=[...emojis,...emojis].sort(()=>Math.random()-0.5);
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  grid.style.gridTemplateColumns=`repeat(${cfg.cols},${cfg.size}px)`;
  vals.forEach((v,i)=>{
    const d=document.createElement('div');
    d.className='carta';
    d.style.width=cfg.size+'px';
    d.style.height=cfg.size+'px';
    d.dataset.val=v;
    const face=document.createElement('div');
    face.className='face';
    face.textContent=v;
    d.appendChild(face);
    d.addEventListener('click',()=>voltear(d));
    grid.appendChild(d);
    cartas.push(d);
  });
}

function voltear(d){
  if(bloqueado||d.classList.contains('volteada')||d.classList.contains('encontrada'))return;
  if(!tInicio){tInicio=Date.now();tLoop=setInterval(()=>{document.getElementById('timer').textContent=Math.floor((Date.now()-tInicio)/1000)+'s';},500);}
  d.classList.add('volteada');
  tono(440+voltcadas.length*80,120);
  voltcadas.push(d);
  if(voltcadas.length===2){
    bloqueado=true;intentos++;
    document.getElementById('tries').textContent=intentos;
    setTimeout(verificar,550);
  }
}

function verificar(){
  const [a,b]=voltcadas;
  if(a.dataset.val===b.dataset.val){
    a.classList.add('encontrada');b.classList.add('encontrada');
    encontradas++;combo++;
    document.getElementById('pairs').textContent=encontradas;
    tono(660,180,'triangle');setTimeout(()=>tono(880,220,'triangle'),80);
    if(combo>=2)document.getElementById('combo-msg').textContent=`🔥 COMBO ×${combo}`;
    const cfg=DIFFS[diff];
    if(encontradas===cfg.pairs){
      clearInterval(tLoop);
      const t=Math.floor((Date.now()-tInicio)/1000);
      const prev=bests[diff];
      if(!prev||t<prev){bests[diff]=t;try{localStorage.setItem('mm_bests',JSON.stringify(bests));}catch(e){}document.getElementById('best').textContent=t+'s';document.getElementById('msg').textContent=`🏆 ¡NUEVO RÉCORD! ${t}s · ${intentos} intentos`;}
      else document.getElementById('msg').textContent=`🏆 COMPLETADO en ${intentos} intentos · ${t}s`;
      document.getElementById('msg').style.color='#39ff14';
      [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tono(f,200,'triangle'),i*100));
    }
  } else {
    combo=0;document.getElementById('combo-msg').textContent='';
    a.classList.remove('volteada');
    b.classList.remove('volteada');
    tono(200,100,'sawtooth');
  }
  voltcadas=[];bloqueado=false;
}

init();

window.addEventListener('message',e=>{
  if(!e.data||e.data.type!=='keydown')return;
  document.dispatchEvent(new KeyboardEvent('keydown',{key:e.data.key,code:e.data.code,bubbles:true}));
});
</script>
</body>
</html>
