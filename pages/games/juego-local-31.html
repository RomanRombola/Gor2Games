<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Maze Runner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a15;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:'Courier New',monospace;}
h1{color:#00aaff;font-size:14px;letter-spacing:3px;margin-bottom:5px;}
#hud{display:flex;gap:16px;margin-bottom:5px;font-size:12px;color:#aaa;flex-wrap:wrap;justify-content:center;}
#hud b{color:#00aaff;}
canvas{border:2px solid rgba(0,170,255,0.2);border-radius:6px;}
#ctrl{margin-top:6px;font-size:10px;color:#444;letter-spacing:1px;text-align:center;}
</style>
</head>
<body>
<h1>🌀 MAZE RUNNER</h1>
<div id="hud"><span>NIVEL <b id="nlv">1</b></span><span>⏱ <b id="tm">0</b>s</span><span>PASOS <b id="steps">0</b></span><span>MEJOR <b id="best">—</b></span></div>
<canvas id="c" width="420" height="420"></canvas>
<div id="ctrl">WASD o FLECHAS · Llegá a ★ · H = pista (1 seg)</div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const W=420,H=420;
let COLS=10,ROWS=10,CS;
let cells,player,goal,timerInt,elapsed=0,level=1,bests={},state='play',keys={},loop,steps=0,trail=[],hintPath=null,hintUntil=0,particles=[];
try{bests=JSON.parse(localStorage.getItem('maze_bests')||'{}');}catch(e){}

function genMaze(cols,rows){
  const maze=Array.from({length:rows},()=>Array.from({length:cols},()=>({visited:false,walls:{N:true,S:true,E:true,W:true}})));
  const stack=[[0,0]];
  maze[0][0].visited=true;
  while(stack.length){
    const [r,c]=stack[stack.length-1];
    const dirs=[[-1,0,'S','N'],[1,0,'N','S'],[0,1,'W','E'],[0,-1,'E','W']];
    for(let i=dirs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[dirs[i],dirs[j]]=[dirs[j],dirs[i]];}
    let moved=false;
    for(const [dr,dc,opp,dir] of dirs){
      const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&!maze[nr][nc].visited){
        maze[r][c].walls[dir]=false;
        maze[nr][nc].walls[opp]=false;
        maze[nr][nc].visited=true;
        stack.push([nr,nc]);
        moved=true;break;
      }
    }
    if(!moved)stack.pop();
  }
  return maze;
}

function shortestPath(startR,startC,endR,endC){
  const prev={};
  const key=(r,c)=>r+','+c;
  const q=[[startR,startC]];
  const visited={[key(startR,startC)]:true};
  while(q.length){
    const [r,c]=q.shift();
    if(r===endR&&c===endC)break;
    const cell=cells[r][c];
    const dirs=[[-1,0,'N'],[1,0,'S'],[0,1,'E'],[0,-1,'W']];
    for(const [dr,dc,d] of dirs){
      const nr=r+dr,nc=c+dc;
      if(nr<0||nr>=ROWS||nc<0||nc>=COLS)continue;
      if(cell.walls[d])continue;
      const k=key(nr,nc);
      if(visited[k])continue;
      visited[k]=true;prev[k]=[r,c];
      q.push([nr,nc]);
    }
  }
  const path=[];
  let cur=[endR,endC];
  while(cur&&(cur[0]!==startR||cur[1]!==startC)){
    path.push(cur);
    cur=prev[key(cur[0],cur[1])];
  }
  return path;
}

function init(){
  COLS=10+level*2;ROWS=10+level*2;
  CS=Math.min(Math.floor(W/COLS),Math.floor(H/ROWS));
  const offX=Math.floor((W-COLS*CS)/2),offY=Math.floor((H-ROWS*CS)/2);
  cells=genMaze(COLS,ROWS);
  player={r:0,c:0,offX,offY};
  goal={r:ROWS-1,c:COLS-1};
  clearInterval(timerInt);elapsed=0;state='play';steps=0;trail=[[0,0]];particles=[];hintPath=null;
  document.getElementById('nlv').textContent=level;
  document.getElementById('tm').textContent='0';
  document.getElementById('steps').textContent='0';
  const k=`${COLS}x${ROWS}`;
  document.getElementById('best').textContent=bests[k]?bests[k]+'s':'—';
  timerInt=setInterval(()=>{elapsed++;document.getElementById('tm').textContent=elapsed;},1000);
  if(loop)cancelAnimationFrame(loop);
  tick();
}

function movePlayer(dr,dc){
  if(state!=='play')return;
  const{r,c}=player;
  const cell=cells[r][c];
  const dir=dr===-1?'N':dr===1?'S':dc===1?'E':'W';
  if(!cell.walls[dir]){
    player.r+=dr;player.c+=dc;steps++;
    document.getElementById('steps').textContent=steps;
    trail.push([player.r,player.c]);
    if(trail.length>200)trail.shift();
    if(player.r===goal.r&&player.c===goal.c){
      clearInterval(timerInt);state='win';
      const k=`${COLS}x${ROWS}`;
      if(!bests[k]||elapsed<bests[k]){bests[k]=elapsed;try{localStorage.setItem('maze_bests',JSON.stringify(bests));}catch(e){}document.getElementById('best').textContent=elapsed+'s';}
      const gx=player.offX+goal.c*CS+CS/2,gy=player.offY+goal.r*CS+CS/2;
      for(let i=0;i<30;i++)particles.push({x:gx,y:gy,vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8-2,life:1,color:['#ffe600','#39ff14','#00aaff'][i%3]});
    }
  }
}

function showHint(){
  if(state!=='play')return;
  hintPath=shortestPath(player.r,player.c,goal.r,goal.c);
  hintUntil=Date.now()+1000;
}

let prevKeys={};
function tick(){
  if(state==='play'){
    const mapping=[['ArrowUp','w','W',-1,0],['ArrowDown','s','S',1,0],['ArrowLeft','a','A',0,-1],['ArrowRight','d','D',0,1]];
    mapping.forEach(group=>{
      const dr=group[group.length-2],dc=group[group.length-1];
      const ks=group.slice(0,-2);
      if(ks.some(k=>keys[k]&&!prevKeys[k]))movePlayer(dr,dc);
    });
  }
  prevKeys={...keys};
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.3;p.life-=0.02;});
  particles=particles.filter(p=>p.life>0);
  draw();loop=requestAnimationFrame(tick);
}

function draw(){
  ctx.fillStyle='#07070f';ctx.fillRect(0,0,W,H);
  if(!cells)return;
  const{offX,offY}=player;
  if(trail.length>1){
    for(let i=0;i<trail.length-1;i++){
      const a=trail[i];
      const alpha=(i/trail.length)*0.3;
      ctx.fillStyle=`rgba(0,170,255,${alpha})`;
      ctx.fillRect(offX+a[1]*CS+CS*0.35,offY+a[0]*CS+CS*0.35,CS*0.3,CS*0.3);
    }
  }
  if(hintPath&&Date.now()<hintUntil){
    const alpha=(hintUntil-Date.now())/1000;
    hintPath.forEach(([r,c])=>{
      ctx.fillStyle=`rgba(255,230,0,${alpha*0.4})`;
      ctx.fillRect(offX+c*CS+2,offY+r*CS+2,CS-4,CS-4);
    });
  } else hintPath=null;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const x=offX+c*CS,y=offY+r*CS;
    const cell=cells[r][c];
    ctx.strokeStyle='rgba(0,170,255,0.5)';ctx.lineWidth=1.5;
    if(cell.walls.N){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+CS,y);ctx.stroke();}
    if(cell.walls.S){ctx.beginPath();ctx.moveTo(x,y+CS);ctx.lineTo(x+CS,y+CS);ctx.stroke();}
    if(cell.walls.W){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+CS);ctx.stroke();}
    if(cell.walls.E){ctx.beginPath();ctx.moveTo(x+CS,y);ctx.lineTo(x+CS,y+CS);ctx.stroke();}
  }
  const gx=offX+goal.c*CS+CS/2,gy=offY+goal.r*CS+CS/2;
  ctx.shadowColor='#ffe600';ctx.shadowBlur=10+Math.sin(Date.now()/300)*4;
  ctx.fillStyle='#ffe600';ctx.font=`${CS*0.7}px serif`;ctx.textAlign='center';
  ctx.fillText('★',gx,gy+CS*0.25);ctx.shadowBlur=0;
  const px=offX+player.c*CS+CS/2,py=offY+player.r*CS+CS/2;
  ctx.shadowColor='#00aaff';ctx.shadowBlur=10;
  ctx.fillStyle='#00aaff';ctx.beginPath();ctx.arc(px,py,CS*0.35,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.fillRect(p.x-2,p.y-2,4,4);});
  ctx.globalAlpha=1;
  if(state==='win'){
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#39ff14';ctx.font='bold 22px Courier New';ctx.textAlign='center';
    ctx.fillText('¡SALIDA!',W/2,H/2-30);
    ctx.fillStyle='#00aaff';ctx.font='14px Courier New';
    ctx.fillText(`Nivel ${level} · ${elapsed}s · ${steps} pasos`,W/2,H/2-4);
    ctx.fillStyle='#aaa';ctx.font='12px Courier New';
    ctx.fillText('ESPACIO → siguiente nivel',W/2,H/2+22);
    ctx.fillText('R → reiniciar desde 1',W/2,H/2+40);
  }
}

document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();
  if(e.code==='Space'&&state==='win'){level++;init();}
  if((e.key==='r'||e.key==='R')&&state==='win'){level=1;init();}
  if(e.key==='h'||e.key==='H')showHint();
});
document.addEventListener('keyup',e=>keys[e.key]=false);
window.addEventListener('message',e=>{
  if(!e.data)return;
  if(e.data.type==='keydown'){keys[e.data.key]=true;if(e.data.key===' '&&state==='win'){level++;init();}if((e.data.key==='r'||e.data.key==='R')&&state==='win'){level=1;init();}if(e.data.key==='h'||e.data.key==='H')showHint();}
  if(e.data.type==='keyup')keys[e.data.key]=false;
});
init();
</script>
</body>
</html>
