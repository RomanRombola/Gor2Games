<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>15 Puzzle</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a15;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Courier New',monospace;color:#f0f0f0;padding:12px;}
h1{color:#a855f7;font-size:14px;letter-spacing:3px;margin-bottom:8px;}
#hud{display:flex;gap:18px;margin-bottom:10px;font-size:12px;color:#aaa;}
#hud b{color:#a855f7;}
#board{display:grid;gap:4px;margin-bottom:12px;}
.tile{border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;cursor:pointer;transition:all .15s;user-select:none;}
.tile.num{background:rgba(168,85,247,0.12);border:1px solid rgba(168,85,247,0.3);color:#c084fc;}
.tile.num:hover{background:rgba(168,85,247,0.22);transform:scale(1.04);}
.tile.num.correct{background:rgba(57,255,20,0.1);border-color:rgba(57,255,20,0.3);color:#86efac;}
.tile.empty{background:rgba(0,0,0,0.2);border:1px dashed rgba(255,255,255,0.06);}
#size-row{display:flex;gap:8px;margin-bottom:10px;}
.sz-btn{background:rgba(168,85,247,0.08);border:1px solid rgba(168,85,247,0.2);color:#a855f7;font-family:'Courier New',monospace;font-size:11px;font-weight:700;padding:5px 12px;border-radius:6px;cursor:pointer;transition:all .15s;letter-spacing:1px;}
.sz-btn.active,.sz-btn:hover{background:rgba(168,85,247,0.2);border-color:rgba(168,85,247,0.5);}
#msg{font-size:13px;font-weight:700;text-align:center;height:20px;color:#a855f7;margin-bottom:6px;}
.btn{background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.25);color:#c084fc;font-family:'Courier New',monospace;font-size:11px;font-weight:700;padding:8px 20px;border-radius:8px;cursor:pointer;letter-spacing:1px;transition:all .2s;}
.btn:hover{box-shadow:0 0 10px rgba(168,85,247,0.4);}
</style>
</head>
<body>
<h1>🔢 15 PUZZLE</h1>
<div id="size-row">
  <button class="sz-btn active" onclick="setSize(3,this)">3×3</button>
  <button class="sz-btn" onclick="setSize(4,this)">4×4</button>
  <button class="sz-btn" onclick="setSize(5,this)">5×5</button>
</div>
<div id="hud"><span>MOVES <b id="moves">0</b></span><span>⏱ <b id="time">0</b>s</span><span>MEJOR <b id="best">—</b></span></div>
<div id="msg">Ordená los números del 1 al N</div>
<div id="board"></div>
<button class="btn" onclick="newGame()">🔀 MEZCLAR</button>

<script>
let N=4,tiles=[],moves=0,timerInt,elapsed=0,started=false,bests={};

function setSize(n,btn){
  N=n;document.querySelectorAll('.sz-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  newGame();
}

function newGame(){
  clearInterval(timerInt);moves=0;elapsed=0;started=false;
  document.getElementById('moves').textContent=0;
  document.getElementById('time').textContent=0;
  document.getElementById('msg').textContent='Ordená los números del 1 al '+(N*N-1);
  tiles=Array.from({length:N*N},(_,i)=>i);
  // Mezclar garantizando solución
  let empty=N*N-1;
  for(let i=0;i<500;i++){
    const er=Math.floor(empty/N),ec=empty%N;
    const moves2=[];
    if(er>0)moves2.push(empty-N);if(er<N-1)moves2.push(empty+N);
    if(ec>0)moves2.push(empty-1);if(ec<N-1)moves2.push(empty+1);
    const swap=moves2[Math.floor(Math.random()*moves2.length)];
    [tiles[empty],tiles[swap]]=[tiles[swap],tiles[empty]];
    empty=swap;
  }
  render();
}

function render(){
  const board=document.getElementById('board');
  const TS=Math.min(64,Math.floor(260/N));
  board.style.gridTemplateColumns=`repeat(${N},${TS}px)`;
  board.innerHTML=tiles.map((v,i)=>{
    if(v===0)return`<div class="tile empty" style="width:${TS}px;height:${TS}px"></div>`;
    const correct=v===i+1;
    const fs=N>=5?14:N===4?18:24;
    return`<div class="tile num${correct?' correct':''}" style="width:${TS}px;height:${TS}px;font-size:${fs}px" onclick="clickTile(${i})">${v}</div>`;
  }).join('');
}

function clickTile(i){
  const empty=tiles.indexOf(0);
  const er=Math.floor(empty/N),ec=empty%N;
  const tr=Math.floor(i/N),tc=i%N;
  if(Math.abs(er-tr)+Math.abs(ec-tc)!==1)return;
  if(!started){started=true;timerInt=setInterval(()=>{elapsed++;document.getElementById('time').textContent=elapsed;},1000);}
  [tiles[empty],tiles[i]]=[tiles[i],tiles[empty]];
  moves++;document.getElementById('moves').textContent=moves;
  render();
  // Verificar victoria
  if(tiles.every((v,i)=>i===N*N-1?v===0:v===i+1)){
    clearInterval(timerInt);
    const key=`${N}x${N}`;
    if(!bests[key]||elapsed<bests[key]){bests[key]=elapsed;document.getElementById('best').textContent=elapsed+'s';}
    document.getElementById('msg').textContent=`🏆 ¡Resuelto! ${moves} movimientos · ${elapsed}s`;
  }
}

document.addEventListener('keydown',e=>{
  const empty=tiles.indexOf(0);
  const er=Math.floor(empty/N),ec=empty%N;
  const map={'ArrowUp':empty+N,'ArrowDown':empty-N,'ArrowLeft':empty+1,'ArrowRight':empty-1};
  if(map[e.key]!==undefined){e.preventDefault();const t=map[e.key];if(t>=0&&t<N*N){const tr=Math.floor(t/N),tc=t%N;if(Math.abs(er-tr)+Math.abs(ec-tc)===1)clickTile(t);}}
});
window.addEventListener('message',e=>{if(e.data?.type==='keydown'){const ev=new KeyboardEvent('keydown',{key:e.data.key});document.dispatchEvent(ev);}});

newGame();
</script>
</body>
</html>
