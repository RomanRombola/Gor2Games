<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Geometry Dash</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a15;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:'Courier New',monospace;}
h1{color:#ff6600;font-size:15px;letter-spacing:3px;margin-bottom:5px;}
#hud{display:flex;gap:20px;margin-bottom:5px;font-size:12px;color:#aaa;}
#hud b{color:#ff6600;}
canvas{border:2px solid rgba(255,102,0,0.3);border-radius:6px;display:block;}
#ctrl{margin-top:6px;font-size:10px;color:#444;letter-spacing:1px;}
</style>
</head>
<body>
<h1>▲ GEOMETRY DASH</h1>
<div id="hud"><span>INTENTO <b id="att">1</b></span><span>MEJOR <b id="best">0%</b></span></div>
<canvas id="c" width="480" height="280"></canvas>
<div id="ctrl">ESPACIO / TAP para saltar · Mantené para saltar más alto</div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const W=480,H=280,GROUND=H-50,SZ=28,GRAV=0.55,JUMP=-11.5;
const COLORS=['#ff6600','#00aaff','#39ff14','#a855f7','#ff3366','#ffe600'];
let player=null,obstacles=[],bgObjs=[],state,loop,frame,attempt,bestPct;
let holding=false,particles=[];

// Generar nivel procedural con patrón repetible
function genLevel(){
  const obs=[];
  const patterns=[
    // Un bloque
    (x)=>[{x,y:GROUND-SZ,w:SZ,h:SZ,t:'block'}],
    // Dos bloques
    (x)=>[{x,y:GROUND-SZ,w:SZ,h:SZ,t:'block'},{x:x+SZ*1.6,y:GROUND-SZ,w:SZ,h:SZ,t:'block'}],
    // Bloque alto
    (x)=>[{x,y:GROUND-SZ*2,w:SZ,h:SZ*2,t:'block'}],
    // Spike
    (x)=>[{x,y:GROUND-SZ*0.8,w:SZ,h:SZ*0.8,t:'spike'}],
    // Dos spikes
    (x)=>[{x,y:GROUND-SZ*0.8,w:SZ,h:SZ*0.8,t:'spike'},{x:x+SZ*1.4,y:GROUND-SZ*0.8,w:SZ,h:SZ*0.8,t:'spike'}],
    // Spike sobre bloque
    (x)=>[{x,y:GROUND-SZ,w:SZ,h:SZ,t:'block'},{x:x+4,y:GROUND-SZ*1.8,w:SZ-8,h:SZ*0.8,t:'spike'}],
  ];
  let px=W+100;
  const LEN=3000; // longitud del nivel
  while(px<LEN){
    const gap=100+Math.random()*180;
    px+=gap;
    const pat=patterns[Math.floor(Math.random()*patterns.length)];
    pat(px).forEach(o=>obs.push(o));
    px+=SZ*2.5;
  }
  // Bandera final
  obs.push({x:LEN+100,y:GROUND-80,w:10,h:80,t:'end'});
  return obs;
}

function init(){
  player={x:80,y:GROUND-SZ,vy:0,angle:0,onGround:true,color:COLORS[Math.floor(Math.random()*COLORS.length)]};
  obstacles=genLevel();
  bgObjs=[];for(let i=0;i<20;i++)bgObjs.push({x:Math.random()*W,y:Math.random()*GROUND*0.8,spd:1+Math.random()*2,size:1+Math.random()*2});
  state='wait';frame=0;particles=[];
  if(!attempt) attempt=1;
}

function restart(){attempt++;document.getElementById('att').textContent=attempt;init();state='play';tick();}

function pct(){
  if(!obstacles.length) return 0;
  const end=obstacles[obstacles.length-1].x;
  const camX=player.x-80;
  return Math.min(100,Math.floor(camX/end*100));
}

function tick(){
  if(state!=='play') return;
  frame++;
  // Movimiento automático
  player.x+=4.5;
  // Salto
  if(holding&&player.onGround) player.vy=JUMP;
  player.vy+=GRAV;
  player.y+=player.vy;
  player.angle+=0.08;
  // Suelo
  if(player.y>=GROUND-SZ){player.y=GROUND-SZ;player.vy=0;player.onGround=true;}
  else player.onGround=false;
  // Scroll
  const camX=player.x-80;
  // Colisiones
  for(const o of obstacles){
    const ox=o.x-camX,oy=o.y;
    if(o.t==='end'&&ox<120){state='win';draw();return;}
    if(ox+o.w<0||ox>W+SZ) continue;
    if(o.t==='spike'||o.t==='block'){
      const margin=o.t==='spike'?4:2;
      if(player.x+SZ-margin>ox+margin&&player.x+margin<ox+o.w-margin&&
         player.y+SZ-margin>oy+margin&&player.y+margin<oy+o.h-margin){
        const p=pct();if(p>bestPct){bestPct=p;document.getElementById('best').textContent=p+'%';}
        for(let i=0;i<16;i++) particles.push({x:player.x+SZ/2,y:player.y+SZ/2,vx:(Math.random()-0.5)*8,vy:-Math.random()*7-2,life:1,color:player.color});
        state='dead';draw();return;
      }
    }
  }
  // Bg objects scroll
  bgObjs.forEach(b=>{b.x-=b.spd;if(b.x<0)b.x=W;});
  // Partículas
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.3;p.life-=0.06;});
  particles=particles.filter(p=>p.life>0);
  draw();loop=requestAnimationFrame(tick);
}

function draw(){
  // Fondo gradiente
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#08081a');bg.addColorStop(1,'#0f0f25');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  const camX=player.x-80;
  // Estrellas bg
  bgObjs.forEach(b=>{
    ctx.fillStyle=`rgba(255,255,255,${0.1+b.size*0.05})`;
    ctx.fillRect(b.x,b.y,b.size,b.size);
  });
  // Suelo
  const floor=ctx.createLinearGradient(0,GROUND,0,H);
  floor.addColorStop(0,'#1a1a3a');floor.addColorStop(1,'#0a0a1f');
  ctx.fillStyle=floor;ctx.fillRect(0,GROUND,W,H-GROUND);
  ctx.strokeStyle='rgba(255,102,0,0.4)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,GROUND);ctx.lineTo(W,GROUND);ctx.stroke();
  // Obstáculos
  obstacles.forEach(o=>{
    const ox=o.x-camX;
    if(ox+o.w<-10||ox>W+10) return;
    if(o.t==='block'){
      const g=ctx.createLinearGradient(ox,o.y,ox+o.w,o.y+o.h);
      g.addColorStop(0,'#1a3050');g.addColorStop(1,'#0d1a30');
      ctx.fillStyle=g;ctx.fillRect(ox,o.y,o.w,o.h);
      ctx.strokeStyle='rgba(0,170,255,0.6)';ctx.lineWidth=1.5;ctx.strokeRect(ox,o.y,o.w,o.h);
      // Grid lines on block
      ctx.strokeStyle='rgba(0,170,255,0.15)';ctx.lineWidth=0.5;
      ctx.beginPath();ctx.moveTo(ox,o.y+o.h/2);ctx.lineTo(ox+o.w,o.y+o.h/2);ctx.stroke();
    } else if(o.t==='spike'){
      ctx.fillStyle='rgba(255,51,102,0.8)';ctx.strokeStyle='rgba(255,51,102,0.9)';ctx.lineWidth=1.5;
      ctx.shadowColor='#ff3366';ctx.shadowBlur=6;
      ctx.beginPath();ctx.moveTo(ox,o.y+o.h);ctx.lineTo(ox+o.w/2,o.y);ctx.lineTo(ox+o.w,o.y+o.h);ctx.closePath();ctx.fill();ctx.stroke();
      ctx.shadowBlur=0;
    } else if(o.t==='end'){
      ctx.strokeStyle='#ffe600';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(ox,o.y);ctx.lineTo(ox,o.y+o.h);ctx.stroke();
      ctx.fillStyle='#ffe600';ctx.beginPath();ctx.moveTo(ox,o.y);ctx.lineTo(ox+20,o.y+10);ctx.lineTo(ox,o.y+20);ctx.fill();
    }
  });
  // Partículas
  particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.fillRect(p.x-2,p.y-2,4,4);});
  ctx.globalAlpha=1;
  // Jugador (cuadrado rotante)
  if(state!=='dead'||(frame%6<4)){
    ctx.save();ctx.translate(player.x+SZ/2,player.y+SZ/2);ctx.rotate(player.angle);
    ctx.shadowColor=player.color;ctx.shadowBlur=10;
    ctx.fillStyle=player.color;
    ctx.fillRect(-SZ/2,-SZ/2,SZ,SZ);
    // Decoración interna
    ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(-SZ/4,-SZ/4);ctx.lineTo(SZ/4,SZ/4);ctx.moveTo(SZ/4,-SZ/4);ctx.lineTo(-SZ/4,SZ/4);ctx.stroke();
    ctx.shadowBlur=0;ctx.restore();
  }
  // Barra de progreso
  const p=pct();
  ctx.fillStyle='rgba(255,255,255,0.07)';ctx.fillRect(10,H-20,W-20,6);
  ctx.fillStyle=player.color;ctx.fillRect(10,H-20,(W-20)*(p/100),6);
  ctx.fillStyle='#aaa';ctx.font='9px Courier New';ctx.textAlign='right';
  ctx.fillText(p+'%',W-10,H-22);
  // Pantallas
  if(state==='wait'){
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ff6600';ctx.font='bold 20px Courier New';ctx.textAlign='center';
    ctx.fillText('GEOMETRY DASH',W/2,H/2-16);
    ctx.fillStyle='#aaa';ctx.font='12px Courier New';
    ctx.fillText('ESPACIO o TAP para empezar',W/2,H/2+12);
  }
  if(state==='dead'){
    ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ff3366';ctx.font='bold 20px Courier New';ctx.textAlign='center';
    ctx.fillText('CRASH!',W/2,H/2-20);
    ctx.fillStyle='#aaa';ctx.font='12px Courier New';
    ctx.fillText(`${p}% completado · Intento ${attempt}`,W/2,H/2+4);
    ctx.fillText('ESPACIO para reintentar',W/2,H/2+24);
  }
  if(state==='win'){
    ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ffe600';ctx.font='bold 22px Courier New';ctx.textAlign='center';
    ctx.fillText('¡COMPLETADO!',W/2,H/2-16);
    ctx.fillStyle='#39ff14';ctx.font='13px Courier New';
    ctx.fillText(`Intentos: ${attempt}`,W/2,H/2+12);
    ctx.fillStyle='#aaa';ctx.font='11px Courier New';
    ctx.fillText('ESPACIO para jugar de nuevo',W/2,H/2+32);
  }
}

document.addEventListener('keydown',e=>{
  if(e.code==='Space'){
    e.preventDefault();holding=true;
    if(state==='wait'){state='play';attempt=1;tick();}
    else if(state==='dead'||state==='win'){restart();}
    else if(state==='play'&&player.onGround){player.vy=JUMP;}
  }
});
document.addEventListener('keyup',e=>{if(e.code==='Space')holding=false;});
cv.addEventListener('touchstart',e=>{e.preventDefault();holding=true;
  if(state==='wait'){state='play';attempt=1;tick();}
  else if(state==='dead'||state==='win'){restart();}
  else if(state==='play'&&player.onGround){player.vy=JUMP;}
},{passive:false});
cv.addEventListener('touchend',e=>{e.preventDefault();holding=false;},{passive:false});
window.addEventListener('message',e=>{
  if(!e.data) return;
  if(e.data.type==='keydown'&&e.data.key===' '){
    holding=true;
    if(state==='wait'){state='play';attempt=1;tick();}
    else if(state==='dead'||state==='win')restart();
    else if(state==='play'&&player.onGround)player.vy=JUMP;
  }
  if(e.data.type==='keyup'&&e.data.key===' ')holding=false;
});
bestPct=0;attempt=0;init();draw();
</script>
</body>
</html>
