<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscaminas</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#080810;color:#f0f0f0;font-family:'Courier New',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:12px;}
h1{font-size:20px;letter-spacing:4px;color:#39ff14;text-shadow:0 0 12px rgba(57,255,20,0.6);}
#controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center;}
.diff-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#888;font-family:'Courier New',monospace;font-size:12px;padding:7px 14px;border-radius:6px;cursor:pointer;letter-spacing:1px;transition:all .2s;}
.diff-btn.active{background:rgba(57,255,20,0.15);border-color:rgba(57,255,20,0.5);color:#39ff14;}
#hud{display:flex;gap:24px;font-size:14px;}
.h-val{color:#39ff14;font-weight:900;font-size:18px;}
#board-wrap{border:1px solid rgba(57,255,20,0.2);border-radius:10px;padding:10px;background:#0a0a0a;box-shadow:0 0 20px rgba(57,255,20,0.1);}
#board{display:grid;gap:3px;}
.cell{width:30px;height:30px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;cursor:pointer;transition:background .15s;user-select:none;}
.cell-hidden{background:#1a2a1a;border:1px solid rgba(57,255,20,0.15);}
.cell-hidden:hover{background:#2a3a2a;border-color:rgba(57,255,20,0.4);}
.cell-flag{background:#1a2a1a;border:1px solid rgba(255,200,0,0.4);color:#ffe600;}
.cell-revealed{background:#0f1a0f;border:1px solid rgba(57,255,20,0.06);cursor:default;}
.cell-mine{background:#3a0a0a;border:1px solid rgba(255,50,50,0.5);}
.n1{color:#4488ff;}.n2{color:#44ff88;}.n3{color:#ff4444;}.n4{color:#8844ff;}.n5{color:#ff8844;}.n6{color:#44ffff;}.n7{color:#ff44ff;}.n8{color:#aaaaaa;}
#msg{font-size:14px;color:#ffe600;letter-spacing:2px;min-height:20px;text-align:center;}
.btn{background:linear-gradient(135deg,#39ff14,#00aa00);border:none;color:#000;font-family:'Courier New',monospace;font-size:12px;font-weight:700;padding:8px 20px;border-radius:8px;cursor:pointer;letter-spacing:2px;}
#hint{font-size:11px;color:#333;}
</style>
</head>
<body>
<h1>💣 BUSCAMINAS</h1>
<div id="controls">
  <button class="diff-btn active" onclick="setDiff(9,9,10,this)">FÁCIL 9×9</button>
  <button class="diff-btn" onclick="setDiff(16,16,40,this)">MEDIO 16×16</button>
  <button class="diff-btn" onclick="setDiff(16,30,99,this)">DIFÍCIL 30×16</button>
</div>
<div id="hud">💣 <span id="h-mines">10</span> &nbsp;·&nbsp; ⏱ <span id="h-time">0</span>s</div>
<div id="board-wrap"><div id="board"></div></div>
<div id="msg">Click=revelar · Click derecho=bandera</div>
<button class="btn" onclick="newGame()">🔄 NUEVA PARTIDA</button>
<div id="hint">Mobile: tap=revelar · tap largo=bandera</div>

<script>
let ROWS=9,COLS=9,MINES=10;
let board,revealed,flagged,firstClick,timer,elapsed,gameOver;

function setDiff(r,c,m,btn){
  ROWS=r;COLS=c;MINES=m;
  document.querySelectorAll(".diff-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  newGame();
}

function newGame(){
  board=Array.from({length:ROWS},()=>Array(COLS).fill(0));
  revealed=Array.from({length:ROWS},()=>Array(COLS).fill(false));
  flagged=Array.from({length:ROWS},()=>Array(COLS).fill(false));
  firstClick=true;gameOver=false;elapsed=0;
  clearInterval(timer);
  document.getElementById("h-mines").textContent=MINES;
  document.getElementById("h-time").textContent="0";
  document.getElementById("msg").textContent="Click=revelar · Click derecho=bandera";
  render();
}

function placeMines(sr,sc){
  let placed=0;
  while(placed<MINES){
    const r=Math.floor(Math.random()*ROWS),c=Math.floor(Math.random()*COLS);
    if(board[r][c]===-1||(Math.abs(r-sr)<=1&&Math.abs(c-sc)<=1))continue;
    board[r][c]=-1;placed++;
  }
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(board[r][c]===-1)continue;
    let n=0;
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
      const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&board[nr][nc]===-1)n++;
    }
    board[r][c]=n;
  }
}

function reveal(r,c){
  if(gameOver||revealed[r][c]||flagged[r][c])return;
  if(firstClick){firstClick=false;placeMines(r,c);startTimer();}
  revealed[r][c]=true;
  if(board[r][c]===-1){explode(r,c);return;}
  if(board[r][c]===0){
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
      const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&!revealed[nr][nc])reveal(nr,nc);
    }
  }
  checkWin();render();
}

function toggleFlag(r,c){
  if(gameOver||revealed[r][c])return;
  flagged[r][c]=!flagged[r][c];
  const cnt=flagged.flat().filter(Boolean).length;
  document.getElementById("h-mines").textContent=MINES-cnt;
  render();
}

function explode(r,c){
  gameOver=true;clearInterval(timer);
  board.forEach((row,rr)=>row.forEach((v,cc)=>{if(v===-1)revealed[rr][cc]=true;}));
  render();
  document.getElementById("msg").textContent=`💥 BOOM — ${elapsed}s de juego`;
}

function checkWin(){
  const total=ROWS*COLS,rev=revealed.flat().filter(Boolean).length;
  if(rev===total-MINES){gameOver=true;clearInterval(timer);document.getElementById("msg").textContent=`🏆 GANASTE en ${elapsed}s`;}
}

function startTimer(){
  clearInterval(timer);
  timer=setInterval(()=>{elapsed++;document.getElementById("h-time").textContent=elapsed;},1000);
}

function render(){
  const b=document.getElementById("board");
  b.style.gridTemplateColumns=`repeat(${COLS},30px)`;
  b.innerHTML="";
  board.forEach((row,r)=>row.forEach((v,c)=>{
    const d=document.createElement("div");
    if(revealed[r][c]){
      if(v===-1){d.className="cell cell-mine";d.textContent="💣";}
      else{d.className="cell cell-revealed";if(v>0){d.textContent=v;d.classList.add(`n${v}`);}}
    } else if(flagged[r][c]){d.className="cell cell-flag";d.textContent="🚩";}
    else{d.className="cell cell-hidden";}
    d.addEventListener("click",()=>reveal(r,c));
    d.addEventListener("contextmenu",e=>{e.preventDefault();toggleFlag(r,c);});
    // Long press mobile
    let lt;
    d.addEventListener("touchstart",()=>{lt=setTimeout(()=>{toggleFlag(r,c);},500);},{passive:true});
    d.addEventListener("touchend",()=>clearTimeout(lt),{passive:true});
    b.appendChild(d);
  }));
}

newGame();

// Escuchar teclado desde página padre (fix foco iframe)
window.addEventListener("message", e => {
  if(!e.data || e.data.type !== "keydown") return;
  document.dispatchEvent(new KeyboardEvent("keydown", {key: e.data.key, code: e.data.code, bubbles: true}));
});
</script>
</body>
</html>
