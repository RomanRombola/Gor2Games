<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Trivia</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a15;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Courier New',monospace;color:#f0f0f0;padding:14px;}
h1{color:#ffe600;font-size:15px;letter-spacing:3px;margin-bottom:8px;}
#progress{width:100%;max-width:460px;height:5px;background:rgba(255,255,255,0.07);border-radius:3px;margin-bottom:10px;overflow:hidden;}
#progress-bar{height:100%;background:linear-gradient(90deg,#ffe600,#ff6600);border-radius:3px;transition:width .4s ease;}
#card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,230,0,0.15);border-radius:14px;padding:18px;width:100%;max-width:460px;margin-bottom:10px;}
#category{font-size:10px;color:#ff6600;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;font-family:'Courier New',monospace;}
#question{font-size:15px;line-height:1.6;color:#f0f0f0;margin-bottom:2px;}
.opt{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:11px 14px;margin:6px 0;cursor:pointer;font-family:'Courier New',monospace;font-size:13px;color:#ddd;text-align:left;transition:all .2s;display:flex;gap:10px;align-items:center;}
.opt:hover:not(:disabled){border-color:rgba(255,230,0,0.4);background:rgba(255,230,0,0.06);color:#ffe600;}
.opt.correct{background:rgba(57,255,20,0.12);border-color:#39ff14;color:#39ff14;}
.opt.wrong{background:rgba(255,51,102,0.1);border-color:#ff3366;color:#ff3366;}
.opt:disabled{cursor:default;}
.opt-letter{font-weight:700;color:#ff6600;font-size:14px;min-width:18px;}
#feedback{height:22px;font-size:13px;text-align:center;font-weight:700;letter-spacing:1px;margin:4px 0;}
#bottom{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:460px;font-size:12px;color:#555;}
#bottom b{color:#ffe600;}
#btn-next{background:linear-gradient(135deg,#3a2a00,#5a4000);border:1px solid rgba(255,230,0,0.3);color:#ffe600;font-family:'Courier New',monospace;font-size:12px;font-weight:700;padding:8px 20px;border-radius:8px;cursor:pointer;display:none;letter-spacing:1px;}
#btn-next:hover{box-shadow:0 0 10px rgba(255,230,0,0.3);}
#result-screen{display:none;text-align:center;max-width:460px;width:100%;}
.big-score{font-size:52px;font-weight:700;color:#ffe600;}
.result-msg{font-size:14px;color:#aaa;margin:6px 0 16px;}
.restart-btn{background:linear-gradient(135deg,#3a2a00,#5a4000);border:1px solid rgba(255,230,0,0.3);color:#ffe600;font-family:'Courier New',monospace;font-size:12px;font-weight:700;padding:10px 24px;border-radius:8px;cursor:pointer;letter-spacing:1px;}
.restart-btn:hover{box-shadow:0 0 12px rgba(255,230,0,0.4);}
</style>
</head>
<body>
<h1>🧠 TRIVIA</h1>
<div id="progress"><div id="progress-bar" style="width:0%"></div></div>
<div id="card">
  <div id="category">CARGANDO</div>
  <div id="question">...</div>
</div>
<div id="q-opts"></div>
<div id="feedback"></div>
<div id="bottom">
  <span>PREGUNTA <b id="qnum">1</b>/10 · SCORE <b id="score">0</b></span>
  <button id="btn-next" onclick="nextQ()">SIGUIENTE ▶</button>
</div>
<div id="result-screen">
  <div class="big-score" id="r-score">0/10</div>
  <div class="result-msg" id="r-msg"></div>
  <button class="restart-btn" onclick="startGame()">🔄 JUGAR DE NUEVO</button>
</div>

<script>
const QUESTIONS=[
  {cat:"🌍 Geografía",q:"¿Cuál es la capital de Australia?",opts:["Sydney","Canberra","Melbourne","Brisbane"],a:1},
  {cat:"🎬 Cine",q:"¿En qué año se estrenó la primera película de Iron Man?",opts:["2006","2007","2008","2010"],a:2},
  {cat:"⚽ Deportes",q:"¿Cuántos jugadores tiene un equipo de fútbol en la cancha?",opts:["9","10","11","12"],a:2},
  {cat:"🔬 Ciencia",q:"¿Cuál es el elemento más abundante en el universo?",opts:["Oxígeno","Helio","Hidrógeno","Carbono"],a:2},
  {cat:"🎮 Videojuegos",q:"¿En qué año se lanzó el primer Pokémon?",opts:["1994","1996","1998","2000"],a:1},
  {cat:"🌍 Geografía",q:"¿Cuál es el país más grande del mundo?",opts:["China","Canada","USA","Rusia"],a:3},
  {cat:"🎵 Música",q:"¿De qué país es la banda Metallica?",opts:["Reino Unido","Alemania","Estados Unidos","Canada"],a:2},
  {cat:"🔬 Ciencia",q:"¿A qué temperatura hierve el agua al nivel del mar?",opts:["90°C","95°C","100°C","105°C"],a:2},
  {cat:"📚 Historia",q:"¿En qué año terminó la Segunda Guerra Mundial?",opts:["1943","1944","1945","1946"],a:2},
  {cat:"🎮 Videojuegos",q:"¿Cuál es el videojuego más vendido de todos los tiempos?",opts:["Tetris","Minecraft","GTA V","Wii Sports"],a:1},
  {cat:"🌍 Geografía",q:"¿Cuántos continentes tiene el planeta Tierra?",opts:["5","6","7","8"],a:2},
  {cat:"🔬 Ciencia",q:"¿Qué planeta es el más grande del sistema solar?",opts:["Saturno","Neptuno","Júpiter","Urano"],a:2},
  {cat:"⚽ Deportes",q:"¿Cuántos Grand Slams ganó Roger Federer?",opts:["18","19","20","21"],a:2},
  {cat:"🎬 Cine",q:"¿Quién dirigió la saga de El Señor de los Anillos?",opts:["Steven Spielberg","James Cameron","Peter Jackson","Christopher Nolan"],a:2},
  {cat:"📚 Historia",q:"¿En qué año llegó el hombre a la Luna?",opts:["1965","1967","1969","1971"],a:2},
  {cat:"🎵 Música",q:"¿Cuántos integrantes tenía la banda original de The Beatles?",opts:["3","4","5","6"],a:1},
  {cat:"🎮 Videojuegos",q:"¿Cuál es la franquicia de videojuegos más exitosa de Nintendo?",opts:["Zelda","Mario","Pokémon","Metroid"],a:1},
  {cat:"🔬 Ciencia",q:"¿Cuántos huesos tiene el cuerpo humano adulto?",opts:["196","206","216","226"],a:1},
  {cat:"🌍 Geografía",q:"¿Cuál es el río más largo del mundo?",opts:["Amazonas","Nilo","Yangtsé","Misisipi"],a:1},
  {cat:"📚 Historia",q:"¿Quién fue el primer presidente de los Estados Unidos?",opts:["Abraham Lincoln","Thomas Jefferson","George Washington","Benjamin Franklin"],a:2},
];

let questions=[],qIdx=0,score=0,answered=false;

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function startGame(){
  questions=shuffle(QUESTIONS).slice(0,10);
  qIdx=0;score=0;answered=false;
  document.getElementById('result-screen').style.display='none';
  document.getElementById('card').style.display='block';
  document.getElementById('q-opts').style.display='block';
  document.getElementById('feedback').style.display='block';
  document.getElementById('bottom').style.display='flex';
  showQ();
}

function showQ(){
  answered=false;
  const q=questions[qIdx];
  const pct=(qIdx/10)*100;
  document.getElementById('progress-bar').style.width=pct+'%';
  document.getElementById('category').textContent=q.cat;
  document.getElementById('question').textContent=q.q;
  document.getElementById('qnum').textContent=qIdx+1;
  document.getElementById('score').textContent=score;
  document.getElementById('feedback').textContent='';
  document.getElementById('btn-next').style.display='none';
  const letters=['A','B','C','D'];
  const opts=document.getElementById('q-opts');
  opts.innerHTML=q.opts.map((o,i)=>`
    <button class="opt" onclick="answer(${i})">
      <span class="opt-letter">${letters[i]}</span> ${o}
    </button>`).join('');
}

function answer(i){
  if(answered) return;
  answered=true;
  const q=questions[qIdx];
  const opts=document.querySelectorAll('.opt');
  opts.forEach(o=>o.disabled=true);
  if(i===q.a){
    opts[i].classList.add('correct');
    score++;document.getElementById('score').textContent=score;
    document.getElementById('feedback').textContent='✅ ¡CORRECTO!';
    document.getElementById('feedback').style.color='#39ff14';
  } else {
    opts[i].classList.add('wrong');
    opts[q.a].classList.add('correct');
    document.getElementById('feedback').textContent='❌ INCORRECTO';
    document.getElementById('feedback').style.color='#ff3366';
  }
  document.getElementById('btn-next').style.display='block';
  if(qIdx===9) document.getElementById('btn-next').textContent='VER RESULTADO ▶';
}

function nextQ(){
  qIdx++;
  if(qIdx>=10){showResult();return;}
  showQ();
}

function showResult(){
  document.getElementById('card').style.display='none';
  document.getElementById('q-opts').style.display='none';
  document.getElementById('feedback').style.display='none';
  document.getElementById('bottom').style.display='none';
  document.getElementById('progress-bar').style.width='100%';
  const msgs=['Seguí practicando 💪','Nada mal, seguí así 👍','Muy bien! 🎯','Excelente! 🏆','¡Perfecto! Sos un genio 🧠'];
  const msgIdx=Math.floor(score/2.1);
  document.getElementById('r-score').textContent=`${score}/10`;
  document.getElementById('r-msg').textContent=msgs[Math.min(msgIdx,4)];
  document.getElementById('result-screen').style.display='block';
}

startGame();
</script>
</body>
</html>
