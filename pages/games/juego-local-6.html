<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#080810;color:#f0f0f0;font-family:'Courier New',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;user-select:none;}
h1{font-size:22px;letter-spacing:4px;color:#ffe600;margin-bottom:8px;text-shadow:0 0 12px rgba(255,230,0,0.6);}
#hud{display:flex;gap:24px;margin-bottom:14px;font-size:13px;}
.h-box{text-align:center;background:rgba(255,255,255,0.05);padding:8px 16px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);}
.h-val{font-size:20px;font-weight:900;color:#ffe600;display:block;}
.h-lbl{font-size:10px;color:#555;letter-spacing:2px;text-transform:uppercase;}
#grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;background:#111;padding:12px;border-radius:12px;border:1px solid rgba(255,230,0,0.15);box-shadow:0 0 30px rgba(0,0,0,0.8);}
.cell{width:90px;height:90px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Courier New',monospace;font-weight:900;font-size:24px;transition:transform 0.1s;border:1px solid rgba(255,255,255,0.05);}
.cell-0{background:#1a1a2a;color:transparent;}
.cell-2{background:#1a2a3a;color:#88bbff;font-size:28px;}
.cell-4{background:#1a3a2a;color:#88ffbb;font-size:28px;}
.cell-8{background:#2a2a1a;color:#ffff88;font-size:26px;}
.cell-16{background:#2a1a1a;color:#ff8866;font-size:24px;}
.cell-32{background:#3a1a1a;color:#ff6644;font-size:22px;}
.cell-64{background:#ff4400;color:#fff;font-size:20px;box-shadow:0 0 15px rgba(255,68,0,0.5);}
.cell-128{background:#ff6600;color:#fff;font-size:18px;box-shadow:0 0 15px rgba(255,102,0,0.5);}
.cell-256{background:#ff9900;color:#fff;font-size:18px;box-shadow:0 0 20px rgba(255,153,0,0.6);}
.cell-512{background:#ffcc00;color:#000;font-size:16px;box-shadow:0 0 20px rgba(255,204,0,0.7);}
.cell-1024{background:#ffe600;color:#000;font-size:14px;box-shadow:0 0 25px rgba(255,230,0,0.8);}
.cell-2048{background:linear-gradient(135deg,#ff6600,#ffe600);color:#000;font-size:13px;box-shadow:0 0 30px rgba(255,200,0,0.9);animation:pulse2048 0.5s ease infinite alternate;}
@keyframes pulse2048{from{transform:scale(1);}to{transform:scale(1.05);}}
.cell-high{background:linear-gradient(135deg,#ff00ff,#ff6600);color:#fff;font-size:12px;box-shadow:0 0 30px rgba(255,0,255,0.7);}
#msg{margin-top:14px;font-size:14px;color:#555;letter-spacing:1px;}
.btn{margin-top:10px;background:linear-gradient(135deg,#ffe600,#ff9500);border:none;color:#000;font-family:'Courier New',monospace;font-size:13px;font-weight:700;padding:10px 24px;border-radius:8px;cursor:pointer;letter-spacing:2px;}
#ctrl{margin-top:10px;font-size:11px;color:#333;}
</style>
</head>
<body>
<h1>🔢 2048</h1>
<div id="hud">
  <div class="h-box"><span class="h-val" id="h-score">0</span><span class="h-lbl">Puntaje</span></div>
  <div class="h-box"><span class="h-val" id="h-best">0</span><span class="h-lbl">Mejor</span></div>
</div>
<div id="grid"></div>
<div id="msg">Combiná losetas iguales. Llegá al 2048.</div>
<button class="btn" onclick="init()">🔄 NUEVA PARTIDA</button>
<div id="ctrl">Flechas / WASD · Swipe en mobile</div>

<script>
const BEST="g2048_best";
const getBest=()=>parseInt(localStorage.getItem(BEST)||"0");
let board=[],score,moved;

function init(){
  board=Array.from({length:4},()=>Array(4).fill(0));
  score=0;moved=false;
  updHUD();addRandom();addRandom();render();
  document.getElementById("msg").textContent="Combiná losetas iguales. Llegá al 2048.";
}

function addRandom(){
  const empty=[];
  board.forEach((row,r)=>row.forEach((v,c)=>{if(!v)empty.push([r,c]);}));
  if(!empty.length)return;
  const [r,c]=empty[Math.floor(Math.random()*empty.length)];
  board[r][c]=Math.random()<0.85?2:4;
}

function slide(row){
  let r=row.filter(v=>v);
  for(let i=0;i<r.length-1;i++){
    if(r[i]===r[i+1]){score+=r[i]*2;r[i]*=2;r.splice(i+1,1);}
  }
  while(r.length<4)r.push(0);
  return r;
}

function move(dir){
  let changed=false;
  const b=board.map(r=>[...r]);
  if(dir==="left"){board=board.map(r=>{const s=slide(r);if(s.join()!==r.join())changed=true;return s;});}
  else if(dir==="right"){board=board.map(r=>{const s=slide([...r].reverse()).reverse();if(s.join()!==r.join())changed=true;return s;});}
  else if(dir==="up"){
    for(let c=0;c<4;c++){
      const col=board.map(r=>r[c]);const s=slide(col);
      s.forEach((v,r)=>{if(board[r][c]!==v)changed=true;board[r][c]=v;});
    }
  }
  else if(dir==="down"){
    for(let c=0;c<4;c++){
      const col=board.map(r=>r[c]).reverse();const s=slide(col).reverse();
      s.forEach((v,r)=>{if(board[r][c]!==v)changed=true;board[r][c]=v;});
    }
  }
  if(changed){addRandom();updHUD();render();checkEnd();}
}

function checkEnd(){
  if(board.some(r=>r.includes(2048)))document.getElementById("msg").textContent="🏆 ¡LLEGASTE AL 2048!";
  else{
    let canMove=board.some(r=>r.includes(0));
    if(!canMove){
      for(let r=0;r<4;r++)for(let c=0;c<4;c++){
        if((r<3&&board[r][c]===board[r+1][c])||(c<3&&board[r][c]===board[r][c+1]))canMove=true;
      }
    }
    if(!canMove)document.getElementById("msg").textContent="💀 SIN MOVIMIENTOS — GAME OVER";
  }
}

function updHUD(){
  document.getElementById("h-score").textContent=score;
  if(score>getBest())localStorage.setItem(BEST,score);
  document.getElementById("h-best").textContent=getBest();
}

function getClass(v){
  if(!v)return"cell-0";
  if(v<=64)return`cell-${v}`;
  if(v<=2048)return`cell-${v}`;
  return"cell-high";
}

function render(){
  const grid=document.getElementById("grid");
  grid.innerHTML="";
  board.forEach(row=>row.forEach(v=>{
    const d=document.createElement("div");
    d.className=`cell ${getClass(v)}`;
    d.textContent=v||"";
    grid.appendChild(d);
  }));
}

document.addEventListener("keydown",e=>{
  const map={ArrowLeft:"left",ArrowRight:"right",ArrowUp:"up",ArrowDown:"down",
    a:"left",d:"right",w:"up",s:"down",A:"left",D:"right",W:"up",S:"down"};
  if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key))e.preventDefault();
  if(map[e.key])move(map[e.key]);
});

let ts2=null;
document.addEventListener("touchstart",e=>{ts2={x:e.touches[0].clientX,y:e.touches[0].clientY};},{passive:true});
document.addEventListener("touchend",e=>{
  if(!ts2)return;
  const dx=e.changedTouches[0].clientX-ts2.x,dy=e.changedTouches[0].clientY-ts2.y;
  if(Math.max(Math.abs(dx),Math.abs(dy))<20)return;
  if(Math.abs(dx)>Math.abs(dy))move(dx>0?"right":"left");
  else move(dy>0?"down":"up");
},{passive:true});

init();

// Escuchar teclado desde página padre (fix foco iframe)
window.addEventListener("message", e => {
  if(!e.data || e.data.type !== "keydown") return;
  document.dispatchEvent(new KeyboardEvent("keydown", {key: e.data.key, code: e.data.code, bubbles: true}));
});
</script>
</body>
</html>
