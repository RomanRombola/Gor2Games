<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡Adrián Come!</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#080810;
  color:#f0f0f0;
  font-family:'Courier New',monospace;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  user-select:none;
  overflow:hidden;
}
h1{
  font-size:20px;
  letter-spacing:4px;
  background:linear-gradient(90deg,#ff6600,#ffe600);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:8px;
  filter:drop-shadow(0 0 8px rgba(255,102,0,0.5));
}
#hud{display:flex;gap:28px;margin-bottom:10px;font-size:13px;}
.h-item{text-align:center;}
.h-val{font-size:20px;font-weight:900;display:block;line-height:1;}
.h-lbl{font-size:10px;color:#555;letter-spacing:2px;text-transform:uppercase;}
.score-v{color:#ff6600;}
.lives-v{color:#ff3366;}
.level-v{color:#ffe600;}

#canvas-wrap{
  position:relative;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 0 0 2px rgba(255,102,0,0.3),0 0 40px rgba(0,0,0,0.9);
}
canvas{display:block;}

#overlay{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:rgba(8,8,16,0.92);
  backdrop-filter:blur(4px);
  gap:10px;
  transition:opacity 0.3s;
}
#overlay.hidden{opacity:0;pointer-events:none;}
.ov-emoji{font-size:60px;animation:bounce 0.8s ease infinite alternate;}
@keyframes bounce{from{transform:translateY(0);}to{transform:translateY(-10px);}}
.ov-title{
  font-size:24px;font-weight:900;letter-spacing:3px;
  background:linear-gradient(90deg,#ff6600,#ffe600);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.ov-sub{font-size:13px;color:#666;letter-spacing:2px;text-align:center;line-height:1.6;max-width:300px;}
.ov-score{font-size:36px;font-weight:900;color:#ff6600;line-height:1;}
.ov-btn{
  background:linear-gradient(135deg,#ff6600,#ff9500);
  border:none;color:white;
  font-family:'Courier New',monospace;
  font-size:13px;font-weight:700;
  padding:11px 28px;border-radius:8px;
  cursor:pointer;letter-spacing:3px;
  box-shadow:0 0 20px rgba(255,102,0,0.5);
  margin-top:4px;transition:transform .15s;
}
.ov-btn:hover{transform:translateY(-2px);}
#ctrl{margin-top:8px;font-size:11px;color:#333;letter-spacing:1px;}

/* Mobile buttons */
#mobile-ctrl{
  display:none;
  gap:20px;
  margin-top:12px;
}
.m-btn{
  background:rgba(255,102,0,0.15);
  border:1px solid rgba(255,102,0,0.4);
  color:#ff6600;
  font-size:28px;
  width:64px;height:64px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
@media(max-width:600px){
  #mobile-ctrl{display:flex;}
  #ctrl{display:none;}
}
</style>
</head>
<body>

<h1>🍕 ¡ADRIÁN COME!</h1>
<div id="hud">
  <div class="h-item"><span class="h-val score-v" id="h-score">0</span><span class="h-lbl">Puntaje</span></div>
  <div class="h-item"><span class="h-val lives-v" id="h-lives">❤❤❤</span><span class="h-lbl">Vidas</span></div>
  <div class="h-item"><span class="h-val level-v" id="h-level">1</span><span class="h-lbl">Nivel</span></div>
</div>

<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div id="overlay">
    <div class="ov-emoji">🧍</div>
    <div class="ov-title">¡ADRIÁN COME!</div>
    <div class="ov-sub">
      Atrapá la comida que cae del cielo.<br>
      Esquivá la basura o perdés una vida.<br>
      ¡No dejés que Adrián muera de hambre!
    </div>
    <div class="ov-score" id="ov-score" style="display:none"></div>
    <button class="ov-btn" id="ov-btn" onclick="startGame()">▶ JUGAR</button>
  </div>
</div>

<div id="ctrl">← → para mover · ESPACIO para dash</div>
<div id="mobile-ctrl">
  <div class="m-btn" id="btn-left">◀</div>
  <div class="m-btn" id="btn-right">▶</div>
</div>

<script>
// ── Setup canvas ───────────────────────────────────────────────────────────
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const W = 360, H = 500;
canvas.width = W; canvas.height = H;

// ── Constantes ─────────────────────────────────────────────────────────────
const GROUND = H - 30;
const PLAYER_W = 28, PLAYER_H = 60;
const ITEM_SIZE = 28;

const FOODS = ["🍕","🍔","🌮","🍩","🍎","🍗","🍣","🍦","🧁","🍇","🥪","🍫"];
const TRASH = ["🗑️","💩","🪲","🧟","☠️","🔩","💀","🪣"];

// ── Estado ─────────────────────────────────────────────────────────────────
let player, items, particles, score, lives, level, frameCount;
let spawnTimer, speedMult, running, gameOverFlag;
let keys = {};
let dashTimer = 0;
const BEST_KEY = "adrian_best";
const getBest = () => parseInt(localStorage.getItem(BEST_KEY) || "0");

// ── Audio ──────────────────────────────────────────────────────────────────
let actx = null;
function initAudio() { if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); }
function sfx(type) {
  if (!actx) return;
  const t = actx.currentTime;
  const o = actx.createOscillator(), g = actx.createGain();
  o.connect(g); g.connect(actx.destination);
  if (type === "eat") {
    o.type = "sine"; o.frequency.setValueAtTime(600, t); o.frequency.exponentialRampToValueAtTime(1200, t + 0.08);
    g.gain.setValueAtTime(0.12, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    o.start(t); o.stop(t + 0.12);
  } else if (type === "hit") {
    o.type = "sawtooth"; o.frequency.setValueAtTime(200, t); o.frequency.exponentialRampToValueAtTime(60, t + 0.3);
    g.gain.setValueAtTime(0.15, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    o.start(t); o.stop(t + 0.3);
  } else if (type === "lvl") {
    [400, 600, 800, 1000].forEach((f, i) => {
      const o2 = actx.createOscillator(), g2 = actx.createGain();
      o2.connect(g2); g2.connect(actx.destination);
      o2.type = "square"; o2.frequency.value = f;
      g2.gain.setValueAtTime(0.08, t + i * 0.08); g2.gain.exponentialRampToValueAtTime(0.001, t + i * 0.08 + 0.1);
      o2.start(t + i * 0.08); o2.stop(t + i * 0.08 + 0.1);
    });
  }
}

// ── Partículas ─────────────────────────────────────────────────────────────
function spawnParticles(x, y, color, emoji = null, n = 8) {
  for (let i = 0; i < n; i++) {
    const a = (Math.PI * 2 / n) * i + Math.random() * 0.8;
    const sp = 2 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 2,
      life: 1, decay: 0.035 + Math.random() * 0.02,
      color, emoji, size: 6 + Math.random() * 6
    });
  }
}

// ── Init ───────────────────────────────────────────────────────────────────
function initGame() {
  player = {
    x: W / 2 - PLAYER_W / 2,
    y: GROUND - PLAYER_H,
    vx: 0,
    speed: 4.5,
    dashCooldown: 0,
    dashing: false,
    dashVx: 0,
    frame: 0,
    hitFlash: 0,
    mouthOpen: 0,
    happy: 0
  };
  items = [];
  particles = [];
  score = 0; lives = 3; level = 1;
  frameCount = 0; spawnTimer = 0; speedMult = 1;
  running = true; gameOverFlag = false;
  updHUD();
}

function startGame() {
  initAudio();
  initGame();
  document.getElementById("overlay").classList.add("hidden");
  document.getElementById("ov-score").style.display = "none";
  document.getElementById("ov-btn").textContent = "▶ JUGAR";
  requestAnimationFrame(loop);
}

// ── Loop ───────────────────────────────────────────────────────────────────
let lastTime = 0;
function loop(ts) {
  if (!running) return;
  const dt = Math.min((ts - lastTime) / 16.67, 3);
  lastTime = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// ── Update ─────────────────────────────────────────────────────────────────
function update(dt) {
  frameCount++;
  player.frame++;

  // Movimiento jugador
  let moving = false;
  const spd = player.speed * speedMult;

  if (player.dashCooldown > 0) player.dashCooldown -= dt;

  if (keys["ArrowLeft"] || keys["a"] || keys["A"] || keys["mobileLeft"]) {
    player.x -= spd * dt;
    moving = true;
  }
  if (keys["ArrowRight"] || keys["d"] || keys["D"] || keys["mobileRight"]) {
    player.x += spd * dt;
    moving = true;
  }

  // Dash con espacio
  if ((keys[" "]) && player.dashCooldown <= 0) {
    const dashDir = (keys["ArrowLeft"] || keys["a"]) ? -1 : 1;
    player.x += dashDir * 60;
    player.dashCooldown = 45;
    spawnParticles(player.x + PLAYER_W / 2, player.y + PLAYER_H / 2, "#00aaff", null, 6);
  }

  // Límites
  player.x = Math.max(0, Math.min(W - PLAYER_W, player.x));

  // Flash de golpe
  if (player.hitFlash > 0) player.hitFlash -= dt;
  if (player.happy > 0) player.happy -= dt;
  if (player.mouthOpen > 0) player.mouthOpen -= dt;

  // Spawn items
  spawnTimer -= dt;
  const spawnRate = Math.max(18, 55 - level * 4);
  if (spawnTimer <= 0) {
    spawnTimer = spawnRate + Math.random() * 20;
    const isFood = Math.random() < 0.62;
    const emoji = isFood
      ? FOODS[Math.floor(Math.random() * FOODS.length)]
      : TRASH[Math.floor(Math.random() * TRASH.length)];
    items.push({
      x: Math.random() * (W - ITEM_SIZE),
      y: -ITEM_SIZE,
      vy: (1.8 + Math.random() * 1.5) * speedMult,
      isFood,
      emoji,
      rot: (Math.random() - 0.5) * 0.1,
      rotAngle: 0,
      scale: 1,
      caught: false
    });
  }

  // Mover items y detectar colisión
  for (let i = items.length - 1; i >= 0; i--) {
    const item = items[i];
    item.y += item.vy * dt;
    item.rotAngle += item.rot * dt;
    item.scale = 1 + Math.sin(item.rotAngle * 3) * 0.05;

    // Colisión con jugador
    const px = player.x, py = player.y;
    const catchZone = 14; // zona de captura generosa
    if (
      item.x + ITEM_SIZE > px - catchZone &&
      item.x < px + PLAYER_W + catchZone &&
      item.y + ITEM_SIZE > py + PLAYER_H * 0.3 &&
      item.y < py + PLAYER_H + 10
    ) {
      if (item.isFood) {
        score += 10 * level;
        player.happy = 30;
        player.mouthOpen = 20;
        spawnParticles(item.x + ITEM_SIZE / 2, item.y, "#ffe600", item.emoji, 6);
        sfx("eat");
        const newLevel = Math.floor(score / 200) + 1;
        if (newLevel > level) { level = newLevel; speedMult = 1 + (level - 1) * 0.15; sfx("lvl"); }
      } else {
        lives--;
        player.hitFlash = 25;
        spawnParticles(item.x + ITEM_SIZE / 2, item.y, "#ff3366", "💥", 8);
        sfx("hit");
        if (lives <= 0) { doGameOver(); return; }
      }
      items.splice(i, 1);
      updHUD();
      continue;
    }

    // Salió de pantalla / tocó el suelo
    if (item.y > H + 20) {
      items.splice(i, 1);
    } else if (item.y + ITEM_SIZE >= GROUND && !item.hitGround) {
      // Solo la comida saca vida al caer al suelo, la basura simplemente desaparece
      if (item.isFood) {
        item.hitGround = true;
        lives--;
        player.hitFlash = 25;
        spawnParticles(item.x + ITEM_SIZE / 2, GROUND, "#ff3366", "💔", 6);
        sfx("hit");
        updHUD();
        if (lives <= 0) { doGameOver(); return; }
      }
      items.splice(i, 1);
    }
  }

  // Partículas
  particles.forEach(p => {
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += 0.15 * dt;
    p.vx *= 0.95; p.life -= p.decay * dt;
  });
  particles = particles.filter(p => p.life > 0);
}

// ── Draw ───────────────────────────────────────────────────────────────────
function draw() {
  // Fondo con gradiente de cielo
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, "#050510");
  sky.addColorStop(1, "#0a0a18");
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // Estrellas de fondo
  ctx.fillStyle = "rgba(255,255,255,0.4)";
  for (let i = 0; i < 30; i++) {
    const sx = ((i * 137 + 50) % W);
    const sy = ((i * 97 + 30) % (H - 60));
    const ss = ((i % 3) + 1) * 0.5;
    const twinkle = 0.3 + Math.sin(frameCount * 0.05 + i) * 0.3;
    ctx.globalAlpha = twinkle;
    ctx.fillRect(sx, sy, ss, ss);
  }
  ctx.globalAlpha = 1;

  // Suelo con efecto
  const groundGrad = ctx.createLinearGradient(0, GROUND, 0, H);
  groundGrad.addColorStop(0, "#1a1a2e");
  groundGrad.addColorStop(1, "#0a0a18");
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, GROUND, W, H - GROUND);
  ctx.strokeStyle = "rgba(255,102,0,0.3)";
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, GROUND); ctx.lineTo(W, GROUND); ctx.stroke();

  // Líneas de pista
  ctx.strokeStyle = "rgba(255,102,0,0.08)";
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, GROUND); ctx.lineTo(x, H); ctx.stroke();
  }

  // Partículas
  particles.forEach(p => {
    ctx.globalAlpha = Math.max(0, p.life);
    if (p.emoji) {
      ctx.font = `${p.size * 2}px serif`;
      ctx.textAlign = "center";
      ctx.fillText(p.emoji, p.x, p.y);
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
  });
  ctx.globalAlpha = 1;

  // Items que caen
  items.forEach(item => {
    ctx.save();
    ctx.translate(item.x + ITEM_SIZE / 2, item.y + ITEM_SIZE / 2);
    ctx.rotate(item.rotAngle);
    ctx.scale(item.scale, item.scale);
    ctx.font = `${ITEM_SIZE}px serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    // Sombra glow para comida
    if (item.isFood) {
      ctx.shadowColor = "#ffe600";
      ctx.shadowBlur = 10;
    } else {
      ctx.shadowColor = "#ff3366";
      ctx.shadowBlur = 8;
    }
    ctx.fillText(item.emoji, 0, 0);
    ctx.shadowBlur = 0;
    ctx.restore();
  });

  // ── Dibujar a Adrián ──────────────────────────────────────────────────────
  drawAdrian();

  // Score popup
  if (player.happy > 20) {
    const alpha = (player.happy - 20) / 10;
    ctx.globalAlpha = alpha;
    ctx.font = "bold 16px 'Courier New'";
    ctx.fillStyle = "#ffe600";
    ctx.textAlign = "center";
    ctx.shadowColor = "#ffe600"; ctx.shadowBlur = 10;
    ctx.fillText(`+${10 * level}`, player.x + PLAYER_W / 2, player.y - 10);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  // HUD nivel en pantalla
  ctx.font = "bold 11px 'Courier New'";
  ctx.fillStyle = "rgba(255,102,0,0.4)";
  ctx.textAlign = "left";
  ctx.fillText(`MEJOR: ${getBest()}`, 10, 18);
  ctx.textAlign = "right";
  ctx.fillText(`VEL: x${speedMult.toFixed(1)}`, W - 10, 18);
}

function drawAdrian() {
  const x = player.x, y = player.y;
  const cx = x + PLAYER_W / 2;
  const flash = player.hitFlash > 0 && Math.floor(player.hitFlash / 4) % 2 === 0;
  const happy = player.happy > 0;
  const walking = Math.floor(frameCount / 8) % 2;

  if (flash) {
    ctx.globalAlpha = 0.4;
    ctx.shadowColor = "#ff3366";
    ctx.shadowBlur = 20;
  }
  if (happy) {
    ctx.shadowColor = "#ffe600";
    ctx.shadowBlur = 15;
  }

  // Sombra en el suelo
  ctx.fillStyle = "rgba(0,0,0,0.3)";
  ctx.beginPath();
  ctx.ellipse(cx, GROUND + 4, 14, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Piernas (flacas, animadas)
  ctx.strokeStyle = flash ? "#ff6666" : "#c8854a";
  ctx.lineWidth = 4;
  ctx.lineCap = "round";
  const legY = y + PLAYER_H - 2;
  if (walking && (keys["ArrowLeft"] || keys["ArrowRight"] || keys["a"] || keys["d"] || keys["mobileLeft"] || keys["mobileRight"])) {
    // Caminando
    ctx.beginPath(); ctx.moveTo(cx - 4, legY - 10); ctx.lineTo(cx - 8, legY + 10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx + 4, legY - 10); ctx.lineTo(cx + 2, legY + 10); ctx.stroke();
  } else {
    // Parado
    ctx.beginPath(); ctx.moveTo(cx - 4, legY - 10); ctx.lineTo(cx - 5, legY + 10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx + 4, legY - 10); ctx.lineTo(cx + 5, legY + 10); ctx.stroke();
  }

  // Zapatos
  ctx.fillStyle = "#222";
  ctx.beginPath(); ctx.ellipse(cx - 5, legY + 12, 7, 4, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + 5, legY + 12, 7, 4, 0, 0, Math.PI * 2); ctx.fill();

  // Cuerpo (flaco, remera rayada)
  const bodyTop = y + 22, bodyH = PLAYER_H - 38;
  ctx.fillStyle = flash ? "#ff6666" : "#3a8fff";
  ctx.beginPath();
  ctx.roundRect(cx - 10, bodyTop, 20, bodyH, 4);
  ctx.fill();
  // Rayitas de remera
  ctx.strokeStyle = "rgba(255,255,255,0.15)";
  ctx.lineWidth = 2;
  for (let ry = bodyTop + 5; ry < bodyTop + bodyH; ry += 7) {
    ctx.beginPath(); ctx.moveTo(cx - 10, ry); ctx.lineTo(cx + 10, ry); ctx.stroke();
  }

  // Brazos (flaquísimos)
  ctx.strokeStyle = flash ? "#ff6666" : "#c8854a";
  ctx.lineWidth = 3;
  const armY = bodyTop + 6;
  const armSwing = happy ? Math.sin(frameCount * 0.3) * 15 : (walking ? Math.sin(frameCount * 0.25) * 8 : 0);
  // Brazo izquierdo
  ctx.beginPath();
  ctx.moveTo(cx - 10, armY);
  ctx.quadraticCurveTo(cx - 22, armY + 8 + armSwing, cx - 18, armY + 18 + armSwing);
  ctx.stroke();
  // Brazo derecho
  ctx.beginPath();
  ctx.moveTo(cx + 10, armY);
  ctx.quadraticCurveTo(cx + 22, armY + 8 - armSwing, cx + 18, armY + 18 - armSwing);
  ctx.stroke();

  // Cuello
  ctx.fillStyle = "#c8854a";
  ctx.fillRect(cx - 4, y + 14, 8, 10);

  // Cabeza (oval, cara expresiva)
  ctx.fillStyle = flash ? "#e08080" : "#c8854a";
  ctx.shadowColor = flash ? "#ff3366" : (happy ? "#ffe600" : "transparent");
  ctx.shadowBlur = happy ? 12 : (flash ? 15 : 0);
  ctx.beginPath();
  ctx.ellipse(cx, y + 10, 13, 15, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Pelo (desordenado)
  ctx.fillStyle = "#3a2000";
  ctx.beginPath();
  ctx.ellipse(cx, y - 2, 13, 8, 0, Math.PI, Math.PI * 2);
  ctx.fill();
  // Mechones
  ctx.beginPath(); ctx.ellipse(cx - 8, y - 4, 4, 6, -0.4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + 6, y - 5, 3, 5, 0.4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + 1, y - 8, 3, 5, 0.1, 0, Math.PI * 2); ctx.fill();

  // Ojos
  const eyeY = y + 8;
  if (flash) {
    // Ojos x (dañado)
    ctx.strokeStyle = "#ff3366"; ctx.lineWidth = 2;
    [[cx - 5, eyeY], [cx + 5, eyeY]].forEach(([ex, ey]) => {
      ctx.beginPath(); ctx.moveTo(ex - 2, ey - 2); ctx.lineTo(ex + 2, ey + 2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(ex + 2, ey - 2); ctx.lineTo(ex - 2, ey + 2); ctx.stroke();
    });
  } else if (happy) {
    // Ojos felices (arcos)
    ctx.strokeStyle = "#222"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(cx - 5, eyeY + 1, 3, Math.PI, 0); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx + 5, eyeY + 1, 3, Math.PI, 0); ctx.stroke();
    // Estrellitas
    ctx.fillStyle = "#ffe600"; ctx.font = "8px serif";
    ctx.fillText("✨", cx - 14, eyeY - 2);
    ctx.fillText("✨", cx + 8, eyeY - 2);
  } else {
    // Ojos normales
    ctx.fillStyle = "#222";
    ctx.beginPath(); ctx.ellipse(cx - 5, eyeY, 2.5, 3, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx + 5, eyeY, 2.5, 3, 0, 0, Math.PI * 2); ctx.fill();
    // Brillo
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.arc(cx - 4, eyeY - 1, 1, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 6, eyeY - 1, 1, 0, Math.PI * 2); ctx.fill();
  }

  // Boca
  const mouthY = y + 16;
  ctx.strokeStyle = "#a05020"; ctx.lineWidth = 1.5;
  if (player.mouthOpen > 0) {
    // Boca abierta comiendo
    ctx.fillStyle = "#cc2200";
    ctx.beginPath();
    ctx.ellipse(cx, mouthY + 1, 5, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#fff"; ctx.font = "5px serif";
    ctx.textAlign = "center";
    ctx.fillText("▪▪", cx, mouthY + 2);
  } else if (happy) {
    // Sonrisa grande
    ctx.beginPath(); ctx.arc(cx, mouthY - 1, 5, 0.1, Math.PI - 0.1); ctx.stroke();
  } else if (flash) {
    // Boca triste
    ctx.beginPath(); ctx.arc(cx, mouthY + 3, 4, Math.PI + 0.2, -0.2); ctx.stroke();
  } else {
    // Boca neutra
    ctx.beginPath(); ctx.moveTo(cx - 4, mouthY + 1); ctx.lineTo(cx + 4, mouthY + 1); ctx.stroke();
  }

  // Mejillas rosadas si está feliz
  if (happy) {
    ctx.fillStyle = "rgba(255,100,100,0.3)";
    ctx.beginPath(); ctx.ellipse(cx - 9, mouthY - 3, 4, 3, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx + 9, mouthY - 3, 4, 3, 0, 0, Math.PI * 2); ctx.fill();
  }

  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
  ctx.textAlign = "left";

  // Nombre sobre la cabeza
  ctx.font = "bold 10px 'Courier New'";
  ctx.fillStyle = "rgba(255,230,0,0.7)";
  ctx.textAlign = "center";
  ctx.fillText("ADRIÁN", cx, y - 8);
  ctx.textAlign = "left";
}

// ── Game Over ──────────────────────────────────────────────────────────────
function doGameOver() {
  running = false;
  gameOverFlag = true;
  if (score > getBest()) localStorage.setItem(BEST_KEY, score);

  setTimeout(() => {
    document.getElementById("ov-score").style.display = "block";
    document.getElementById("ov-score").textContent = `${score} pts`;
    document.getElementById("ov-btn").textContent = "▶ REINTENTAR";
    const titles = ["💀 ADRIÁN SE MURIÓ", "😵 DEMASIADA BASURA", "☠️ GAME OVER"];
    document.querySelector(".ov-title").textContent = titles[Math.floor(Math.random() * titles.length)];
    document.querySelector(".ov-emoji").textContent = "😵";
    document.querySelector(".ov-sub").textContent = `Puntaje: ${score} · Nivel ${level} · Mejor: ${getBest()}`;
    document.getElementById("overlay").classList.remove("hidden");
  }, 600);
}

// ── HUD ────────────────────────────────────────────────────────────────────
function updHUD() {
  document.getElementById("h-score").textContent = score;
  document.getElementById("h-level").textContent = level;
  const hearts = "❤".repeat(lives) + "🖤".repeat(Math.max(0, 3 - lives));
  document.getElementById("h-lives").textContent = hearts;
}

// ── Controles ──────────────────────────────────────────────────────────────
document.addEventListener("keydown", e => {
  keys[e.key] = true;
  if ([" ", "ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown"].includes(e.key)) e.preventDefault();
});
document.addEventListener("keyup", e => { keys[e.key] = false; });

// Mobile buttons
const btnL = document.getElementById("btn-left");
const btnR = document.getElementById("btn-right");
btnL.addEventListener("touchstart", e => { e.preventDefault(); keys["mobileLeft"] = true; }, { passive: false });
btnL.addEventListener("touchend",   e => { e.preventDefault(); keys["mobileLeft"] = false; }, { passive: false });
btnR.addEventListener("touchstart", e => { e.preventDefault(); keys["mobileRight"] = true; }, { passive: false });
btnR.addEventListener("touchend",   e => { e.preventDefault(); keys["mobileRight"] = false; }, { passive: false });
btnL.addEventListener("mousedown", () => keys["mobileLeft"] = true);
btnL.addEventListener("mouseup",   () => keys["mobileLeft"] = false);
btnR.addEventListener("mousedown", () => keys["mobileRight"] = true);
btnR.addEventListener("mouseup",   () => keys["mobileRight"] = false);

// Swipe touch en canvas
let swipeX = null;
canvas.addEventListener("touchstart", e => { swipeX = e.touches[0].clientX; }, { passive: true });
canvas.addEventListener("touchmove", e => {
  if (swipeX === null) return;
  const dx = e.touches[0].clientX - swipeX;
  if (dx < -5) keys["mobileLeft"] = true, keys["mobileRight"] = false;
  else if (dx > 5) keys["mobileRight"] = true, keys["mobileLeft"] = false;
}, { passive: true });
canvas.addEventListener("touchend", () => {
  keys["mobileLeft"] = false; keys["mobileRight"] = false; swipeX = null;
}, { passive: true });

// Draw inicial
draw();
</script>
