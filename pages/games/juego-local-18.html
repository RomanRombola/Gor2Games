<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Simon Says</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a15;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:'Courier New',monospace;color:#f0f0f0;}
h1{color:#a855f7;font-size:15px;letter-spacing:3px;margin-bottom:8px;}
#info{font-size:13px;color:#666;margin-bottom:16px;letter-spacing:1px;height:18px;text-align:center;}
#board{position:relative;width:260px;height:260px;border-radius:50%;background:#111;border:3px solid #222;margin-bottom:16px;}
.quad{position:absolute;width:120px;height:120px;cursor:pointer;transition:filter .1s;border:3px solid #000;}
.quad:hover{filter:brightness(1.2);}
.quad.lit{filter:brightness(2) saturate(2);}
#q0{top:5px;left:5px;border-radius:50% 0 0 0;background:#ff3366;}
#q1{top:5px;right:5px;border-radius:0 50% 0 0;background:#39ff14;}
#q2{bottom:5px;left:5px;border-radius:0 0 0 50%;background:#ffe600;}
#q3{bottom:5px;right:5px;border-radius:0 0 50% 0;background:#00aaff;}
#center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:60px;height:60px;border-radius:50%;background:#0a0a15;border:3px solid #222;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#666;letter-spacing:1px;text-align:center;cursor:pointer;z-index:2;}
#center:hover{border-color:#a855f7;color:#a855f7;}
#stats{display:flex;gap:24px;font-size:13px;color:#aaa;}
#stats b{color:#a855f7;}
</style>
</head>
<body>
<h1>🔴 SIMON SAYS</h1>
<div id="info">Presioná el centro para empezar</div>
<div id="board">
  <div class="quad" id="q0" onclick="playerClick(0)"></div>
  <div class="quad" id="q1" onclick="playerClick(1)"></div>
  <div class="quad" id="q2" onclick="playerClick(2)"></div>
  <div class="quad" id="q3" onclick="playerClick(3)"></div>
  <div id="center" onclick="startGame()">START</div>
</div>
<div id="stats"><span>NIVEL <b id="lvl">0</b></span><span>MEJOR <b id="best">0</b></span></div>
<script>
const SOUNDS=[261,329,392,523]; // C E G C
let seq=[],playerSeq=[],level=0,best=0,playing=false,playerTurn=false;

function tone(freq,dur=200){
  try{
    const ctx2=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx2.createOscillator(),g=ctx2.createGain();
    o.type='sine';o.frequency.value=freq;
    g.gain.setValueAtTime(0.3,ctx2.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx2.currentTime+dur/1000);
    o.connect(g);g.connect(ctx2.destination);
    o.start();o.stop(ctx2.currentTime+dur/1000);
  }catch(e){}
}

function light(i,on){
  document.getElementById('q'+i).classList.toggle('lit',on);
}

function setInfo(t,c='#666'){
  const el=document.getElementById('info');
  el.textContent=t;el.style.color=c;
}

async function showSeq(){
  playerTurn=false;
  setInfo('Mirá la secuencia...','#a855f7');
  for(const s of seq){
    await delay(400);
    light(s,true);tone(SOUNDS[s],350);
    await delay(400);
    light(s,false);
  }
  await delay(300);
  playerTurn=true;playerSeq=[];
  setInfo(`Tu turno — ${seq.length} ${seq.length===1?'paso':'pasos'}`,'#ffe600');
}

async function startGame(){
  if(playing) return;
  playing=true;level=0;seq=[];
  document.getElementById('center').textContent='GO!';
  await nextRound();
}

async function nextRound(){
  level++;seq.push(Math.floor(Math.random()*4));
  document.getElementById('lvl').textContent=level;
  await delay(500);
  await showSeq();
}

function playerClick(i){
  if(!playerTurn||!playing) return;
  light(i,true);tone(SOUNDS[i],200);
  setTimeout(()=>light(i,false),200);
  playerSeq.push(i);
  const idx=playerSeq.length-1;
  if(playerSeq[idx]!==seq[idx]){
    // Error
    playerTurn=false;playing=false;
    tone(200,600);
    setInfo('❌ ERROR — Presioná START','#ff3366');
    if(level>best){best=level-1;document.getElementById('best').textContent=best;}
    document.getElementById('lvl').textContent=0;level=0;
    document.getElementById('center').textContent='START';
    // Flash rojo
    [0,1,2,3].forEach(q=>light(q,true));
    setTimeout(()=>[0,1,2,3].forEach(q=>light(q,false)),600);
    return;
  }
  if(playerSeq.length===seq.length){
    // Completó la secuencia
    setInfo('✅ ¡Correcto!','#39ff14');
    setTimeout(()=>nextRound(),800);
  }
}

function delay(ms){return new Promise(r=>setTimeout(r,ms));}

window.addEventListener('keydown',e=>{
  const map={'1':0,'2':1,'3':2,'4':3,'q':0,'w':1,'a':2,'s':3};
  if(map[e.key]!==undefined) playerClick(map[e.key]);
  if(e.code==='Space'){e.preventDefault();if(!playing)startGame();}
});
window.addEventListener('message',e=>{
  if(e.data?.type==='keydown'){
    const map={'1':0,'2':1,'3':2,'4':3};
    if(map[e.data.key]!==undefined) playerClick(map[e.data.key]);
    if(e.data.key===' '&&!playing) startGame();
  }
});
</script>
</body>
</html>
