<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout Neon</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0a0a0a;color:#f0f0f0;font-family:'Courier New',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;}
  h1{font-size:20px;letter-spacing:4px;color:#00aaff;margin-bottom:6px;text-shadow:0 0 12px rgba(0,170,255,0.8);}
  #info{display:flex;gap:24px;margin-bottom:10px;font-size:14px;color:#888;}
  #info span{color:#ffe600;font-weight:700;}
  canvas{border:1px solid rgba(0,170,255,0.3);border-radius:4px;box-shadow:0 0 20px rgba(0,170,255,0.3);display:block;}
  #msg{margin-top:12px;font-size:15px;color:#ffe600;letter-spacing:2px;min-height:20px;text-align:center;}
  .btn{margin-top:10px;background:linear-gradient(135deg,#00aaff,#0066ff);border:none;color:white;font-family:'Courier New',monospace;font-size:13px;font-weight:700;padding:9px 22px;border-radius:8px;cursor:pointer;letter-spacing:2px;}
</style>
</head>
<body>
<h1>⬛ BREAKOUT NEON</h1>
<div id="info">PUNTAJE: <span id="score">0</span> &nbsp;|&nbsp; VIDAS: <span id="lives">3</span> &nbsp;|&nbsp; NIVEL: <span id="lvl">1</span></div>
<canvas id="c" width="480" height="400"></canvas>
<div id="msg">Presioná ESPACIO o tocá para comenzar</div>
<button class="btn" id="btn-r" style="display:none" onclick="init()">▶ REINICIAR</button>

<script>
const C=document.getElementById("c"),ctx=C.getContext("2d");
const W=C.width,H=C.height;
const COLS=10,ROWS=5,BW=40,BH=16,BPAD=3;
const BOFFX=(W-(COLS*(BW+BPAD)-BPAD))/2, BOFFY=50;
let ball,pad,bricks,score,lives,vel,loop,started,dead,lvl;

const COLORS=["#ff0055","#ff6600","#ffe600","#39ff14","#00aaff"];

function init(){
  lvl=1; score=0; lives=3; started=false; dead=false;
  document.getElementById("score").textContent=0;
  document.getElementById("lives").textContent=3;
  document.getElementById("lvl").textContent=1;
  document.getElementById("msg").textContent="Presioná ESPACIO o tocá para comenzar";
  document.getElementById("btn-r").style.display="none";
  resetBall(); makeBricks(); clearInterval(loop); draw();
}

function resetBall(){
  pad={x:W/2-40,y:H-28,w:80,h:10};
  vel={x:3,y:-4};
  ball={x:W/2,y:H-50,r:7};
}

function makeBricks(){
  bricks=[];
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++)
    bricks.push({x:BOFFX+c*(BW+BPAD),y:BOFFY+r*(BH+BPAD),w:BW,h:BH,color:COLORS[r%COLORS.length],alive:true});
}

function step(){
  ball.x+=vel.x; ball.y+=vel.y;
  // Paredes
  if(ball.x-ball.r<0){ball.x=ball.r;vel.x*=-1;}
  if(ball.x+ball.r>W){ball.x=W-ball.r;vel.x*=-1;}
  if(ball.y-ball.r<0){ball.y=ball.r;vel.y*=-1;}
  // Piso
  if(ball.y+ball.r>H){lives--;document.getElementById("lives").textContent=lives;if(lives<=0){gameOver();return;}resetBall();return;}
  // Pad
  if(ball.y+ball.r>=pad.y&&ball.y-ball.r<=pad.y+pad.h&&ball.x>=pad.x&&ball.x<=pad.x+pad.w){
    ball.y=pad.y-ball.r;
    const hit=(ball.x-(pad.x+pad.w/2))/(pad.w/2);
    vel.x=hit*5; vel.y=-Math.abs(vel.y);
  }
  // Ladrillos
  let remaining=0;
  bricks.forEach(b=>{
    if(!b.alive)return;
    remaining++;
    if(ball.x+ball.r>b.x&&ball.x-ball.r<b.x+b.w&&ball.y+ball.r>b.y&&ball.y-ball.r<b.y+b.h){
      b.alive=false; score+=10;
      document.getElementById("score").textContent=score;
      // Rebote simple
      const overlapX=Math.min(ball.x+ball.r-b.x,b.x+b.w-(ball.x-ball.r));
      const overlapY=Math.min(ball.y+ball.r-b.y,b.y+b.h-(ball.y-ball.r));
      if(overlapX<overlapY)vel.x*=-1;else vel.y*=-1;
    }
  });
  if(remaining===0){lvl++;document.getElementById("lvl").textContent=lvl;makeBricks();resetBall();vel.x*=1.05;vel.y*=1.05;}
  draw();
}

function draw(){
  ctx.fillStyle="#0a0a0a";ctx.fillRect(0,0,W,H);
  // Ladrillos
  bricks.forEach(b=>{
    if(!b.alive)return;
    ctx.fillStyle=b.color;
    ctx.shadowColor=b.color;ctx.shadowBlur=8;
    ctx.fillRect(b.x,b.y,b.w,b.h);
    ctx.shadowBlur=0;
  });
  // Pad
  const g=ctx.createLinearGradient(pad.x,0,pad.x+pad.w,0);
  g.addColorStop(0,"#00aaff");g.addColorStop(1,"#0044ff");
  ctx.fillStyle=g;ctx.shadowColor="#00aaff";ctx.shadowBlur=12;
  ctx.beginPath();ctx.roundRect(pad.x,pad.y,pad.w,pad.h,4);ctx.fill();ctx.shadowBlur=0;
  // Ball
  ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
  ctx.fillStyle="#fff";ctx.shadowColor="#fff";ctx.shadowBlur=14;ctx.fill();ctx.shadowBlur=0;
}

function gameOver(){
  dead=true;clearInterval(loop);
  document.getElementById("msg").textContent=`GAME OVER — ${score} pts`;
  document.getElementById("btn-r").style.display="inline-block";
  ctx.fillStyle="rgba(0,0,0,0.7)";ctx.fillRect(0,0,W,H);
  ctx.font="bold 26px 'Courier New'";ctx.fillStyle="#00aaff";ctx.textAlign="center";
  ctx.shadowColor="#00aaff";ctx.shadowBlur=16;
  ctx.fillText("GAME OVER",W/2,H/2);
  ctx.font="16px 'Courier New'";ctx.fillStyle="#ffe600";ctx.shadowBlur=0;
  ctx.fillText(`Puntaje: ${score}`,W/2,H/2+30);
}

function start(){if(started||dead)return;started=true;document.getElementById("msg").textContent="";loop=setInterval(step,16);}

// Mouse/touch para pad
let mouseX=W/2;
C.addEventListener("mousemove",e=>{const r=C.getBoundingClientRect();mouseX=e.clientX-r.left;pad.x=Math.max(0,Math.min(W-pad.w,mouseX-pad.w/2));draw();});
C.addEventListener("touchmove",e=>{e.preventDefault();const r=C.getBoundingClientRect();mouseX=e.touches[0].clientX-r.left;pad.x=Math.max(0,Math.min(W-pad.w,mouseX-pad.w/2));},{passive:false});
C.addEventListener("touchstart",()=>start(),{passive:true});
document.addEventListener("keydown",e=>{if(e.key===" ")start();});

init();

// Escuchar teclado desde página padre (fix foco iframe)
window.addEventListener("message", e => {
  if(!e.data || e.data.type !== "keydown") return;
  document.dispatchEvent(new KeyboardEvent("keydown", {key: e.data.key, code: e.data.code, bubbles: true}));
});
</script>
</body>
</html>
