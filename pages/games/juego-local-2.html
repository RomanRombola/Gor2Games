<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout Neon</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0a0a0a;color:#f0f0f0;font-family:'Courier New',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:10px;}
  h1{font-size:18px;letter-spacing:4px;color:#00aaff;margin-bottom:6px;text-shadow:0 0 12px rgba(0,170,255,0.8);}
  #info{display:flex;gap:16px;margin-bottom:6px;font-size:13px;color:#888;flex-wrap:wrap;justify-content:center;}
  #info b{color:#ffe600;font-weight:700;}
  #powerup-hud{font-size:11px;color:#39ff14;letter-spacing:1px;height:16px;margin-bottom:4px;}
  canvas{border:1px solid rgba(0,170,255,0.3);border-radius:4px;box-shadow:0 0 20px rgba(0,170,255,0.25);display:block;cursor:crosshair;}
  #msg{margin-top:10px;font-size:14px;color:#ffe600;letter-spacing:2px;min-height:20px;text-align:center;}
  .btn{margin-top:8px;background:linear-gradient(135deg,#00aaff,#0066ff);border:none;color:white;font-family:'Courier New',monospace;font-size:12px;font-weight:700;padding:9px 22px;border-radius:8px;cursor:pointer;letter-spacing:2px;}
  #ctrl{margin-top:5px;font-size:10px;color:#444;letter-spacing:1px;text-align:center;}
</style>
</head>
<body>
<h1>⬛ BREAKOUT NEON</h1>
<div id="info">PUNTAJE: <b id="score">0</b> · VIDAS: <b id="lives">3</b> · NIVEL: <b id="lvl">1</b> · MEJOR: <b id="best">0</b></div>
<div id="powerup-hud"></div>
<canvas id="c" width="480" height="420"></canvas>
<div id="msg">Presioná ESPACIO o tocá para comenzar</div>
<button class="btn" id="btn-r" style="display:none" onclick="init()">▶ REINICIAR</button>
<div id="ctrl">Mouse/touch: paleta · ESPACIO: lanzar · X: disparar láser</div>

<script>
const C=document.getElementById('c'),ctx=C.getContext('2d');
const W=C.width,H=C.height;
const COLS=10,ROWS=6,BW=40,BH=16,BPAD=3;
const BOFFX=(W-(COLS*(BW+BPAD)-BPAD))/2,BOFFY=50;
const COLORS=['#ff0055','#ff6600','#ffe600','#39ff14','#00aaff','#a855f7'];
const POWERUP_TYPES=['WIDE','MULTI','LASER','SLOW','LIFE'];
const POWERUP_COLORS={WIDE:'#00aaff',MULTI:'#ffe600',LASER:'#ff0055',SLOW:'#39ff14',LIFE:'#ff69b4'};
const POWERUP_ICONS={WIDE:'↔',MULTI:'●●',LASER:'⚡',SLOW:'◔',LIFE:'♥'};

let balls=[],pad=null,bricks=[],score=0,lives=3,loop=null,started=false,dead=false,lvl=1;
let best=0;try{best=parseInt(localStorage.getItem('bk_best')||'0');}catch(e){}
let particles=[],powerups=[],lasers=[],activePowerups={};
let mouseX=W/2,keys={};

function tono(freq,dur=80,type='square',vol=0.1){
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    const o=ac.createOscillator(),g=ac.createGain();
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(vol,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur/1000);
    o.connect(g);g.connect(ac.destination);
    o.start();o.stop(ac.currentTime+dur/1000);
  }catch(e){}
}

function init(){
  lvl=1;score=0;lives=3;started=false;dead=false;
  particles=[];powerups=[];lasers=[];activePowerups={};
  document.getElementById('score').textContent=0;
  document.getElementById('lives').textContent=3;
  document.getElementById('lvl').textContent=1;
  document.getElementById('best').textContent=best;
  document.getElementById('msg').textContent='Presioná ESPACIO o tocá para comenzar';
  document.getElementById('btn-r').style.display='none';
  document.getElementById('powerup-hud').textContent='';
  resetBall();makeBricks();
  if(loop)clearInterval(loop);
  draw();
}

function resetBall(){
  pad={x:W/2-40,y:H-28,w:80,h:12,baseW:80};
  balls=[{x:W/2,y:H-50,r:7,vx:3,vy:-4,stuck:true}];
}

function makeBricks(){
  bricks=[];
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(lvl>=3&&((r+c)%3===0)&&r<2)continue;
      if(lvl>=4&&r===2&&(c<2||c>COLS-3))continue;
      const hp=(lvl>=2&&r<2)?2:1;
      bricks.push({x:BOFFX+c*(BW+BPAD),y:BOFFY+r*(BH+BPAD),w:BW,h:BH,color:COLORS[r%COLORS.length],alive:true,hp});
    }
  }
}

function spawnParticles(x,y,color,n=8){
  for(let i=0;i<n;i++){
    particles.push({x,y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,life:1,color,size:2+Math.random()*3});
  }
}

function maybeSpawnPowerup(x,y){
  if(Math.random()<0.18){
    const t=POWERUP_TYPES[Math.floor(Math.random()*POWERUP_TYPES.length)];
    powerups.push({x,y,vy:2,type:t,size:14});
  }
}

function applyPowerup(t){
  tono(880,150,'triangle',0.15);
  if(t==='LIFE'){lives++;document.getElementById('lives').textContent=lives;return;}
  if(t==='MULTI'){
    const src=balls[0];if(!src)return;
    balls.push({x:src.x,y:src.y,r:7,vx:-src.vx,vy:src.vy,stuck:false});
    if(balls.length<4)balls.push({x:src.x,y:src.y,r:7,vx:src.vy,vy:-src.vx,stuck:false});
    return;
  }
  activePowerups[t]=Date.now()+10000;
  if(t==='WIDE'){pad.w=pad.baseW*1.6;pad.x=Math.max(0,Math.min(W-pad.w,pad.x-pad.baseW*0.3));}
  if(t==='SLOW'){balls.forEach(b=>{b.vx*=0.7;b.vy*=0.7;});}
}

function tickPowerups(){
  if(activePowerups.WIDE&&Date.now()>activePowerups.WIDE){pad.w=pad.baseW;delete activePowerups.WIDE;}
  if(activePowerups.SLOW&&Date.now()>activePowerups.SLOW){balls.forEach(b=>{b.vx/=0.7;b.vy/=0.7;});delete activePowerups.SLOW;}
  if(activePowerups.LASER&&Date.now()>activePowerups.LASER)delete activePowerups.LASER;
  const active=Object.keys(activePowerups);
  if(active.length){
    const parts=active.map(a=>{const rem=Math.ceil((activePowerups[a]-Date.now())/1000);return `${POWERUP_ICONS[a]} ${a} (${rem}s)`;});
    document.getElementById('powerup-hud').textContent=parts.join('  ·  ');
  }else document.getElementById('powerup-hud').textContent='';
}

function fireLaser(){
  if(!activePowerups.LASER)return;
  if(pad._lastLaser&&Date.now()-pad._lastLaser<200)return;
  pad._lastLaser=Date.now();
  lasers.push({x:pad.x+8,y:pad.y,vy:-8});
  lasers.push({x:pad.x+pad.w-8,y:pad.y,vy:-8});
  tono(1200,60,'sawtooth',0.08);
}

function step(){
  if(!started){draw();return;}
  pad.x=Math.max(0,Math.min(W-pad.w,mouseX-pad.w/2));
  tickPowerups();
  for(let i=balls.length-1;i>=0;i--){
    const b=balls[i];
    if(b.stuck){b.x=pad.x+pad.w/2;b.y=pad.y-b.r;continue;}
    b.x+=b.vx;b.y+=b.vy;
    if(b.x-b.r<0){b.x=b.r;b.vx*=-1;tono(500,30,'square',0.05);}
    if(b.x+b.r>W){b.x=W-b.r;b.vx*=-1;tono(500,30,'square',0.05);}
    if(b.y-b.r<0){b.y=b.r;b.vy*=-1;tono(500,30,'square',0.05);}
    if(b.y+b.r>H){
      balls.splice(i,1);
      if(balls.length===0){lives--;document.getElementById('lives').textContent=lives;if(lives<=0){gameOver();return;}resetBall();tono(150,300,'sawtooth',0.15);}
      continue;
    }
    if(b.y+b.r>=pad.y&&b.y-b.r<=pad.y+pad.h&&b.x>=pad.x&&b.x<=pad.x+pad.w&&b.vy>0){
      b.y=pad.y-b.r;
      const hit=(b.x-(pad.x+pad.w/2))/(pad.w/2);
      const spd=Math.hypot(b.vx,b.vy);
      b.vx=hit*spd*0.9;b.vy=-Math.sqrt(Math.max(1,spd*spd-b.vx*b.vx));
      tono(700,40,'triangle',0.08);
    }
    for(const br of bricks){
      if(!br.alive)continue;
      if(b.x+b.r>br.x&&b.x-b.r<br.x+br.w&&b.y+b.r>br.y&&b.y-b.r<br.y+br.h){
        br.hp--;
        if(br.hp<=0){
          br.alive=false;score+=10;
          spawnParticles(br.x+br.w/2,br.y+br.h/2,br.color);
          maybeSpawnPowerup(br.x+br.w/2,br.y+br.h/2);
          tono(440+Math.random()*200,80,'square',0.08);
        } else tono(900,40,'square',0.05);
        document.getElementById('score').textContent=score;
        const overlapX=Math.min(b.x+b.r-br.x,br.x+br.w-(b.x-b.r));
        const overlapY=Math.min(b.y+b.r-br.y,br.y+br.h-(b.y-b.r));
        if(overlapX<overlapY)b.vx*=-1;else b.vy*=-1;
        break;
      }
    }
  }
  for(let i=powerups.length-1;i>=0;i--){
    const p=powerups[i];
    p.y+=p.vy;
    if(p.y>pad.y-p.size&&p.y<pad.y+pad.h&&p.x>pad.x&&p.x<pad.x+pad.w){
      applyPowerup(p.type);powerups.splice(i,1);continue;
    }
    if(p.y>H)powerups.splice(i,1);
  }
  for(let i=lasers.length-1;i>=0;i--){
    const l=lasers[i];
    l.y+=l.vy;
    if(l.y<0){lasers.splice(i,1);continue;}
    let hit=false;
    for(const br of bricks){
      if(!br.alive)continue;
      if(l.x>br.x&&l.x<br.x+br.w&&l.y>br.y&&l.y<br.y+br.h){
        br.hp--;hit=true;
        if(br.hp<=0){br.alive=false;score+=10;spawnParticles(br.x+br.w/2,br.y+br.h/2,br.color);maybeSpawnPowerup(br.x+br.w/2,br.y+br.h/2);tono(440+Math.random()*200,60,'square',0.06);}
        document.getElementById('score').textContent=score;
        break;
      }
    }
    if(hit)lasers.splice(i,1);
  }
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life-=0.03;});
  particles=particles.filter(p=>p.life>0);
  if(activePowerups.LASER)fireLaser();
  if(bricks.every(b=>!b.alive)){
    lvl++;document.getElementById('lvl').textContent=lvl;
    makeBricks();resetBall();started=false;
    document.getElementById('msg').textContent=`NIVEL ${lvl} — Presioná ESPACIO`;
    tono(659,150,'triangle',0.1);setTimeout(()=>tono(880,200,'triangle',0.1),120);
  }
  draw();
}

function draw(){
  if(!bricks)return;
  ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(0,170,255,0.04)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  bricks.forEach(b=>{
    if(!b.alive)return;
    ctx.fillStyle=b.color;
    ctx.shadowColor=b.color;ctx.shadowBlur=8;
    ctx.fillRect(b.x,b.y,b.w,b.h);
    if(b.hp>=2){ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=2;ctx.strokeRect(b.x+1,b.y+1,b.w-2,b.h-2);}
    ctx.shadowBlur=0;
  });
  particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);});
  ctx.globalAlpha=1;
  powerups.forEach(p=>{
    ctx.fillStyle=POWERUP_COLORS[p.type];ctx.shadowColor=POWERUP_COLORS[p.type];ctx.shadowBlur=10;
    ctx.fillRect(p.x-p.size,p.y-p.size/2,p.size*2,p.size);
    ctx.shadowBlur=0;
    ctx.fillStyle='#000';ctx.font='bold 11px Courier New';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(POWERUP_ICONS[p.type],p.x,p.y);
  });
  lasers.forEach(l=>{
    ctx.strokeStyle='#ff0055';ctx.shadowColor='#ff0055';ctx.shadowBlur=6;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(l.x,l.y);ctx.lineTo(l.x,l.y+10);ctx.stroke();ctx.shadowBlur=0;
  });
  const g=ctx.createLinearGradient(pad.x,0,pad.x+pad.w,0);
  const padColor=activePowerups.LASER?'#ff0055':'#00aaff';
  g.addColorStop(0,padColor);g.addColorStop(0.5,padColor+'aa');g.addColorStop(1,padColor);
  ctx.fillStyle=g;ctx.shadowColor=padColor;ctx.shadowBlur=12;
  ctx.beginPath();ctx.roundRect(pad.x,pad.y,pad.w,pad.h,4);ctx.fill();ctx.shadowBlur=0;
  balls.forEach(b=>{
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fillStyle='#fff';ctx.shadowColor='#fff';ctx.shadowBlur=14;ctx.fill();ctx.shadowBlur=0;
  });
}

function gameOver(){
  dead=true;started=false;
  if(score>best){best=score;try{localStorage.setItem('bk_best',best);}catch(e){}document.getElementById('best').textContent=best;}
  document.getElementById('msg').textContent=`GAME OVER — ${score} pts`;
  document.getElementById('btn-r').style.display='inline-block';
  ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(0,0,W,H);
  ctx.font='bold 26px Courier New';ctx.fillStyle='#00aaff';ctx.textAlign='center';
  ctx.shadowColor='#00aaff';ctx.shadowBlur=16;ctx.fillText('GAME OVER',W/2,H/2);
  ctx.font='16px Courier New';ctx.fillStyle='#ffe600';ctx.shadowBlur=0;
  ctx.fillText(`Puntaje: ${score}`,W/2,H/2+30);
}

function start(){
  if(dead){init();return;}
  if(started)return;
  started=true;
  balls.forEach(b=>b.stuck=false);
  document.getElementById('msg').textContent='';
  if(!loop)loop=setInterval(step,16);
}

C.addEventListener('mousemove',e=>{const r=C.getBoundingClientRect();mouseX=e.clientX-r.left;});
C.addEventListener('touchmove',e=>{e.preventDefault();const r=C.getBoundingClientRect();mouseX=e.touches[0].clientX-r.left;},{passive:false});
C.addEventListener('touchstart',e=>{e.preventDefault();start();},{passive:false});
C.addEventListener('click',()=>start());
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key===' '){e.preventDefault();start();}
  if(e.key==='x'||e.key==='X'||e.key==='ArrowUp')fireLaser();
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

init();

window.addEventListener('message',e=>{
  if(!e.data||e.data.type!=='keydown')return;
  document.dispatchEvent(new KeyboardEvent('keydown',{key:e.data.key,code:e.data.code,bubbles:true}));
});
</script>
</body>
</html>
