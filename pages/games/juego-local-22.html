<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Piedra Papel Tijera</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a15;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Courier New',monospace;color:#f0f0f0;padding:14px;}
h1{color:#ff6600;font-size:14px;letter-spacing:3px;margin-bottom:10px;}
#scores{display:flex;gap:0;margin-bottom:12px;border:1px solid rgba(255,255,255,0.08);border-radius:10px;overflow:hidden;}
.score-box{padding:10px 20px;text-align:center;flex:1;}
.score-box:first-child{background:rgba(0,170,255,0.08);border-right:1px solid rgba(255,255,255,0.08);}
.score-box:last-child{background:rgba(255,102,0,0.08);}
.score-lbl{font-size:10px;color:#555;letter-spacing:2px;}
.score-val{font-size:28px;font-weight:700;}
#p1 .score-val{color:#00aaff;}
#cpu .score-val{color:#ff6600;}
#arena{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:16px;height:90px;}
.choice-display{width:72px;height:72px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:40px;border:2px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);transition:all .3s;}
.choice-display.reveal{animation:pop .3s ease;}
@keyframes pop{0%{transform:scale(0.5);opacity:0;}60%{transform:scale(1.15);}100%{transform:scale(1);opacity:1;}}
#vs{font-size:16px;font-weight:700;color:#555;letter-spacing:2px;}
#result-text{font-size:16px;font-weight:700;text-align:center;height:24px;margin-bottom:14px;letter-spacing:2px;}
#choices{display:flex;gap:12px;justify-content:center;margin-bottom:12px;}
.choice-btn{width:80px;height:80px;border-radius:14px;border:2px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);cursor:pointer;font-size:38px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.choice-btn:hover:not(:disabled){border-color:var(--c);transform:translateY(-4px);box-shadow:0 8px 20px rgba(0,0,0,0.4);}
.choice-btn:disabled{opacity:.4;cursor:default;}
#rounds{font-size:11px;color:#444;text-align:center;letter-spacing:1px;}
#rounds b{color:#666;}
.btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#aaa;font-family:'Courier New',monospace;font-size:11px;padding:8px 20px;border-radius:8px;cursor:pointer;letter-spacing:1px;margin-top:10px;transition:all .2s;display:none;}
.btn:hover{border-color:#ff6600;color:#ff6600;}
#streak{font-size:11px;color:#ffe600;text-align:center;height:16px;margin-bottom:4px;}
</style>
</head>
<body>
<h1>✊ PIEDRA PAPEL TIJERA</h1>
<div id="scores">
  <div class="score-box" id="p1"><div class="score-lbl">TÚ</div><div class="score-val" id="s-p1">0</div></div>
  <div class="score-box" id="cpu"><div class="score-lbl">CPU</div><div class="score-val" id="s-cpu">0</div></div>
</div>
<div id="streak"></div>
<div id="arena">
  <div class="choice-display" id="d-p1">❓</div>
  <div id="vs">VS</div>
  <div class="choice-display" id="d-cpu">❓</div>
</div>
<div id="result-text">Elegí tu movimiento</div>
<div id="choices">
  <button class="choice-btn" style="--c:#ff3366" onclick="play(0)" title="Piedra">✊</button>
  <button class="choice-btn" style="--c:#00aaff" onclick="play(1)" title="Papel">✋</button>
  <button class="choice-btn" style="--c:#39ff14" onclick="play(2)" title="Tijera">✌️</button>
</div>
<div id="rounds">RONDA <b id="round">1</b> de 7 · Para ganar: <b id="to-win">4</b></div>
<button class="btn" id="btn-new" onclick="newGame()">NUEVA PARTIDA</button>

<script>
const NAMES=['Piedra','Papel','Tijera'];
const ICONS=['✊','✋','✌️'];
const WIN=[[2,0],[0,1],[1,2]]; // [pierde,gana]
let sp1=0,scpu=0,round=1,streak=0,gameOver=false;
const MAXROUNDS=7,TOWIN=4;

// CPU con estrategia simple (no 100% random)
let lastPlayer=null;
function cpuChoice(){
  // 70% random, 30% contra-estrategia
  if(lastPlayer!==null&&Math.random()<0.3){
    return WIN[lastPlayer][1]; // gana a lo que jugó el jugador
  }
  return Math.floor(Math.random()*3);
}

function play(i){
  if(gameOver) return;
  const btns=document.querySelectorAll('.choice-btn');
  btns.forEach(b=>b.disabled=true);
  const cpu=cpuChoice();lastPlayer=i;
  // Mostrar con animación
  const dp1=document.getElementById('d-p1'),dcpu=document.getElementById('d-cpu');
  dp1.textContent='❓';dcpu.textContent='❓';
  setTimeout(()=>{
    dp1.textContent=ICONS[i];dp1.classList.add('reveal');
    setTimeout(()=>{
      dcpu.textContent=ICONS[cpu];dcpu.classList.add('reveal');
      setTimeout(()=>{resolve(i,cpu);},200);
    },300);
  },200);
}

function resolve(p,c){
  const rt=document.getElementById('result-text');
  let msg='',color='#aaa';
  if(p===c){msg='EMPATE';color='#ffe600';}
  else if(WIN[c][1]===p){// cpu gana
    scpu++;streak=0;msg='CPU GANA 😤';color='#ff6600';
    document.getElementById('d-p1').style.opacity='0.5';
  } else {// player gana
    sp1++;streak++;msg=streak>=3?`✅ GANÁS × ${streak}!`:'✅ GANÁS!';color='#39ff14';
    document.getElementById('d-cpu').style.opacity='0.5';
  }
  document.getElementById('s-p1').textContent=sp1;
  document.getElementById('s-cpu').textContent=scpu;
  document.getElementById('result-text').textContent=msg;
  document.getElementById('result-text').style.color=color;
  document.getElementById('streak').textContent=streak>=3?`🔥 Racha de ${streak}!`:'';
  round++;document.getElementById('round').textContent=Math.min(round,MAXROUNDS);
  // Verificar fin
  if(sp1>=TOWIN||scpu>=TOWIN||round>MAXROUNDS){
    gameOver=true;
    setTimeout(()=>{
      if(sp1>scpu){rt.textContent='🏆 ¡GANASTE LA PARTIDA!';rt.style.color='#ffe600';}
      else if(scpu>sp1){rt.textContent='💀 CPU GANA LA PARTIDA';rt.style.color='#ff3366';}
      else{rt.textContent='⚖️ EMPATE';rt.style.color='#ffe600';}
      document.getElementById('btn-new').style.display='block';
    },800);
    return;
  }
  setTimeout(()=>{
    document.getElementById('d-p1').style.opacity='1';
    document.getElementById('d-cpu').style.opacity='1';
    document.getElementById('d-p1').classList.remove('reveal');
    document.getElementById('d-cpu').classList.remove('reveal');
    document.getElementById('d-p1').textContent='❓';
    document.getElementById('d-cpu').textContent='❓';
    document.getElementById('result-text').textContent='Elegí tu movimiento';
    document.getElementById('result-text').style.color='#aaa';
    document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=false);
  },900);
}

function newGame(){
  sp1=0;scpu=0;round=1;streak=0;gameOver=false;lastPlayer=null;
  document.getElementById('s-p1').textContent=0;
  document.getElementById('s-cpu').textContent=0;
  document.getElementById('round').textContent=1;
  document.getElementById('result-text').textContent='Elegí tu movimiento';
  document.getElementById('result-text').style.color='#aaa';
  document.getElementById('d-p1').textContent='❓';
  document.getElementById('d-cpu').textContent='❓';
  document.getElementById('streak').textContent='';
  document.getElementById('btn-new').style.display='none';
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=false);
}
</script>
</body>
</html>
