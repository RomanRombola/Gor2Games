<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Crucigrama</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a15;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Courier New',monospace;color:#f0f0f0;padding:12px;}
h1{color:#ffe600;font-size:14px;letter-spacing:3px;margin-bottom:8px;}
#hud{display:flex;gap:16px;margin-bottom:8px;font-size:12px;color:#aaa;}
#hud b{color:#ffe600;}
#grid{display:grid;gap:2px;margin-bottom:10px;}
.cell{width:28px;height:28px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;position:relative;text-transform:uppercase;}
.cell.block{background:#0a0a15;}
.cell.empty{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);cursor:pointer;}
.cell.empty:hover,.cell.empty.active{border-color:rgba(255,230,0,0.5);background:rgba(255,230,0,0.08);}
.cell.correct{background:rgba(57,255,20,0.15);border-color:#39ff14;color:#39ff14;}
.cell.wrong{background:rgba(255,51,102,0.1);border-color:rgba(255,51,102,0.3);color:#ff6666;}
.num{position:absolute;top:1px;left:2px;font-size:7px;color:#888;font-weight:400;}
#clues{display:flex;gap:16px;max-width:400px;width:100%;}
.clue-col{flex:1;}
.clue-title{font-size:10px;color:#ff6600;letter-spacing:2px;margin-bottom:6px;font-weight:700;}
.clue{font-size:11px;color:#888;margin-bottom:4px;cursor:pointer;padding:2px 4px;border-radius:3px;}
.clue:hover,.clue.active{color:#ffe600;background:rgba(255,230,0,0.07);}
.clue.done{color:#39ff14;}
#msg{font-size:13px;font-weight:700;text-align:center;height:20px;color:#39ff14;margin-bottom:6px;}
.btn{background:rgba(255,230,0,0.08);border:1px solid rgba(255,230,0,0.2);color:#ffe600;font-family:'Courier New',monospace;font-size:11px;font-weight:700;padding:7px 18px;border-radius:8px;cursor:pointer;letter-spacing:1px;transition:all .2s;}
.btn:hover{box-shadow:0 0 10px rgba(255,230,0,0.3);}
</style>
</head>
<body>
<h1>✏️ CRUCIGRAMA</h1>
<div id="hud"><span>CORRECTAS <b id="correct">0</b>/10</span><span>⏱ <b id="time">0</b>s</span></div>
<div id="msg"></div>
<div id="grid"></div>
<div id="clues">
  <div class="clue-col"><div class="clue-title">→ HORIZONTAL</div><div id="across-clues"></div></div>
  <div class="clue-col"><div class="clue-title">↓ VERTICAL</div><div id="down-clues"></div></div>
</div>
<button class="btn" style="margin-top:10px" onclick="checkAll()">✓ VERIFICAR</button>
<button class="btn" style="margin-top:6px" onclick="newPuzzle()">🔄 NUEVO</button>

<script>
// Puzzle fijo de 11x11
const PUZZLES=[{
  size:11,
  layout:[
    "###SOL####",
    "##LUNA####",
    "#MAR######",
    "GATO######",
    "###NOCHE##",
    "##FUEGO###",
    "#AGUA#####",
    "TIERRA####",
    "###VIENTO#",
    "##PIEDRA##",
    "#FLOR#####",
  ],
  across:[
    {n:1,r:0,c:3,word:"SOL",clue:"1→ Estrella que ilumina el día"},
    {n:2,r:1,c:2,word:"LUNA",clue:"2→ Satélite natural de la Tierra"},
    {n:3,r:2,c:1,word:"MAR",clue:"3→ Gran extensión de agua salada"},
    {n:4,r:3,c:0,word:"GATO",clue:"4→ Felino doméstico"},
    {n:5,r:4,c:3,word:"NOCHE",clue:"5→ Período sin luz solar"},
    {n:6,r:5,c:2,word:"FUEGO",clue:"6→ Calor y luz de la combustión"},
    {n:7,r:6,c:1,word:"AGUA",clue:"7→ Líquido vital H₂O"},
    {n:8,r:7,c:0,word:"TIERRA",clue:"8→ Nuestro planeta"},
    {n:9,r:8,c:3,word:"VIENTO",clue:"9→ Aire en movimiento"},
    {n:10,r:9,c:2,word:"PIEDRA",clue:"10→ Roca sólida"},
  ],
  down:[]
}];

let puzzle,userGrid,selected=null,timerInt,elapsed=0,started=false;

function newPuzzle(){
  clearInterval(timerInt);elapsed=0;started=false;
  document.getElementById('time').textContent='0';
  document.getElementById('msg').textContent='';
  document.getElementById('correct').textContent='0';
  puzzle=PUZZLES[0];
  const {size,layout,across}=puzzle;
  userGrid=Array.from({length:size},(_,r)=>Array.from({length:layout[r]?.length||size},(_,c)=>layout[r]?.[c]==='#'?null:''));
  renderGrid();renderClues();
}

function renderGrid(){
  const g=document.getElementById('grid');
  const {size,layout,across}=puzzle;
  g.style.gridTemplateColumns=`repeat(${layout[0].length},28px)`;
  g.innerHTML='';
  // Numerar celdas
  const nums={};across.forEach(({n,r,c})=>nums[`${r},${c}`]=n);
  layout.forEach((row,r)=>{
    row.split('').forEach((ch,c)=>{
      const div=document.createElement('div');
      if(ch==='#'){div.className='cell block';}
      else{
        div.className='cell empty';
        const numKey=`${r},${c}`;
        if(nums[numKey]){const s=document.createElement('span');s.className='num';s.textContent=nums[numKey];div.appendChild(s);}
        const val=userGrid[r]?.[c]||'';
        if(val){const t=document.createTextNode(val);div.appendChild(t);}
        div.addEventListener('click',()=>selectCell(r,c,div));
      }
      g.appendChild(div);
    });
  });
}

function selectCell(r,c,div){
  if(!started){started=true;timerInt=setInterval(()=>{elapsed++;document.getElementById('time').textContent=elapsed;},1000);}
  selected={r,c};
  document.querySelectorAll('.cell.active').forEach(el=>el.classList.remove('active'));
  div.classList.add('active');
  // Highlight pista
  puzzle.across.forEach(({r:ar,c:ac,word},i)=>{
    if(r===ar&&c>=ac&&c<ac+word.length){
      document.querySelectorAll('.clue').forEach(el=>el.classList.remove('active'));
      document.querySelectorAll('.clue')[i]?.classList.add('active');
    }
  });
}

function renderClues(){
  const ac=document.getElementById('across-clues');
  ac.innerHTML=puzzle.across.map(({clue,word},i)=>`<div class="clue" onclick="goToClue(${i})">${clue}</div>`).join('');
  document.getElementById('down-clues').innerHTML='<div class="clue" style="color:#555">Solo horizontal</div>';
}

function goToClue(i){
  const {r,c}=puzzle.across[i];
  const cells=document.querySelectorAll('.cell:not(.block)');
  const idx=r*puzzle.layout[0].length+c;
  // Encontrar la celda correcta
  const allCells=document.querySelectorAll('.cell');
  let pos=0;
  for(let ri=0;ri<puzzle.layout.length;ri++){
    for(let ci=0;ci<puzzle.layout[ri].length;ci++){
      if(puzzle.layout[ri][ci]!=='#'){
        if(ri===r&&ci===c){allCells[ri*puzzle.layout[0].length+ci]?.click();return;}
      }
    }
  }
}

function checkAll(){
  let correct=0;
  puzzle.across.forEach(({r,c,word})=>{
    let wordCorrect=true;
    for(let i=0;i<word.length;i++){
      const v=(userGrid[r]?.[c+i]||'').toUpperCase();
      if(v!==word[i]) wordCorrect=false;
    }
    if(wordCorrect) correct++;
  });
  document.getElementById('correct').textContent=correct;
  if(correct===puzzle.across.length){
    clearInterval(timerInt);
    document.getElementById('msg').textContent=`🏆 COMPLETADO en ${elapsed}s!`;
  } else {
    document.getElementById('msg').textContent=`${correct}/${puzzle.across.length} palabras correctas`;
  }
  // Colorear
  const allCells=document.querySelectorAll('.cell:not(.block)');
  puzzle.across.forEach(({r,c,word})=>{
    let wordCorrect=true;
    for(let i=0;i<word.length;i++){if((userGrid[r]?.[c+i]||'').toUpperCase()!==word[i])wordCorrect=false;}
    for(let i=0;i<word.length;i++){
      const cellIdx=r*puzzle.layout[0].length+(c+i);
      allCells[cellIdx]?.classList.add(wordCorrect?'correct':'');
    }
  });
}

document.addEventListener('keydown',e=>{
  if(!selected) return;
  const{r,c}=selected;
  if(e.key.length===1&&e.key.match(/[a-zA-ZáéíóúüñÁÉÍÓÚÜÑ]/)){
    if(userGrid[r]) userGrid[r][c]=e.key.toUpperCase();
    // Avanzar cursor
    const word=puzzle.across.find(({r:ar,c:ac,word})=>r===ar&&c>=ac&&c<ac+word.length);
    if(word&&c+1<word.c+word.word.length){selected={r,c:c+1};}
    renderGrid();
  }
  if(e.key==='Backspace'){if(userGrid[r])userGrid[r][c]='';renderGrid();}
  if(e.key==='ArrowRight'&&userGrid[r]&&userGrid[r][c+1]!==undefined&&userGrid[r][c+1]!==null){selected={r,c:c+1};}
  if(e.key==='ArrowLeft'&&c>0&&userGrid[r]&&userGrid[r][c-1]!==undefined&&userGrid[r][c-1]!==null){selected={r,c:c-1};}
});
window.addEventListener('message',e=>{
  if(e.data?.type==='keydown'){
    const ev={key:e.data.key};document.dispatchEvent(new KeyboardEvent('keydown',ev));
  }
});

newPuzzle();
</script>
</body>
</html>
