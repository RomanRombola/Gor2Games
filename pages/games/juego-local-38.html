<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Whack-a-Mole</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a15;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Courier New',monospace;color:#f0f0f0;padding:12px;}
h1{color:#ff6600;font-size:14px;letter-spacing:3px;margin-bottom:8px;}
#hud{display:flex;gap:18px;margin-bottom:10px;font-size:13px;color:#aaa;}
#hud b{color:#ff6600;}
#timer-bar-wrap{width:280px;height:6px;background:rgba(255,255,255,0.07);border-radius:3px;margin-bottom:12px;overflow:hidden;}
#timer-bar{height:100%;background:linear-gradient(90deg,#ff6600,#ffe600);border-radius:3px;transition:width .1s linear;}
#grid{display:grid;grid-template-columns:repeat(3,90px);grid-template-rows:repeat(3,90px);gap:10px;margin-bottom:12px;}
.hole{width:90px;height:90px;border-radius:50%;background:rgba(0,0,0,0.4);border:3px solid rgba(255,102,0,0.2);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;cursor:pointer;transition:border-color .1s;}
.mole{font-size:44px;position:absolute;bottom:-60px;transition:bottom .1s ease;user-select:none;pointer-events:none;}
.mole.up{bottom:2px;}
.hole.active{border-color:rgba(255,102,0,0.6);}
.hole.hit{border-color:#ffe600;background:rgba(255,230,0,0.1);}
.hole.bomb{border-color:rgba(255,51,102,0.5);}
#combo{font-size:13px;color:#ffe600;text-align:center;height:18px;margin-bottom:6px;}
.btn{background:linear-gradient(135deg,#1a3a0a,#2a5a15);border:1px solid rgba(57,255,20,0.3);color:#39ff14;font-family:'Courier New',monospace;font-size:12px;font-weight:700;padding:10px 28px;border-radius:10px;cursor:pointer;letter-spacing:1px;transition:all .2s;}
.btn:hover{box-shadow:0 0 14px rgba(57,255,20,0.4);}
#result{display:none;text-align:center;margin-top:10px;}
.big-score{font-size:44px;font-weight:700;color:#ff6600;}
</style>
</head>
<body>
<h1>🔨 WHACK-A-MOLE</h1>
<div id="hud">
  <span>SCORE <b id="sc">0</b></span>
  <span>NIVEL <b id="nl">1</b></span>
  <span>MEJOR <b id="best">0</b></span>
</div>
<div id="timer-bar-wrap"><div id="timer-bar" style="width:100%"></div></div>
<div id="combo"></div>
<div id="grid"></div>
<div id="result">
  <div class="big-score" id="r-score">0</div>
  <div style="color:#aaa;font-size:13px;margin:6px 0">puntos · Nivel <span id="r-level">1</span></div>
  <button class="btn" onclick="startGame()">🔄 JUGAR DE NUEVO</button>
</div>
<button class="btn" id="start-btn" onclick="startGame()">▶ EMPEZAR</button>

<script>
const MOLES=['🐹','🐭','🐀','🐱','🦔'];
const BOMBS=['💣','💀'];
let holes,score,level,best=0,timeLeft,timerInt,moleTimers=[],combo,gameActive=false;
const GRID_SIZE=9,GAME_TIME=30;

function buildGrid(){
  const g=document.getElementById('grid');g.innerHTML='';
  holes=[];
  for(let i=0;i<GRID_SIZE;i++){
    const hole=document.createElement('div');hole.className='hole';
    const mole=document.createElement('div');mole.className='mole';
    hole.appendChild(mole);
    hole.addEventListener('click',()=>whack(i));
    hole.addEventListener('touchstart',e=>{e.preventDefault();whack(i);},{passive:false});
    g.appendChild(hole);holes.push({el:hole,moleEl:mole,active:false,isBomb:false,timer:null});
  }
}

function startGame(){
  document.getElementById('start-btn').style.display='none';
  document.getElementById('result').style.display='none';
  buildGrid();
  score=0;level=1;combo=0;timeLeft=GAME_TIME;gameActive=true;
  document.getElementById('sc').textContent=0;
  document.getElementById('nl').textContent=1;
  document.getElementById('combo').textContent='';
  document.getElementById('timer-bar').style.width='100%';
  document.getElementById('timer-bar').style.background='linear-gradient(90deg,#ff6600,#ffe600)';
  clearInterval(timerInt);
  timerInt=setInterval(()=>{
    timeLeft-=0.1;
    document.getElementById('timer-bar').style.width=(timeLeft/GAME_TIME*100)+'%';
    if(timeLeft<=10) document.getElementById('timer-bar').style.background='#ff3366';
    if(timeLeft<=0){clearInterval(timerInt);endGame();}
  },100);
  spawnLoop();
}

function getSpeed(){return Math.max(400,1000-level*80);}

function spawnLoop(){
  if(!gameActive)return;
  const emptyHoles=holes.map((h,i)=>({h,i})).filter(({h})=>!h.active);
  if(emptyHoles.length>0){
    const count=Math.min(1+Math.floor(level/2),3);
    const toSpawn=emptyHoles.sort(()=>Math.random()-0.5).slice(0,count);
    toSpawn.forEach(({i})=>showMole(i));
  }
  const interval=Math.max(500,900-level*60);
  setTimeout(()=>spawnLoop(),interval);
}

function showMole(i){
  const h=holes[i];if(h.active)return;
  const isBomb=level>=3&&Math.random()<0.2;
  h.active=true;h.isBomb=isBomb;
  h.moleEl.textContent=isBomb?BOMBS[Math.floor(Math.random()*BOMBS.length)]:MOLES[Math.floor(Math.random()*MOLES.length)];
  h.el.classList.add('active');if(isBomb)h.el.classList.add('bomb');
  h.moleEl.classList.add('up');
  const spd=getSpeed();
  h.timer=setTimeout(()=>hideMole(i),spd);
}

function hideMole(i){
  const h=holes[i];
  h.active=false;h.isBomb=false;
  h.moleEl.classList.remove('up');
  h.el.classList.remove('active','hit','bomb');
  clearTimeout(h.timer);
}

function whack(i){
  if(!gameActive)return;
  const h=holes[i];if(!h.active)return;
  clearTimeout(h.timer);
  if(h.isBomb){
    score=Math.max(0,score-30);combo=0;
    document.getElementById('combo').textContent='💣 -30 BOMBA!';
    h.el.style.background='rgba(255,51,102,0.3)';
    setTimeout(()=>{h.el.style.background='';},300);
  } else {
    combo++;
    const pts=10*combo;score+=pts;
    document.getElementById('combo').textContent=combo>=3?`🔥 COMBO x${combo}! +${pts}`:`+${pts}`;
    h.el.classList.add('hit');
    // Efecto visual
    h.moleEl.style.transform='scale(1.3)';
    setTimeout(()=>h.moleEl.style.transform='',150);
  }
  document.getElementById('sc').textContent=score;
  // Subir nivel
  level=Math.floor(score/150)+1;
  document.getElementById('nl').textContent=level;
  hideMole(i);
}

function endGame(){
  gameActive=false;holes.forEach((_,i)=>hideMole(i));
  if(score>best){best=score;document.getElementById('best').textContent=best;}
  document.getElementById('r-score').textContent=score;
  document.getElementById('r-level').textContent=level;
  document.getElementById('result').style.display='block';
}

buildGrid();
</script>
</body>
</html>
