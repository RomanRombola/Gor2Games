<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Asteroids</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a15;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:'Courier New',monospace;}
h1{color:#a855f7;font-size:15px;letter-spacing:3px;margin-bottom:6px;text-shadow:0 0 10px rgba(168,85,247,0.6);}
#hud{display:flex;gap:20px;margin-bottom:6px;font-size:12px;color:#aaa;}
#hud b{color:#a855f7;}
canvas{border:2px solid rgba(168,85,247,0.3);border-radius:8px;}
#ctrl{margin-top:8px;font-size:10px;color:#444;text-align:center;letter-spacing:1px;}
</style>
</head>
<body>
<h1>☄️ ASTEROIDS</h1>
<div id="hud"><span>SCORE <b id="sc">0</b></span><span>VIDAS <b id="lv">3</b></span><span>NIVEL <b id="nl">1</b></span></div>
<canvas id="c" width="420" height="420"></canvas>
<div id="ctrl">← → girar · ↑ impulso · ESPACIO disparar</div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const W=420,H=420;
let ship,bullets,asteroids,score,lives,level,invincible,state,keys={},loop,particles=[];

function initShip(){return{x:W/2,y:H/2,angle:-Math.PI/2,vx:0,vy:0,r:12,thrust:false};}

function makeAsteroid(x,y,r){
  const ang=Math.random()*Math.PI*2;
  const spd=0.6+Math.random()*1.2+(level*0.15);
  const pts=[];const n=7+Math.floor(Math.random()*5);
  for(let i=0;i<n;i++){const a=i/n*Math.PI*2;const d=r*(0.7+Math.random()*0.6);pts.push([Math.cos(a)*d,Math.sin(a)*d]);}
  return{x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,r,pts,rot:0,rotSpd:(Math.random()-0.5)*0.03};
}

function spawnWave(){
  const count=3+level;
  for(let i=0;i<count;i++){
    let x,y;
    do{x=Math.random()*W;y=Math.random()*H;}while(Math.hypot(x-ship.x,y-ship.y)<120);
    asteroids.push(makeAsteroid(x,y,32+Math.random()*16));
  }
}

function init(){
  ship=initShip();bullets=[];asteroids=[];particles=[];
  score=0;lives=3;level=1;invincible=60;state='play';
  document.getElementById('sc').textContent=0;
  document.getElementById('lv').textContent=3;
  document.getElementById('nl').textContent=1;
  spawnWave();
  if(loop) cancelAnimationFrame(loop);
  tick();
}

function explode(x,y,color,n=12){
  for(let i=0;i<n;i++) particles.push({x,y,vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5,life:1,color:color||'#a855f7'});
}

function tick(){
  if(state!=='play') return;
  // Ship
  if(keys['ArrowLeft']||keys['a']||keys['A']) ship.angle-=0.06;
  if(keys['ArrowRight']||keys['d']||keys['D']) ship.angle+=0.06;
  ship.thrust=keys['ArrowUp']||keys['w']||keys['W'];
  if(ship.thrust){ship.vx+=Math.cos(ship.angle)*0.22;ship.vy+=Math.sin(ship.angle)*0.22;}
  ship.vx*=0.98;ship.vy*=0.98;
  const MAX_SPD=6;const spd=Math.hypot(ship.vx,ship.vy);
  if(spd>MAX_SPD){ship.vx=ship.vx/spd*MAX_SPD;ship.vy=ship.vy/spd*MAX_SPD;}
  ship.x=(ship.x+ship.vx+W)%W;ship.y=(ship.y+ship.vy+H)%H;
  if(invincible>0) invincible--;
  // Bullets
  bullets.forEach(b=>{b.x=(b.x+b.vx+W)%W;b.y=(b.y+b.vy+H)%H;b.life--;});
  bullets=bullets.filter(b=>b.life>0);
  // Asteroids
  asteroids.forEach(a=>{a.x=(a.x+a.vx+W)%W;a.y=(a.y+a.vy+H)%H;a.rot+=a.rotSpd;});
  // Colisión bala-asteroide
  for(let bi=bullets.length-1;bi>=0;bi--){
    for(let ai=asteroids.length-1;ai>=0;ai--){
      if(Math.hypot(bullets[bi].x-asteroids[ai].x,bullets[bi].y-asteroids[ai].y)<asteroids[ai].r){
        bullets.splice(bi,1);
        const a=asteroids.splice(ai,1)[0];
        explode(a.x,a.y,'#a855f7');
        const pts=a.r>20?10:a.r>12?20:50;
        score+=pts;document.getElementById('sc').textContent=score;
        if(a.r>20){asteroids.push(makeAsteroid(a.x,a.y,a.r*0.55));asteroids.push(makeAsteroid(a.x,a.y,a.r*0.55));}
        break;
      }
    }
  }
  // Colisión ship-asteroide
  if(invincible<=0){
    for(const a of asteroids){
      if(Math.hypot(ship.x-a.x,ship.y-a.y)<a.r+ship.r*0.7){
        explode(ship.x,ship.y,'#ff3366',20);
        lives--;document.getElementById('lv').textContent=Math.max(0,lives);
        if(lives<=0){state='dead';draw();return;}
        ship=initShip();invincible=120;break;
      }
    }
  }
  // Siguiente nivel
  if(asteroids.length===0){level++;document.getElementById('nl').textContent=level;spawnWave();}
  // Partículas
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=0.05;p.vx*=0.92;p.vy*=0.92;});
  particles=particles.filter(p=>p.life>0);
  draw();loop=requestAnimationFrame(tick);
}

let shootCD=0;
function tryShoot(){
  if(state!=='play') return;
  if(shootCD>0) return;
  shootCD=12;
  bullets.push({x:ship.x+Math.cos(ship.angle)*ship.r,y:ship.y+Math.sin(ship.angle)*ship.r,vx:Math.cos(ship.angle)*9,vy:Math.sin(ship.angle)*9,life:55});
  setTimeout(()=>{if(shootCD>0)shootCD--;},12);
}

function draw(){
  ctx.fillStyle='#050510';ctx.fillRect(0,0,W,H);
  // Estrellas
  ctx.fillStyle='rgba(255,255,255,0.25)';
  for(let i=0;i<60;i++) ctx.fillRect((i*83)%W,(i*53)%H,i%3===0?2:1,i%3===0?2:1);
  // Partículas
  particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.fillRect(p.x-1.5,p.y-1.5,3,3);});
  ctx.globalAlpha=1;
  // Asteroides
  asteroids.forEach(a=>{
    ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.rot);
    ctx.strokeStyle='rgba(168,85,247,0.8)';ctx.lineWidth=1.5;
    ctx.shadowColor='#a855f7';ctx.shadowBlur=5;
    ctx.beginPath();a.pts.forEach(([x,y],i)=>i===0?ctx.moveTo(x,y):ctx.lineTo(x,y));
    ctx.closePath();ctx.stroke();ctx.shadowBlur=0;ctx.restore();
  });
  // Nave
  if(invincible%8<5||invincible<=0){
    ctx.save();ctx.translate(ship.x,ship.y);ctx.rotate(ship.angle);
    ctx.shadowColor='#00aaff';ctx.shadowBlur=10;
    ctx.strokeStyle='#00aaff';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(ship.r,0);ctx.lineTo(-ship.r,-ship.r*0.7);ctx.lineTo(-ship.r*0.5,0);ctx.lineTo(-ship.r,ship.r*0.7);ctx.closePath();ctx.stroke();
    if(ship.thrust){
      ctx.strokeStyle='#ff6600';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(-ship.r*0.5,0);ctx.lineTo(-ship.r*(1+Math.random()*0.5),0);ctx.stroke();
    }
    ctx.shadowBlur=0;ctx.restore();
  }
  // Balas
  ctx.shadowColor='#ffe600';ctx.shadowBlur=8;
  ctx.fillStyle='#ffe600';
  bullets.forEach(b=>{ctx.beginPath();ctx.arc(b.x,b.y,2.5,0,Math.PI*2);ctx.fill();});
  ctx.shadowBlur=0;
  if(state==='dead'){
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ff3366';ctx.font='bold 22px Courier New';ctx.textAlign='center';
    ctx.fillText('GAME OVER',W/2,H/2-24);
    ctx.fillStyle='#a855f7';ctx.font='15px Courier New';
    ctx.fillText(`Score: ${score}`,W/2,H/2+4);
    ctx.fillStyle='#aaa';ctx.font='12px Courier New';
    ctx.fillText('ESPACIO para reintentar',W/2,H/2+30);
  }
  if(state==='wait'){
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#a855f7';ctx.font='bold 20px Courier New';ctx.textAlign='center';
    ctx.fillText('ASTEROIDS',W/2,H/2-12);
    ctx.fillStyle='#aaa';ctx.font='12px Courier New';
    ctx.fillText('ESPACIO para empezar',W/2,H/2+16);
  }
}

document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key===' '){e.preventDefault();if(state==='dead'||state==='wait')init();else tryShoot();}
  if(['ArrowUp','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  if(shootCD>0) shootCD--;
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
// Disparo automático al mantener espacio
setInterval(()=>{if(keys[' ']&&state==='play'){shootCD=0;tryShoot();}if(shootCD>0)shootCD--;},80);
window.addEventListener('message',e=>{
  if(!e.data) return;
  if(e.data.type==='keydown'){keys[e.data.key]=true;if(e.data.key===' '){if(state==='dead'||state==='wait')init();else{shootCD=0;tryShoot();}}}
  if(e.data.type==='keyup') keys[e.data.key]=false;
});
state='wait';draw();
</script>
</body>
</html>
