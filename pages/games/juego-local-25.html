<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pac-Man</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a15;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:'Courier New',monospace;}
h1{color:#ffe600;font-size:15px;letter-spacing:3px;margin-bottom:5px;}
#hud{display:flex;gap:18px;margin-bottom:5px;font-size:12px;color:#aaa;}
#hud b{color:#ffe600;}
canvas{border:2px solid rgba(255,230,0,0.2);border-radius:6px;}
#ctrl{margin-top:6px;font-size:10px;color:#444;letter-spacing:1px;}
</style>
</head>
<body>
<h1>🟡 PAC-MAN</h1>
<div id="hud"><span>SCORE <b id="sc">0</b></span><span>MEJOR <b id="best">0</b></span><span>VIDAS <b id="lv">3</b></span></div>
<canvas id="c"></canvas>
<div id="ctrl">WASD o FLECHAS para mover</div>
<script>
const MAZE_STR=[
  "####################",
  "#........##........#",
  "#.##.###.##.###.##.#",
  "#o##.###.##.###.##o#",
  "#.##.###.##.###.##.#",
  "#..................#",
  "#.##.##.####.##.##.#",
  "#.##.##.####.##.##.#",
  "#....##..##..##....#",
  "####.###.##.###.####",
  "    .###.##.###.    ",
  "####.##      ##.####",
  "     .   GG  .      ",
  "####.## #### ##.####",
  "    .##      ##.    ",
  "####.## #### ##.####",
  "#........##........#",
  "#.##.###.##.###.##.#",
  "#o..###..  ..###..o#",
  "###.###.####.###.###",
  "#......####......  #",  // fixed
  "#.##.##.####.##.##.#",
  "#.##.##.####.##.##.#",
  "#....##..##..##....#",
  "#.######.##.######.#",
  "#..................#",
  "####################",
];
const ROWS=MAZE_STR.length,COLS=MAZE_STR[0].length;
const TS=16; // tile size
const W=COLS*TS,H=ROWS*TS;
const cv=document.getElementById('c');cv.width=W;cv.height=H;
const ctx=cv.getContext('2d');

let maze,dots,pac,ghosts,score,lives,best=0,state,keys={},loop,energized,eTimer,ghostScore;

function parseMaze(){
  maze=[];dots=[];
  for(let r=0;r<ROWS;r++){
    maze[r]=[];
    for(let c=0;c<COLS;c++){
      const ch=MAZE_STR[r][c]||' ';
      maze[r][c]=ch;
      if(ch==='.') dots.push({r,c,type:'dot',eaten:false});
      if(ch==='o') dots.push({r,c,type:'power',eaten:false});
    }
  }
}

function initPac(){return{r:23,c:10,pr:23,pc:10,dir:{dr:0,dc:0},next:{dr:0,dc:0},angle:0.15,open:true,timer:0,speed:0.12};}

const GHOST_COLORS=['#ff3366','#ff9900','#00ffcc','#ff69b4'];
const GHOST_START=[[13,9],[13,10],[13,11],[13,12]];
function initGhosts(){
  return GHOST_COLORS.map((c,i)=>({r:GHOST_START[i][0],c:GHOST_START[i][1],color:c,pr:GHOST_START[i][0],pc:GHOST_START[i][1],dir:{dr:-1,dc:0},timer:0,speed:0.1+i*0.015,out:i===0,outTimer:i*80,scared:false,eaten:false}));
}

function init(){
  parseMaze();
  pac=initPac();ghosts=initGhosts();
  score=0;lives=3;energized=false;eTimer=0;ghostScore=200;state='wait';
  document.getElementById('sc').textContent=0;document.getElementById('lv').textContent=3;
}

function canMove(r,c){
  if(r<0||r>=ROWS||c<0||c>=COLS) return false;
  const ch=maze[r][c];
  return ch!=='#';
}

function movePac(){
  pac.timer+=pac.speed;
  if(pac.timer<1) return;
  pac.timer=0;
  const {dr:ndr,dc:ndc}=pac.next;
  const nr=Math.round(pac.r)+ndr,nc=Math.round(pac.c)+ndc;
  if(canMove(nr,nc)){pac.dir={dr:ndr,dc:ndc};}
  const {dr,dc}=pac.dir;
  const mr=Math.round(pac.r)+dr,mc=Math.round(pac.c)+dc;
  if(dr!==0||dc!==0){
    if(canMove(mr,mc)){pac.r=((mr+ROWS)%ROWS);pac.c=((mc+COLS)%COLS);}
  }
  pac.open=!pac.open;
  // Comer
  dots.forEach(d=>{
    if(!d.eaten&&Math.round(pac.r)===d.r&&Math.round(pac.c)===d.c){
      d.eaten=true;
      if(d.type==='power'){score+=50;energized=true;eTimer=250;ghostScore=200;ghosts.forEach(g=>g.scared=true);}
      else score+=10;
      document.getElementById('sc').textContent=score;
    }
  });
  // Victoria
  if(dots.every(d=>d.eaten)){state='win';draw();}
}

function moveGhost(g){
  if(!g.out){g.outTimer--;if(g.outTimer<=0){g.out=true;g.r=11;g.c=10;}return;}
  g.timer+=g.scared?g.speed*0.5:g.speed;
  if(g.timer<1) return;
  g.timer=0;
  const pr=Math.round(g.r),pc=Math.round(g.c);
  // Opciones de movimiento
  const dirs=[{dr:-1,dc:0},{dr:1,dc:0},{dr:0,dc:-1},{dr:0,dc:1}];
  const valid=dirs.filter(d=>{
    const nr=pr+d.dr,nc=pc+d.dc;
    return canMove(nr,nc)&&!(d.dr===-g.dir.dr&&d.dc===-g.dir.dc);
  });
  if(valid.length===0) return;
  // Perseguir o huir
  let chosen;
  if(g.scared){chosen=valid[Math.floor(Math.random()*valid.length)];}
  else{
    const target={r:Math.round(pac.r),c:Math.round(pac.c)};
    chosen=valid.reduce((best,d)=>{
      const nr=pr+d.dr,nc=pc+d.dc;
      const dist=Math.hypot(nr-target.r,nc-target.c);
      const bd=Math.hypot(pr+best.dr-target.r,pc+best.dc-target.c);
      return dist<bd?d:best;
    });
    // 20% random para no ser perfectos
    if(Math.random()<0.2) chosen=valid[Math.floor(Math.random()*valid.length)];
  }
  g.dir=chosen;
  g.r=((pr+chosen.dr)+ROWS)%ROWS;
  g.c=((pc+chosen.dc)+COLS)%COLS;
}

function checkCollisions(){
  ghosts.forEach(g=>{
    if(g.eaten) return;
    if(Math.abs(Math.round(pac.r)-Math.round(g.r))<1&&Math.abs(Math.round(pac.c)-Math.round(g.c))<1){
      if(g.scared){g.eaten=true;g.scared=false;score+=ghostScore;ghostScore*=2;document.getElementById('sc').textContent=score;}
      else{lives--;document.getElementById('lv').textContent=Math.max(0,lives);if(lives<=0){state='dead';return;}pac=initPac();}
    }
  });
}

function tick(){
  if(state!=='play') return;
  if(energized){eTimer--;if(eTimer<=0){energized=false;ghosts.forEach(g=>{g.scared=false;if(g.eaten){g.eaten=false;g.r=13;g.c=10;}});}}
  movePac();ghosts.forEach(g=>moveGhost(g));checkCollisions();
  draw();loop=requestAnimationFrame(tick);
}

function draw(){
  ctx.fillStyle='#050510';ctx.fillRect(0,0,W,H);
  // Maze
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    if(maze[r][c]==='#'){
      ctx.fillStyle='#1a1a6a';ctx.fillRect(c*TS,r*TS,TS,TS);
      ctx.strokeStyle='rgba(0,0,180,0.5)';ctx.lineWidth=1;ctx.strokeRect(c*TS+0.5,r*TS+0.5,TS-1,TS-1);
    }
  }
  // Dots
  dots.filter(d=>!d.eaten).forEach(d=>{
    ctx.fillStyle=d.type==='power'?'#ffe600':'rgba(255,230,100,0.7)';
    ctx.shadowColor=d.type==='power'?'#ffe600':'transparent';
    ctx.shadowBlur=d.type==='power'?8:0;
    ctx.beginPath();ctx.arc(d.c*TS+TS/2,d.r*TS+TS/2,d.type==='power'?5:2,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  });
  // Ghosts
  ghosts.filter(g=>g.out&&!g.eaten).forEach(g=>{
    const x=Math.round(g.c)*TS,y=Math.round(g.r)*TS;
    const c=g.scared?(eTimer%30<15?'#8888ff':'#4444ff'):g.color;
    ctx.fillStyle=c;ctx.shadowColor=c;ctx.shadowBlur=6;
    ctx.beginPath();ctx.arc(x+TS/2,y+TS/2,TS/2-1,Math.PI,0,false);
    ctx.lineTo(x+TS-1,y+TS);
    for(let i=0;i<3;i++){ctx.lineTo(x+TS-i*(TS/3)-TS/6,y+TS-(i%2===0?4:0));ctx.lineTo(x+TS-(i+1)*(TS/3)+TS/6,y+TS-(i%2===0?0:4));}
    ctx.lineTo(x+1,y+TS);ctx.closePath();ctx.fill();
    if(!g.scared){ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x+TS/2-3,y+TS/2-2,3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+TS/2+3,y+TS/2-2,3,0,Math.PI*2);ctx.fill();ctx.fillStyle='#00f';ctx.beginPath();ctx.arc(x+TS/2-2,y+TS/2-2,1.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+TS/2+4,y+TS/2-2,1.5,0,Math.PI*2);ctx.fill();}
    ctx.shadowBlur=0;
  });
  // Pacman
  ctx.shadowColor='#ffe600';ctx.shadowBlur=10;
  ctx.fillStyle='#ffe600';
  const px=Math.round(pac.c)*TS+TS/2,py=Math.round(pac.r)*TS+TS/2;
  const ang=pac.open?0.25:0.05;
  const baseAngle=pac.dir.dc===1?0:pac.dir.dc===-1?Math.PI:pac.dir.dr===1?Math.PI/2:-Math.PI/2;
  ctx.beginPath();ctx.moveTo(px,py);ctx.arc(px,py,TS/2-1,baseAngle+ang,baseAngle+Math.PI*2-ang);ctx.closePath();ctx.fill();
  ctx.shadowBlur=0;
  // Overlay
  if(state==='wait'){
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ffe600';ctx.font='bold 18px Courier New';ctx.textAlign='center';ctx.fillText('PAC-MAN',W/2,H/2-16);
    ctx.fillStyle='#aaa';ctx.font='12px Courier New';ctx.fillText('ESPACIO para empezar',W/2,H/2+8);
  }
  if(state==='dead'){
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ff3366';ctx.font='bold 18px Courier New';ctx.textAlign='center';ctx.fillText('GAME OVER',W/2,H/2-16);
    ctx.fillStyle='#ffe600';ctx.font='13px Courier New';ctx.fillText(`Score: ${score}`,W/2,H/2+6);
    ctx.fillStyle='#aaa';ctx.font='11px Courier New';ctx.fillText('ESPACIO para reintentar',W/2,H/2+26);
  }
  if(state==='win'){
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#39ff14';ctx.font='bold 18px Courier New';ctx.textAlign='center';ctx.fillText('¡GANASTE!',W/2,H/2-16);
    ctx.fillStyle='#ffe600';ctx.font='13px Courier New';ctx.fillText(`Score: ${score}`,W/2,H/2+6);
    ctx.fillStyle='#aaa';ctx.font='11px Courier New';ctx.fillText('ESPACIO para reintentar',W/2,H/2+26);
  }
}

const DIR_MAP={ArrowUp:{dr:-1,dc:0},ArrowDown:{dr:1,dc:0},ArrowLeft:{dr:0,dc:-1},ArrowRight:{dr:0,dc:1},w:{dr:-1,dc:0},s:{dr:1,dc:0},a:{dr:0,dc:-1},d:{dr:0,dc:1},W:{dr:-1,dc:0},S:{dr:1,dc:0},A:{dr:0,dc:-1},D:{dr:0,dc:1}};
document.addEventListener('keydown',e=>{
  if(DIR_MAP[e.key]){e.preventDefault();pac.next=DIR_MAP[e.key];}
  if(e.code==='Space'){e.preventDefault();
    if(state==='wait'||state==='dead'||state==='win'){
      if(score>best){best=parseInt(score)||0;document.getElementById('best').textContent=best;}
      init();state='play';tick();
    }
  }
});
window.addEventListener('message',e=>{
  if(!e.data) return;
  if(e.data.type==='keydown'){
    if(DIR_MAP[e.data.key]) pac.next=DIR_MAP[e.data.key];
    if(e.data.key===' '){if(state==='wait'||state==='dead'||state==='win'){if(score>best)best=score;init();state='play';tick();}}
  }
});
init();draw();
</script>
</body>
</html>
