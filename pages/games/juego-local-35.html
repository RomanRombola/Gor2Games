<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sudoku</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a15;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Courier New',monospace;color:#f0f0f0;padding:10px;}
h1{color:#00aaff;font-size:14px;letter-spacing:3px;margin-bottom:6px;}
#diff-row{display:flex;gap:8px;margin-bottom:8px;}
.diff-btn{background:rgba(0,170,255,0.07);border:1px solid rgba(0,170,255,0.2);color:#00aaff;font-family:'Courier New',monospace;font-size:10px;font-weight:700;padding:5px 12px;border-radius:6px;cursor:pointer;letter-spacing:1px;transition:all .15s;}
.diff-btn.active,.diff-btn:hover{background:rgba(0,170,255,0.2);border-color:rgba(0,170,255,0.5);}
#hud{display:flex;gap:16px;margin-bottom:8px;font-size:12px;color:#aaa;}
#hud b{color:#00aaff;}
#grid{display:grid;grid-template-columns:repeat(9,34px);grid-template-rows:repeat(9,34px);gap:2px;margin-bottom:10px;border:2px solid rgba(0,170,255,0.3);padding:2px;border-radius:6px;}
.cell{width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;border-radius:4px;cursor:pointer;transition:all .15s;position:relative;}
.cell.fixed{background:rgba(0,170,255,0.1);color:#7dd3fc;cursor:default;}
.cell.empty{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);color:#f0f0f0;}
.cell.empty:hover,.cell.selected{background:rgba(0,170,255,0.15);border-color:rgba(0,170,255,0.4);}
.cell.error{background:rgba(255,51,102,0.15);border-color:rgba(255,51,102,0.4);color:#ff6b8a;}
.cell.highlight{background:rgba(0,170,255,0.07);}
.cell.same-num{background:rgba(0,170,255,0.12);}
/* Bordes de caja 3x3 */
.cell[data-c="2"],.cell[data-c="5"]{border-right:2px solid rgba(0,170,255,0.3);}
.cell[data-r="2"],.cell[data-r="5"]{border-bottom:2px solid rgba(0,170,255,0.3);}
#numpad{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;justify-content:center;}
.num-btn{width:38px;height:38px;border-radius:8px;border:1px solid rgba(0,170,255,0.2);background:rgba(0,170,255,0.07);color:#00aaff;font-family:'Courier New',monospace;font-size:16px;font-weight:700;cursor:pointer;transition:all .15s;}
.num-btn:hover{background:rgba(0,170,255,0.2);box-shadow:0 0 8px rgba(0,170,255,0.3);}
.num-btn.erase{color:#ff3366;border-color:rgba(255,51,102,0.2);background:rgba(255,51,102,0.07);}
#msg{font-size:13px;font-weight:700;text-align:center;height:20px;margin-bottom:6px;}
.btn{background:rgba(0,170,255,0.08);border:1px solid rgba(0,170,255,0.2);color:#00aaff;font-family:'Courier New',monospace;font-size:11px;font-weight:700;padding:7px 18px;border-radius:8px;cursor:pointer;letter-spacing:1px;margin:3px;transition:all .2s;}
.btn:hover{box-shadow:0 0 10px rgba(0,170,255,0.3);}
</style>
</head>
<body>
<h1>🔢 SUDOKU</h1>
<div id="diff-row">
  <button class="diff-btn active" onclick="setDiff(35,this)">FÁCIL</button>
  <button class="diff-btn" onclick="setDiff(45,this)">MEDIO</button>
  <button class="diff-btn" onclick="setDiff(52,this)">DIFÍCIL</button>
</div>
<div id="hud"><span>⏱ <b id="tm">0</b>s</span><span>ERRORES <b id="errs">0</b></span><span>MEJOR <b id="best">—</b></span></div>
<div id="msg"></div>
<div id="grid"></div>
<div id="numpad"></div>
<button class="btn" onclick="newGame()">🔄 NUEVO</button>
<button class="btn" onclick="hint()">💡 PISTA</button>

<script>
let solution=[],puzzle=[],userGrid=[],selected=null,errors=0,timerInt,elapsed=0,started=false,removals=35,best=null;

function setDiff(n,btn){
  removals=n;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  newGame();
}

// Generar sudoku válido
function genSolution(){
  const g=Array.from({length:9},()=>new Array(9).fill(0));
  function isValid(g,r,c,n){
    for(let i=0;i<9;i++){if(g[r][i]===n||g[i][c]===n)return false;}
    const br=Math.floor(r/3)*3,bc=Math.floor(c/3)*3;
    for(let i=0;i<3;i++)for(let j=0;j<3;j++){if(g[br+i][bc+j]===n)return false;}
    return true;
  }
  function fill(pos){
    if(pos===81)return true;
    const r=Math.floor(pos/9),c=pos%9;
    const nums=[1,2,3,4,5,6,7,8,9].sort(()=>Math.random()-0.5);
    for(const n of nums){if(isValid(g,r,c,n)){g[r][c]=n;if(fill(pos+1))return true;g[r][c]=0;}}
    return false;
  }
  fill(0);return g;
}

function newGame(){
  clearInterval(timerInt);elapsed=0;errors=0;started=false;selected=null;
  document.getElementById('tm').textContent='0';
  document.getElementById('errs').textContent='0';
  document.getElementById('msg').textContent='';
  solution=genSolution();
  puzzle=solution.map(r=>[...r]);
  // Remover celdas
  const cells=[];for(let r=0;r<9;r++)for(let c=0;c<9;c++)cells.push([r,c]);
  cells.sort(()=>Math.random()-0.5).slice(0,removals).forEach(([r,c])=>puzzle[r][c]=0);
  userGrid=puzzle.map(r=>[...r]);
  render();buildNumpad();
}

function render(){
  const g=document.getElementById('grid');g.innerHTML='';
  for(let r=0;r<9;r++)for(let c=0;c<9;c++){
    const div=document.createElement('div');
    div.className='cell';div.dataset.r=r;div.dataset.c=c;
    const fixed=puzzle[r][c]!==0;
    const val=userGrid[r][c];
    const isErr=val!==0&&val!==solution[r][c];
    const isSel=selected&&selected[0]===r&&selected[1]===c;
    const isHighlight=selected&&(selected[0]===r||selected[1]===c||Math.floor(selected[0]/3)===Math.floor(r/3)&&Math.floor(selected[1]/3)===Math.floor(c/3));
    const isSameNum=selected&&val!==0&&userGrid[selected[0]][selected[1]]===val;
    if(fixed)div.classList.add('fixed');
    else if(isErr)div.classList.add('error');
    else if(isSel)div.classList.add('selected');
    else if(isSameNum)div.classList.add('same-num');
    else if(isHighlight)div.classList.add('highlight');
    else div.classList.add('empty');
    if(val!==0)div.textContent=val;
    div.addEventListener('click',()=>{if(!fixed){selected=[r,c];render();}});
    g.appendChild(div);
  }
}

function buildNumpad(){
  const np=document.getElementById('numpad');np.innerHTML='';
  for(let n=1;n<=9;n++){
    const btn=document.createElement('button');btn.className='num-btn';btn.textContent=n;
    btn.addEventListener('click',()=>inputNum(n));np.appendChild(btn);
  }
  const e=document.createElement('button');e.className='num-btn erase';e.textContent='✕';
  e.addEventListener('click',()=>inputNum(0));np.appendChild(e);
}

function inputNum(n){
  if(!selected)return;
  const[r,c]=selected;
  if(puzzle[r][c]!==0)return;
  if(!started){started=true;timerInt=setInterval(()=>{elapsed++;document.getElementById('tm').textContent=elapsed;},1000);}
  if(n!==0&&n!==solution[r][c]){errors++;document.getElementById('errs').textContent=errors;}
  userGrid[r][c]=n;
  render();
  if(userGrid.every((row,ri)=>row.every((v,ci)=>v===solution[ri][ci]))){
    clearInterval(timerInt);
    if(!best||elapsed<best){best=elapsed;document.getElementById('best').textContent=elapsed+'s';}
    document.getElementById('msg').textContent=`🏆 ¡Completado! ${elapsed}s · ${errors} errores`;
    document.getElementById('msg').style.color='#39ff14';
  }
}

function hint(){
  const empties=[];
  for(let r=0;r<9;r++)for(let c=0;c<9;c++){if(puzzle[r][c]===0&&userGrid[r][c]===0)empties.push([r,c]);}
  if(!empties.length)return;
  const[r,c]=empties[Math.floor(Math.random()*empties.length)];
  userGrid[r][c]=solution[r][c];selected=[r,c];render();
}

document.addEventListener('keydown',e=>{
  if(!selected)return;
  const n=parseInt(e.key);
  if(n>=1&&n<=9){e.preventDefault();inputNum(n);}
  if(e.key==='Backspace'||e.key==='Delete'||e.key==='0'){inputNum(0);}
  const[r,c]=selected;
  if(e.key==='ArrowUp'&&r>0){selected=[r-1,c];render();}
  if(e.key==='ArrowDown'&&r<8){selected=[r+1,c];render();}
  if(e.key==='ArrowLeft'&&c>0){selected=[r,c-1];render();}
  if(e.key==='ArrowRight'&&c<8){selected=[r,c+1];render();}
});
window.addEventListener('message',e=>{if(e.data?.type==='keydown'){const ev=new KeyboardEvent('keydown',{key:e.data.key,bubbles:true});document.dispatchEvent(ev);}});
newGame();
</script>
</body>
</html>
