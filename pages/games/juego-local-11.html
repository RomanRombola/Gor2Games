<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flappy Bird</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a15;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:'Courier New',monospace;}
h1{color:#ff6600;font-size:16px;letter-spacing:3px;margin-bottom:6px;text-shadow:0 0 10px rgba(255,102,0,0.6);}
#hud{display:flex;gap:24px;margin-bottom:6px;font-size:13px;color:#aaa;letter-spacing:1px;}
#hud span b{color:#ff6600;}
canvas{border:2px solid rgba(255,102,0,0.3);border-radius:8px;display:block;}
#ctrl{margin-top:8px;font-size:11px;color:#444;letter-spacing:1px;}
</style>
</head>
<body>
<h1>🐦 FLAPPY BIRD</h1>
<div id="hud"><span>SCORE <b id="sc">0</b></span><span>MEJOR <b id="best">0</b></span></div>
<canvas id="c" width="320" height="480"></canvas>
<div id="ctrl">ESPACIO / TAP para volar</div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const W=320,H=480,GAP=130,PIPE_W=52,PIPE_SPEED=2.2,GRAV=0.38,FLAP=-7.2;
let bird,pipes,score,best=0,frame,state,loop;

const BIRD_COLORS=['#ff6600','#00aaff','#39ff14','#ffe600','#a855f7'];
let birdColor=BIRD_COLORS[0];

function init(){
  bird={x:80,y:H/2,vy:0,r:14};
  pipes=[];score=0;frame=0;state='wait';
  birdColor=BIRD_COLORS[Math.floor(Math.random()*BIRD_COLORS.length)];
  if(loop) cancelAnimationFrame(loop);
  draw();
}

function spawnPipe(){
  const top=80+Math.random()*(H-GAP-160);
  pipes.push({x:W,top,scored:false});
}

function flap(){
  if(state==='wait'){state='play';tick();}
  else if(state==='play'){bird.vy=FLAP;}
  else if(state==='dead'){init();}
}

function tick(){
  if(state!=='play') return;
  frame++;
  bird.vy+=GRAV;
  bird.y+=bird.vy;
  if(frame%80===0) spawnPipe();
  pipes.forEach(p=>{
    p.x-=PIPE_SPEED;
    if(!p.scored&&p.x+PIPE_W<bird.x){p.scored=true;score++;document.getElementById('sc').textContent=score;if(score>best){best=score;document.getElementById('best').textContent=best;}}
  });
  pipes=pipes.filter(p=>p.x>-PIPE_W);
  // Colisión
  if(bird.y-bird.r<0||bird.y+bird.r>H){state='dead';draw();return;}
  for(const p of pipes){
    if(bird.x+bird.r>p.x&&bird.x-bird.r<p.x+PIPE_W){
      if(bird.y-bird.r<p.top||bird.y+bird.r>p.top+GAP){state='dead';draw();return;}
    }
  }
  draw();
  loop=requestAnimationFrame(tick);
}

function draw(){
  // Fondo gradiente cielo nocturno
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#050510');sky.addColorStop(1,'#0a0a25');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
  // Estrellas
  ctx.fillStyle='rgba(255,255,255,0.4)';
  for(let i=0;i<40;i++){const sx=(i*73+frame*0.3)%W,sy=(i*37)%H*0.7;ctx.fillRect(sx,sy,1,1);}
  // Suelo y techo
  ctx.fillStyle='#111120';ctx.fillRect(0,0,W,10);ctx.fillRect(0,H-10,W,10);
  // Tuberías estilo neón
  pipes.forEach(p=>{
    // Tubo superior
    const gtop=ctx.createLinearGradient(p.x,0,p.x+PIPE_W,0);
    gtop.addColorStop(0,'#1a3a1a');gtop.addColorStop(0.3,'#2a5a2a');gtop.addColorStop(1,'#1a3a1a');
    ctx.fillStyle=gtop;ctx.fillRect(p.x,10,PIPE_W,p.top-10);
    ctx.fillStyle='#39ff14';ctx.fillRect(p.x-4,p.top-18,PIPE_W+8,18);
    ctx.strokeStyle='rgba(57,255,20,0.5)';ctx.lineWidth=1;ctx.strokeRect(p.x,10,PIPE_W,p.top-10);
    // Tubo inferior
    const gbot=ctx.createLinearGradient(p.x,0,p.x+PIPE_W,0);
    gbot.addColorStop(0,'#1a3a1a');gbot.addColorStop(0.3,'#2a5a2a');gbot.addColorStop(1,'#1a3a1a');
    ctx.fillStyle=gbot;ctx.fillRect(p.x,p.top+GAP,PIPE_W,H-p.top-GAP-10);
    ctx.fillStyle='#39ff14';ctx.fillRect(p.x-4,p.top+GAP,PIPE_W+8,18);
    ctx.strokeStyle='rgba(57,255,20,0.5)';ctx.lineWidth=1;ctx.strokeRect(p.x,p.top+GAP,PIPE_W,H-p.top-GAP-10);
  });
  // Pájaro
  const angle=Math.max(-0.5,Math.min(0.8,bird.vy*0.06));
  ctx.save();ctx.translate(bird.x,bird.y);ctx.rotate(angle);
  // Cuerpo
  ctx.beginPath();ctx.ellipse(0,0,bird.r,bird.r*0.8,0,0,Math.PI*2);
  ctx.fillStyle=birdColor;ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1.5;ctx.stroke();
  // Ojo
  ctx.beginPath();ctx.arc(6,-3,4,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  ctx.beginPath();ctx.arc(7,-2,2,0,Math.PI*2);ctx.fillStyle='#000';ctx.fill();
  // Ala
  ctx.beginPath();ctx.ellipse(-2,4,8,5,0.3,0,Math.PI*2);
  ctx.fillStyle=`rgba(0,0,0,0.3)`;ctx.fill();
  // Pico
  ctx.beginPath();ctx.moveTo(bird.r,0);ctx.lineTo(bird.r+8,2);ctx.lineTo(bird.r,-2);
  ctx.fillStyle='#ff9900';ctx.fill();
  ctx.restore();
  // Glow del pájaro
  ctx.shadowColor=birdColor;ctx.shadowBlur=12;
  ctx.beginPath();ctx.arc(bird.x,bird.y,bird.r,0,Math.PI*2);
  ctx.strokeStyle=birdColor;ctx.lineWidth=0.5;ctx.stroke();
  ctx.shadowBlur=0;
  // Pantallas
  if(state==='wait'){
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ff6600';ctx.font='bold 22px Courier New';ctx.textAlign='center';
    ctx.fillText('FLAPPY BIRD',W/2,H/2-20);
    ctx.fillStyle='#aaa';ctx.font='13px Courier New';
    ctx.fillText('ESPACIO o TAP para empezar',W/2,H/2+15);
  }
  if(state==='dead'){
    ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ff3366';ctx.font='bold 24px Courier New';ctx.textAlign='center';
    ctx.fillText('GAME OVER',W/2,H/2-30);
    ctx.fillStyle='#ff6600';ctx.font='16px Courier New';
    ctx.fillText(`Score: ${score}`,W/2,H/2+2);
    ctx.fillStyle='#ffe600';ctx.font='13px Courier New';
    ctx.fillText(`Mejor: ${best}`,W/2,H/2+24);
    ctx.fillStyle='#aaa';ctx.font='12px Courier New';
    ctx.fillText('ESPACIO o TAP para reintentar',W/2,H/2+52);
  }
}

document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();flap();}});
cv.addEventListener('click',flap);
cv.addEventListener('touchstart',e=>{e.preventDefault();flap();},{passive:false});
window.addEventListener('message',e=>{if(e.data?.type==='keydown'&&e.data.key===' ')flap();});
init();
</script>
</body>
</html>
