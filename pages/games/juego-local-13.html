<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Doodle Jump</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a15;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:'Courier New',monospace;}
h1{color:#ffe600;font-size:15px;letter-spacing:3px;margin-bottom:6px;text-shadow:0 0 10px rgba(255,230,0,0.6);}
#hud{display:flex;gap:24px;margin-bottom:6px;font-size:13px;color:#aaa;}
#hud b{color:#ffe600;}
canvas{border:2px solid rgba(255,230,0,0.2);border-radius:8px;display:block;}
#ctrl{margin-top:8px;font-size:11px;color:#444;letter-spacing:1px;text-align:center;}
</style>
</head>
<body>
<h1>🐸 DOODLE JUMP</h1>
<div id="hud"><span>SCORE <b id="sc">0</b></span><span>MEJOR <b id="best">0</b></span></div>
<canvas id="c" width="300" height="480"></canvas>
<div id="ctrl">← → o A/D para moverse</div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const W=300,H=480,PLAT_W=60,PLAT_H=10,JUMP=-13,GRAV=0.45;
let player,platforms,score,best=0,cameraY,state,loop,keys={};
const COLORS=['#ff6600','#00aaff','#39ff14','#ffe600','#a855f7','#ff3366'];

function makePlatforms(){
  const plats=[];
  // Plataforma inicial sólida
  plats.push({x:W/2-PLAT_W/2,y:H-60,w:PLAT_W,type:'normal',used:false});
  for(let i=1;i<18;i++){
    const y=H-60-i*55-Math.random()*30;
    const x=Math.random()*(W-PLAT_W);
    const rnd=Math.random();
    const type=i<4?'normal':rnd<0.15?'spring':rnd<0.3?'moving':'normal';
    plats.push({x,y,w:PLAT_W,type,used:false,dir:1,speed:1+Math.random(),ox:x});
  }
  return plats;
}

function init(){
  player={x:W/2-16,y:H-100,vy:JUMP*0.7,w:32,h:32,color:COLORS[Math.floor(Math.random()*COLORS.length)]};
  platforms=makePlatforms();
  cameraY=0;score=0;state='play';
  document.getElementById('sc').textContent=0;
  if(loop) cancelAnimationFrame(loop);
  tick();
}

function spawnPlatform(topY){
  const x=Math.random()*(W-PLAT_W);
  const rnd=Math.random();
  const s=score;
  const type=s<200?'normal':rnd<0.18?'spring':rnd<0.35?'moving':rnd<0.45&&s>400?'break':'normal';
  platforms.push({x,y:topY-55-Math.random()*35,w:PLAT_W,type,used:false,dir:1,speed:1+Math.random()*1.5,ox:x,broken:false});
}

function tick(){
  if(state!=='play') return;
  // Controles
  if(keys['ArrowLeft']||keys['a']||keys['A']) player.x-=4.5;
  if(keys['ArrowRight']||keys['d']||keys['D']) player.x+=4.5;
  player.x=(player.x+W)%W; // wrap lateral
  player.vy+=GRAV;
  player.y+=player.vy;
  // Plataformas
  platforms.forEach(p=>{
    if(p.type==='moving'){p.x+=p.dir*p.speed;if(p.x<0||p.x>W-PLAT_W){p.dir*=-1;}}
    // Colisión (solo cuando cae)
    if(player.vy>0&&!p.used&&!p.broken&&
       player.y+player.h>p.y+cameraY&&player.y+player.h<p.y+cameraY+20&&
       player.x+player.w>p.x&&player.x<p.x+p.w){
      if(p.type==='break'){p.broken=true;setTimeout(()=>{p.used=true;},300);}
      else if(p.type==='spring'){player.vy=JUMP*1.6;}
      else{player.vy=JUMP;}
      if(p.type!=='break') p.used=false;
    }
  });
  // Cámara
  const screenTop=H*0.4;
  if(player.y<screenTop+cameraY){
    const delta=screenTop+cameraY-player.y;
    cameraY-=delta;
    const sc=Math.floor(-cameraY/8);
    if(sc>score){score=sc;document.getElementById('sc').textContent=score;if(score>best){best=score;document.getElementById('best').textContent=best;}}
  }
  // Spawn nuevas plataformas
  const topPlat=Math.min(...platforms.map(p=>p.y));
  if(topPlat>cameraY-100) spawnPlatform(topPlat);
  // Eliminar las muy abajo
  platforms=platforms.filter(p=>p.y<cameraY+H+100);
  // Muerte — cae fuera de pantalla
  if(player.y-cameraY>H+60){state='dead';draw();return;}
  draw();loop=requestAnimationFrame(tick);
}

function draw(){
  ctx.fillStyle='#07070f';ctx.fillRect(0,0,W,H);
  // Estrellas de fondo
  ctx.fillStyle='rgba(255,255,255,0.3)';
  for(let i=0;i<30;i++){ctx.fillRect((i*97)%W,((i*61)+Math.abs(cameraY)*0.1)%H,1,1);}
  // Plataformas
  platforms.forEach(p=>{
    const sy=p.y-cameraY;
    if(sy<-20||sy>H+20) return;
    const colors={normal:'#1a4a1a',spring:'#4a1a1a',moving:'#1a1a4a',break:'#3a2a0a'};
    const glows={normal:'#39ff14',spring:'#ff3366',moving:'#00aaff',break:'#ff9900'};
    ctx.shadowColor=glows[p.type];ctx.shadowBlur=6;
    ctx.fillStyle=p.broken?'rgba(255,120,0,0.3)':colors[p.type];
    ctx.beginPath();ctx.roundRect(p.x,sy,p.w,PLAT_H,4);ctx.fill();
    ctx.strokeStyle=p.broken?'rgba(255,120,0,0.4)':glows[p.type];
    ctx.lineWidth=1;ctx.stroke();
    if(p.type==='spring'&&!p.used){
      ctx.fillStyle='#ff3366';ctx.beginPath();
      ctx.moveTo(p.x+p.w/2-4,sy);ctx.lineTo(p.x+p.w/2,sy-12);ctx.lineTo(p.x+p.w/2+4,sy);ctx.fill();
    }
  });
  ctx.shadowBlur=0;
  // Jugador
  const py=player.y-cameraY;
  ctx.shadowColor=player.color;ctx.shadowBlur=10;
  // Cuerpo
  ctx.fillStyle=player.color;
  ctx.beginPath();ctx.roundRect(player.x,py,player.w,player.h,8);ctx.fill();
  // Cara
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(player.x+10,py+12,5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(player.x+22,py+12,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000';ctx.beginPath();ctx.arc(player.x+11,py+12,2.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(player.x+23,py+12,2.5,0,Math.PI*2);ctx.fill();
  // Antenas
  ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(player.x+10,py);ctx.lineTo(player.x+6,py-10);ctx.stroke();
  ctx.beginPath();ctx.moveTo(player.x+22,py);ctx.lineTo(player.x+26,py-10);ctx.stroke();
  ctx.shadowBlur=0;
  // Game Over
  if(state==='dead'){
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ff3366';ctx.font='bold 24px Courier New';ctx.textAlign='center';
    ctx.fillText('GAME OVER',W/2,H/2-24);
    ctx.fillStyle='#ffe600';ctx.font='15px Courier New';
    ctx.fillText(`Score: ${score}`,W/2,H/2+4);
    ctx.fillStyle='#aaa';ctx.font='12px Courier New';
    ctx.fillText('ESPACIO para reintentar',W/2,H/2+30);
  }
}

document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key===' '){e.preventDefault();if(state==='dead')init();}
  if(['ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
window.addEventListener('message',e=>{
  if(!e.data) return;
  if(e.data.type==='keydown'){keys[e.data.key]=true;if(e.data.key===' '&&state==='dead')init();}
  if(e.data.type==='keyup') keys[e.data.key]=false;
});
// Touch / acelerómetro
let touchStartX=null;
cv.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;},{passive:true});
cv.addEventListener('touchmove',e=>{
  if(touchStartX===null) return;
  const dx=e.touches[0].clientX-touchStartX;
  if(dx>10){keys['ArrowRight']=true;keys['ArrowLeft']=false;}
  else if(dx<-10){keys['ArrowLeft']=true;keys['ArrowRight']=false;}
  else{keys['ArrowLeft']=false;keys['ArrowRight']=false;}
},{passive:true});
cv.addEventListener('touchend',()=>{keys['ArrowLeft']=false;keys['ArrowRight']=false;if(state==='dead')init();},{passive:true});
init();
</script>
</body>
</html>
