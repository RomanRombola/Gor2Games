<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Shooter Gor2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Courier New',monospace;color:#f0f0f0;user-select:none;overflow:hidden;}
h1{font-size:18px;letter-spacing:4px;color:#39ff14;text-shadow:0 0 12px rgba(57,255,20,0.8);margin-bottom:8px;}
#hud{display:flex;gap:20px;margin-bottom:8px;font-size:13px;flex-wrap:wrap;justify-content:center;}
.h-item{text-align:center;}
.h-val{font-size:18px;font-weight:900;display:block;}
.h-lbl{font-size:10px;color:#555;letter-spacing:2px;text-transform:uppercase;}
.s-score{color:#39ff14;}.s-lives{color:#ff3366;}.s-wave{color:#ffe600;}.s-power{color:#00aaff;}
#canvas-wrap{position:relative;border-radius:8px;overflow:hidden;box-shadow:0 0 0 1px rgba(57,255,20,0.2),0 0 40px rgba(0,0,0,0.9);}
canvas{display:block;}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.88);gap:10px;transition:opacity 0.3s;}
#overlay.hidden{opacity:0;pointer-events:none;}
.ov-title{font-size:24px;font-weight:900;letter-spacing:4px;background:linear-gradient(90deg,#39ff14,#00aaff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.ov-sub{font-size:12px;color:#555;letter-spacing:2px;text-align:center;}
.ov-score{font-size:38px;font-weight:900;color:#39ff14;}
.ov-btn{background:linear-gradient(135deg,#39ff14,#00aa00);border:none;color:#000;font-family:'Courier New',monospace;font-size:13px;font-weight:700;padding:11px 28px;border-radius:8px;cursor:pointer;letter-spacing:2px;margin-top:4px;}
#ctrl{margin-top:8px;font-size:11px;color:#333;letter-spacing:1px;}
</style>
</head>
<body>
<h1>🚀 SPACE SHOOTER GOR2</h1>
<div id="hud">
  <div class="h-item s-score"><span class="h-val" id="h-score">0</span><span class="h-lbl">Score</span></div>
  <div class="h-item s-lives"><span class="h-val" id="h-lives">❤❤❤</span><span class="h-lbl">Vidas</span></div>
  <div class="h-item s-wave"><span class="h-val" id="h-wave">1</span><span class="h-lbl">Oleada</span></div>
  <div class="h-item s-power"><span class="h-val" id="h-power">—</span><span class="h-lbl">Power-up</span></div>
</div>
<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div id="overlay">
    <div class="ov-title">SPACE SHOOTER</div>
    <div class="ov-sub" id="ov-sub">DESTRUÍ A TODOS · SOBREVIVÍ</div>
    <div class="ov-score" id="ov-score" style="display:none"></div>
    <button class="ov-btn" onclick="startGame()">▶ JUGAR</button>
  </div>
</div>
<div id="ctrl">← → mover · ESPACIO disparar · SHIFT = special</div>

<script>
const C = document.getElementById("c"), ctx = C.getContext("2d");
const W = 480, H = 520;
C.width = W; C.height = H;

// ── Estado ─────────────────────────────────────────────────────────────────
let player, bullets, enemies, particles, powerups;
let score, lives, wave, loop, running, frameCount;
let keys = {}, specialReady = false, specialTimer = 0;
let stars = [], bgScrollY = 0;
const BEST = "shooter_best";
const getBest = () => parseInt(localStorage.getItem(BEST)||"0");

// ── Audio ──────────────────────────────────────────────────────────────────
let actx = null;
function initAudio(){ if(!actx) actx = new(window.AudioContext||window.webkitAudioContext)(); }
function sfx(type){
  if(!actx) return;
  const t = actx.currentTime;
  const o = actx.createOscillator(), g = actx.createGain();
  o.connect(g); g.connect(actx.destination);
  if(type==="shoot"){ o.type="square"; o.frequency.setValueAtTime(880,t); o.frequency.exponentialRampToValueAtTime(440,t+0.06); g.gain.setValueAtTime(0.06,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.07); o.start(t); o.stop(t+0.07); }
  else if(type==="explode"){ o.type="sawtooth"; o.frequency.setValueAtTime(200,t); o.frequency.exponentialRampToValueAtTime(30,t+0.3); g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.3); o.start(t); o.stop(t+0.3); }
  else if(type==="hit"){ o.type="sawtooth"; o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(50,t+0.2); g.gain.setValueAtTime(0.18,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.2); o.start(t); o.stop(t+0.2); }
  else if(type==="powerup"){ [440,660,880,1100].forEach((f,i)=>{ const o2=actx.createOscillator(),g2=actx.createGain(); o2.connect(g2); g2.connect(actx.destination); o2.type="sine"; o2.frequency.value=f; g2.gain.setValueAtTime(0.1,t+i*0.07); g2.gain.exponentialRampToValueAtTime(0.001,t+i*0.07+0.1); o2.start(t+i*0.07); o2.stop(t+i*0.07+0.1); }); }
  else if(type==="special"){ o.type="square"; o.frequency.setValueAtTime(100,t); o.frequency.exponentialRampToValueAtTime(2000,t+0.3); g.gain.setValueAtTime(0.2,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.4); o.start(t); o.stop(t+0.4); }
  else if(type==="wave"){ [300,500,700,900].forEach((f,i)=>{ const o2=actx.createOscillator(),g2=actx.createGain(); o2.connect(g2); g2.connect(actx.destination); o2.type="square"; o2.frequency.value=f; g2.gain.setValueAtTime(0.08,t+i*0.1); g2.gain.exponentialRampToValueAtTime(0.001,t+i*0.1+0.15); o2.start(t+i*0.1); o2.stop(t+i*0.1+0.15); }); }
}

// ── Partículas ─────────────────────────────────────────────────────────────
function spawnExplosion(x, y, color="#ff6600", n=12, big=false){
  for(let i=0;i<n;i++){
    const a=(Math.PI*2/n)*i+Math.random()*0.5;
    const sp=(big?3:1.5)+Math.random()*(big?5:3);
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:big?0.025:0.04,r:big?4+Math.random()*4:2+Math.random()*3,color,type:"circle"});
  }
  // Debris lines
  for(let i=0;i<(big?8:4);i++){
    const a=Math.random()*Math.PI*2, sp=1+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:0.03,r:0,len:4+Math.random()*8,color:"#ffaa00",type:"line",angle:a});
  }
}

function spawnTrail(x,y,color){
  particles.push({x,y,vx:(Math.random()-0.5)*0.5,vy:1+Math.random(),life:0.7,decay:0.08,r:2+Math.random()*2,color,type:"circle"});
}

// ── Estrellas de fondo ────────────────────────────────────────────────────
function initStars(){
  stars=[];
  for(let i=0;i<120;i++) stars.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*1.8+0.3,sp:0.2+Math.random()*0.8,brightness:Math.random()});
}

// ── Tipos de enemigos ─────────────────────────────────────────────────────
const ENEMY_TYPES = {
  basic:  { w:28,h:20, hp:1, speed:0.8, pts:10, color:"#ff4444", shootRate:120, color2:"#ff8888" },
  fast:   { w:20,h:16, hp:1, speed:1.8, pts:20, color:"#ff00ff", shootRate:0,   color2:"#ff88ff" },
  tank:   { w:36,h:28, hp:3, speed:0.4, pts:50, color:"#ffaa00", shootRate:80,  color2:"#ffdd88" },
  zigzag: { w:24,h:18, hp:1, speed:1.0, pts:30, color:"#00ffff", shootRate:90,  color2:"#88ffff" },
  bomber: { w:32,h:24, hp:2, speed:0.6, pts:40, color:"#aa44ff", shootRate:60,  color2:"#cc88ff" },
};

// ── Power-ups ─────────────────────────────────────────────────────────────
const POWERUP_TYPES = [
  { type:"triple", label:"TRIPLE", color:"#00aaff", icon:"⚡" },
  { type:"shield", label:"ESCUDO", color:"#39ff14", icon:"🛡" },
  { type:"speed",  label:"SPEED",  color:"#ffe600", icon:"💨" },
  { type:"bomb",   label:"BOMBA",  color:"#ff6600", icon:"💥" },
];
let activePowerup = null, powerupTimer = 0;
let shieldActive = false;

// ── Init ───────────────────────────────────────────────────────────────────
function initGame(){
  player = {x:W/2-16,y:H-60,w:32,h:28,speed:4,shootCD:0,animFrame:0,thrusterAnim:0};
  bullets=[]; enemies=[]; particles=[]; powerups=[];
  score=0; lives=3; wave=1; frameCount=0;
  activePowerup=null; powerupTimer=0; shieldActive=false; specialReady=true; specialTimer=0;
  initStars();
  spawnWave();
  updHUD();
}

function startGame(){
  initAudio();
  initGame();
  running=true;
  document.getElementById("overlay").classList.add("hidden");
  document.getElementById("ov-score").style.display="none";
  if(loop) cancelAnimationFrame(loop);
  let last=0;
  function frame(ts){
    if(!running){return;}
    const dt=Math.min((ts-last)/16.67,3); last=ts;
    update(dt); draw();
    loop=requestAnimationFrame(frame);
  }
  loop=requestAnimationFrame(frame);
}

// ── Spawn oleada ──────────────────────────────────────────────────────────
function spawnWave(){
  sfx("wave");
  const count = 4 + wave * 2;
  const cols = Math.min(count, 8);
  const rows = Math.ceil(count/cols);
  // Margen seguro - nunca en los bordes
  const marginX = 50;
  const usableW = W - marginX * 2;
  let spawned = 0;
  for(let r=0;r<rows && spawned<count;r++){
    for(let c=0;c<cols && spawned<count;c++){
      let type = "basic";
      const rnd = Math.random();
      if(wave>=2 && rnd<0.2) type="fast";
      if(wave>=3 && rnd<0.15) type="tank";
      if(wave>=3 && rnd>0.75) type="zigzag";
      if(wave>=4 && rnd>0.85) type="bomber";
      const cfg = ENEMY_TYPES[type];
      // Posición X dentro del margen seguro, centrada
      const xPos = marginX + c*(usableW/Math.max(cols-1,1));
      enemies.push({
        x: Math.max(marginX, Math.min(W-marginX-cfg.w, xPos)),
        y: 20 + r*48,
        w: cfg.w, h: cfg.h,
        hp: cfg.hp, maxHp: cfg.hp,
        speed: cfg.speed * (1+wave*0.08),
        pts: cfg.pts,
        color: cfg.color, color2: cfg.color2,
        type, dir:1, t:Math.random()*Math.PI*2,
        // CD de disparo más alto al inicio de oleada para dar tiempo al jugador
        shootCD: cfg.shootRate*2 + Math.random()*80,
        animFrame: 0
      });
      spawned++;
    }
  }
}

// ── Update ────────────────────────────────────────────────────────────────
function update(dt){
  frameCount++;
  player.thrusterAnim += dt;

  // Power-up timer
  if(activePowerup && activePowerup!=="bomb"){
    powerupTimer -= dt;
    if(powerupTimer<=0){ activePowerup=null; shieldActive=false; updHUD(); }
  }
  if(!specialReady){ specialTimer-=dt; if(specialTimer<=0) specialReady=true; }

  // Mover jugador
  const spd = player.speed * (activePowerup==="speed"?1.8:1);
  if(keys["ArrowLeft"]||keys["a"]||keys["A"]) player.x=Math.max(0,player.x-spd*dt);
  if(keys["ArrowRight"]||keys["d"]||keys["D"]) player.x=Math.min(W-player.w,player.x+spd*dt);
  if(keys["ArrowUp"]||keys["w"]||keys["W"]) player.y=Math.max(H/2,player.y-spd*dt);
  if(keys["ArrowDown"]||keys["s"]||keys["S"]) player.y=Math.min(H-player.h-4,player.y+spd*dt);

  // Disparar
  if(player.shootCD>0) player.shootCD-=dt;
  if((keys[" "]||keys["z"]||keys["Z"])&&player.shootCD<=0){
    const cx=player.x+player.w/2;
    if(activePowerup==="triple"){
      bullets.push({x:cx,y:player.y,vx:-2,vy:-10,owner:"p",r:4,color:"#00aaff"});
      bullets.push({x:cx,y:player.y,vx:0,vy:-12,owner:"p",r:5,color:"#39ff14"});
      bullets.push({x:cx,y:player.y,vx:2,vy:-10,owner:"p",r:4,color:"#00aaff"});
    } else {
      bullets.push({x:cx,y:player.y,vx:0,vy:-12,owner:"p",r:5,color:"#39ff14"});
    }
    player.shootCD = activePowerup==="speed" ? 6 : 10;
    sfx("shoot");
  }

  // Special (SHIFT / doble tap)
  if((keys["Shift"]||keys["x"]||keys["X"])&&specialReady){
    // Bomba que limpia pantalla
    enemies.forEach(e=>{ spawnExplosion(e.x+e.w/2,e.y+e.h/2,e.color,16,true); score+=e.pts; });
    enemies=[];
    particles.push(...Array.from({length:30},(_,i)=>({x:W/2,y:H/2,vx:Math.cos(i/30*Math.PI*2)*8,vy:Math.sin(i/30*Math.PI*2)*8,life:1,decay:0.025,r:6,color:["#ff6600","#ffe600","#39ff14"][i%3],type:"circle"})));
    sfx("special"); updHUD();
    specialReady=false; specialTimer=300;
  }

  // Mover balas
  bullets.forEach(b=>{b.x+=b.vx*dt;b.y+=b.vy*dt;});
  bullets=bullets.filter(b=>b.y>-20&&b.y<H+20&&b.x>-20&&b.x<W+20);

  // Mover enemigos
  enemies.forEach(e=>{
    e.animFrame+=dt;
    if(e.type==="zigzag"){ e.x+=Math.sin(e.t)*2*dt; e.t+=0.08*dt; }
    e.x+=e.dir*e.speed*dt;
    // Rebote con margen más amplio para no caer sobre el jugador
    if(e.x>W-e.w-30||e.x<30){ e.dir*=-1; e.y+=10; }
    // Disparar enemigos
    if(e.shootCD>0){ e.shootCD-=dt; }
    else if(e.type!=="fast"&&e.type!=="zigzag"){
      const cx=e.x+e.w/2;
      if(e.type==="bomber"){
        [-1,0,1].forEach(dx=>bullets.push({x:cx,y:e.y+e.h,vx:dx*1.5,vy:3+wave*0.2,owner:"e",r:4,color:"#aa44ff"}));
      } else {
        bullets.push({x:cx,y:e.y+e.h,vx:0,vy:2.5+wave*0.15,owner:"e",r:3,color:e.color});
      }
      e.shootCD=ENEMY_TYPES[e.type].shootRate+Math.random()*40;
      sfx("shoot");
    }
    // Trail para naves rápidas
    if(e.type==="fast"&&frameCount%3===0) spawnTrail(e.x+e.w/2,e.y+e.h,e.color);
  });

  // Colisión balas jugador vs enemigos
  for(let bi=bullets.length-1;bi>=0;bi--){
    const b=bullets[bi];
    if(b.owner!=="p") continue;
    for(let ei=enemies.length-1;ei>=0;ei--){
      const e=enemies[ei];
      if(b.x>e.x&&b.x<e.x+e.w&&b.y>e.y&&b.y<e.y+e.h){
        bullets.splice(bi,1);
        e.hp--;
        spawnExplosion(b.x,b.y,"#ffe600",4);
        if(e.hp<=0){
          score+=e.pts*(1+Math.floor(wave/3));
          spawnExplosion(e.x+e.w/2,e.y+e.h/2,e.color,e.type==="tank"?20:10,e.type==="tank");
          sfx("explode");
          // Chance de dropear power-up
          if(Math.random()<0.18){
            const pu=POWERUP_TYPES[Math.floor(Math.random()*POWERUP_TYPES.length)];
            powerups.push({x:e.x+e.w/2-12,y:e.y,vy:1.2,...pu});
          }
          enemies.splice(ei,1);
          updHUD();
        }
        break;
      }
    }
  }

  // Colisión balas enemigas vs jugador
  for(let bi=bullets.length-1;bi>=0;bi--){
    const b=bullets[bi];
    if(b.owner!=="e") continue;
    const px=player.x,py=player.y;
    if(b.x>px&&b.x<px+player.w&&b.y>py&&b.y<py+player.h){
      bullets.splice(bi,1);
      if(shieldActive){ spawnExplosion(b.x,b.y,"#39ff14",6); }
      else{ hitPlayer(); }
    }
  }

  // Enemigos llegan al fondo
  for(let i=enemies.length-1;i>=0;i--){
    if(enemies[i].y>H){ enemies.splice(i,1); hitPlayer(); }
  }

  // Power-ups
  powerups.forEach(p=>{ p.y+=p.vy*dt; p.t=(p.t||0)+dt; });
  for(let i=powerups.length-1;i>=0;i--){
    const p=powerups[i];
    if(p.y>H){ powerups.splice(i,1); continue; }
    if(p.x>player.x-10&&p.x<player.x+player.w+10&&p.y>player.y-10&&p.y<player.y+player.h+10){
      activatePowerup(p.type);
      powerups.splice(i,1);
    }
  }

  // Nueva oleada
  if(enemies.length===0){ wave++; spawnWave(); updHUD(); }

  // Partículas
  particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=0.93;p.vy*=0.93;p.life-=p.decay*dt;});
  particles=particles.filter(p=>p.life>0);

  // Estrellas
  bgScrollY+=0.3*dt;
  stars.forEach(s=>{s.y+=s.sp*dt;if(s.y>H)s.y=0;});

  // Trail de la nave
  if(frameCount%2===0) spawnTrail(player.x+player.w/2,player.y+player.h,"#00aaff");
}

function hitPlayer(){
  if(shieldActive){ sfx("powerup"); return; }
  lives--;
  spawnExplosion(player.x+player.w/2,player.y+player.h/2,"#ff3366",16,true);
  sfx("hit");
  updHUD();
  if(lives<=0) gameOver();
  else{
    // Invencibilidad breve (flash)
    player.hitTimer=120;
  }
}

function activatePowerup(type){
  sfx("powerup");
  if(type==="bomb"){ spawnExplosion(W/2,H/2,"#ff6600",30,true); bullets.forEach(b=>{ if(b.owner==="e") b.y=-99; }); bullets=bullets.filter(b=>b.owner==="p"); }
  else if(type==="shield"){ shieldActive=true; activePowerup="shield"; powerupTimer=300; }
  else { activePowerup=type; powerupTimer=300; shieldActive=false; }
  updHUD();
}

function gameOver(){
  running=false;
  cancelAnimationFrame(loop);
  if(score>getBest()) localStorage.setItem(BEST,score);
  setTimeout(()=>{
    document.getElementById("ov-sub").textContent=`Oleada ${wave} · Mejor: ${getBest()}`;
    document.getElementById("ov-score").style.display="block";
    document.getElementById("ov-score").textContent=score;
    document.querySelector(".ov-btn").textContent="▶ REINTENTAR";
    document.querySelector(".ov-title").textContent="GAME OVER";
    document.getElementById("overlay").classList.remove("hidden");
  },800);
}

function updHUD(){
  document.getElementById("h-score").textContent=score;
  document.getElementById("h-lives").textContent="❤".repeat(lives)+"🖤".repeat(Math.max(0,3-lives));
  document.getElementById("h-wave").textContent=wave;
  const pu=activePowerup;
  const puMap={triple:"⚡ TRIPLE",shield:"🛡 ESCUDO",speed:"💨 SPEED"};
  document.getElementById("h-power").textContent=pu&&puMap[pu]?puMap[pu]:(specialReady?"✦ ESPECIAL":"⏳ CARGA");
}

// ── Draw ──────────────────────────────────────────────────────────────────
function draw(){
  // Fondo espacial
  ctx.fillStyle="#000005";
  ctx.fillRect(0,0,W,H);

  // Nebulosas
  const nebGrad=ctx.createRadialGradient(W*0.3,H*0.3,0,W*0.3,H*0.3,200);
  nebGrad.addColorStop(0,"rgba(0,50,100,0.06)");
  nebGrad.addColorStop(1,"transparent");
  ctx.fillStyle=nebGrad; ctx.fillRect(0,0,W,H);
  const nebGrad2=ctx.createRadialGradient(W*0.7,H*0.7,0,W*0.7,H*0.7,150);
  nebGrad2.addColorStop(0,"rgba(80,0,80,0.05)");
  nebGrad2.addColorStop(1,"transparent");
  ctx.fillStyle=nebGrad2; ctx.fillRect(0,0,W,H);

  // Estrellas con parallax
  stars.forEach(s=>{
    const twinkle=0.4+Math.sin(frameCount*0.03+s.x)*0.3*(s.brightness>0.7?1:0.3);
    ctx.globalAlpha=twinkle;
    ctx.fillStyle=s.brightness>0.8?"#aaddff":s.brightness>0.5?"#ffffff":"#445566";
    ctx.fillRect(s.x,s.y,s.s,s.s);
  });
  ctx.globalAlpha=1;

  // Partículas
  particles.forEach(p=>{
    ctx.globalAlpha=Math.max(0,p.life);
    if(p.type==="line"){
      ctx.strokeStyle=p.color; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(p.x,p.y);
      ctx.lineTo(p.x+Math.cos(p.angle)*p.len*p.life,p.y+Math.sin(p.angle)*p.len*p.life);
      ctx.stroke();
    } else {
      ctx.fillStyle=p.color;
      ctx.shadowColor=p.color; ctx.shadowBlur=6;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
    }
  });
  ctx.globalAlpha=1;

  // Power-ups
  powerups.forEach(p=>{
    const pulse=0.8+Math.sin((p.t||0)*0.15)*0.2;
    ctx.save();
    ctx.translate(p.x+12,p.y+12);
    ctx.scale(pulse,pulse);
    ctx.fillStyle=p.color+"33";
    ctx.strokeStyle=p.color;
    ctx.lineWidth=2;
    ctx.shadowColor=p.color; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.roundRect(-12,-12,24,24,6); ctx.fill(); ctx.stroke();
    ctx.shadowBlur=0;
    ctx.font="14px serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(p.icon,0,0);
    ctx.restore();
  });

  // Enemigos
  enemies.forEach(e=>{
    const flash=e.hitTimer>0&&Math.floor(e.hitTimer/4)%2===0;
    if(e.hitTimer>0) e.hitTimer-=1;
    ctx.shadowColor=e.color; ctx.shadowBlur=10;
    drawEnemy(e,flash);
    ctx.shadowBlur=0;
    // Barra de vida para tanques
    if(e.maxHp>1){
      ctx.fillStyle="#333";
      ctx.fillRect(e.x,e.y-8,e.w,4);
      ctx.fillStyle=e.color;
      ctx.fillRect(e.x,e.y-8,e.w*(e.hp/e.maxHp),4);
    }
  });

  // Balas
  bullets.forEach(b=>{
    ctx.fillStyle=b.color;
    ctx.shadowColor=b.color; ctx.shadowBlur=b.owner==="p"?10:6;
    ctx.beginPath();
    if(b.owner==="p"){ ctx.ellipse(b.x,b.y,b.r/2,b.r,0,0,Math.PI*2); }
    else { ctx.arc(b.x,b.y,b.r,0,Math.PI*2); }
    ctx.fill();
    ctx.shadowBlur=0;
  });

  // Jugador
  drawPlayer();

  // HUD overlay
  ctx.font="bold 11px 'Courier New'";
  ctx.fillStyle="rgba(57,255,20,0.4)";
  ctx.textAlign="left";
  ctx.fillText(`MEJOR: ${getBest()}`,8,16);
  if(!specialReady){
    ctx.textAlign="right";
    ctx.fillStyle="rgba(255,255,255,0.3)";
    ctx.fillText(`ESPECIAL: ${Math.ceil(specialTimer/60)}s`,W-8,16);
  }
  ctx.textAlign="left";
}

function drawPlayer(){
  const x=player.x,y=player.y,w=player.w,h=player.h;
  const cx=x+w/2;
  const flash=player.hitTimer>0&&Math.floor(player.hitTimer/5)%2===0;
  if(flash){ ctx.globalAlpha=0.4; }

  // Motor thruster animado
  const thr=Math.sin(player.thrusterAnim*0.3)*3;
  ctx.fillStyle="#ff6600";
  ctx.shadowColor="#ff6600"; ctx.shadowBlur=15;
  ctx.beginPath(); ctx.ellipse(cx-8,y+h+4,3,4+thr,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+8,y+h+4,3,4+thr,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="#ffe600";
  ctx.beginPath(); ctx.ellipse(cx,y+h+2,4,6+thr*1.5,0,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;

  // Cuerpo principal de la nave
  ctx.fillStyle=flash?"#aaaaaa":"#2288ff";
  ctx.shadowColor="#2288ff"; ctx.shadowBlur=12;
  // Fuselaje
  ctx.beginPath();
  ctx.moveTo(cx,y); ctx.lineTo(cx+w/2,y+h); ctx.lineTo(cx-w/2,y+h); ctx.closePath(); ctx.fill();
  ctx.shadowBlur=0;

  // Detalles
  ctx.fillStyle="#88ccff";
  ctx.beginPath(); ctx.moveTo(cx,y+4); ctx.lineTo(cx+8,y+h-4); ctx.lineTo(cx-8,y+h-4); ctx.closePath(); ctx.fill();

  // Cabina / cockpit
  ctx.fillStyle="#00aaff";
  ctx.shadowColor="#00ffff"; ctx.shadowBlur=8;
  ctx.beginPath(); ctx.ellipse(cx,y+h*0.45,5,7,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="rgba(255,255,255,0.5)";
  ctx.beginPath(); ctx.ellipse(cx-1,y+h*0.4,2,3,0,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;

  // Alas
  ctx.fillStyle="#1166cc";
  ctx.beginPath(); ctx.moveTo(cx-w/2,y+h); ctx.lineTo(cx-w/2-8,y+h+4); ctx.lineTo(cx-8,y+h-2); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(cx+w/2,y+h); ctx.lineTo(cx+w/2+8,y+h+4); ctx.lineTo(cx+8,y+h-2); ctx.closePath(); ctx.fill();

  // Cañones
  ctx.fillStyle="#aaaaff";
  ctx.fillRect(cx-14,y+h*0.5,4,10);
  ctx.fillRect(cx+10,y+h*0.5,4,10);

  // Escudo visual
  if(shieldActive){
    ctx.strokeStyle="#39ff14";
    ctx.lineWidth=2;
    ctx.shadowColor="#39ff14"; ctx.shadowBlur=15;
    ctx.globalAlpha=0.5+Math.sin(frameCount*0.1)*0.3;
    ctx.beginPath(); ctx.ellipse(cx,y+h/2,w/2+8,h/2+10,0,0,Math.PI*2); ctx.stroke();
    ctx.shadowBlur=0;
    ctx.globalAlpha=1;
  }

  ctx.globalAlpha=1;
}

function drawEnemy(e, flash){
  const cx=e.x+e.w/2, cy=e.y+e.h/2;
  const col=flash?"#ffffff":e.color;
  const col2=flash?"#ffffff":e.color2;

  if(e.type==="basic"){
    ctx.fillStyle=col;
    ctx.beginPath(); ctx.moveTo(cx,e.y+e.h); ctx.lineTo(e.x,e.y); ctx.lineTo(e.x+e.w,e.y); ctx.closePath(); ctx.fill();
    ctx.fillStyle=col2;
    ctx.beginPath(); ctx.ellipse(cx,cy+2,5,4,0,0,Math.PI*2); ctx.fill();
  } else if(e.type==="fast"){
    ctx.fillStyle=col;
    ctx.beginPath(); ctx.moveTo(cx,e.y+e.h); ctx.lineTo(e.x+3,e.y); ctx.lineTo(e.x+e.w-3,e.y); ctx.closePath(); ctx.fill();
    // Rastro de velocidad
    ctx.fillStyle=col+"88";
    ctx.beginPath(); ctx.moveTo(cx,e.y+e.h+8); ctx.lineTo(cx-4,e.y+e.h); ctx.lineTo(cx+4,e.y+e.h); ctx.closePath(); ctx.fill();
  } else if(e.type==="tank"){
    ctx.fillStyle=col;
    ctx.beginPath(); ctx.roundRect(e.x,e.y,e.w,e.h,4); ctx.fill();
    ctx.fillStyle=col2;
    ctx.beginPath(); ctx.roundRect(e.x+4,e.y+4,e.w-8,e.h-8,3); ctx.fill();
    ctx.fillStyle=col;
    ctx.fillRect(cx-3,cy-2,6,10);
  } else if(e.type==="zigzag"){
    ctx.fillStyle=col;
    ctx.beginPath();
    ctx.moveTo(cx,e.y); ctx.lineTo(e.x+e.w,cy); ctx.lineTo(cx,e.y+e.h); ctx.lineTo(e.x,cy); ctx.closePath(); ctx.fill();
    ctx.fillStyle="rgba(0,255,255,0.5)";
    ctx.beginPath(); ctx.arc(cx,cy,4,0,Math.PI*2); ctx.fill();
  } else if(e.type==="bomber"){
    ctx.fillStyle=col;
    ctx.beginPath(); ctx.ellipse(cx,cy,e.w/2,e.h/2,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=col2;
    ctx.beginPath(); ctx.ellipse(cx,cy,e.w/4,e.h/4,0,0,Math.PI*2); ctx.fill();
    // Bomba
    const blink=Math.sin(frameCount*0.2)>0;
    if(blink){ ctx.fillStyle="#ff0000"; ctx.beginPath(); ctx.arc(cx,cy+2,3,0,Math.PI*2); ctx.fill(); }
  }
}

// ── Controles ─────────────────────────────────────────────────────────────
document.addEventListener("keydown",e=>{
  keys[e.key]=true;
  if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," ","Shift"].includes(e.key)) e.preventDefault();
});
document.addEventListener("keyup",e=>{ keys[e.key]=false; });

// Touch mobile
let touchData={};
C.addEventListener("touchstart",e=>{
  [...e.touches].forEach(t=>{ touchData[t.identifier]={x:t.clientX,y:t.clientY,startX:t.clientX}; });
},{passive:true});
C.addEventListener("touchmove",e=>{
  [...e.touches].forEach(t=>{
    if(!touchData[t.identifier]) return;
    const dx=t.clientX-touchData[t.identifier].x;
    const dy=t.clientY-touchData[t.identifier].y;
    if(Math.abs(dx)>Math.abs(dy)){
      keys["ArrowLeft"]=dx<-5; keys["ArrowRight"]=dx>5;
      keys["ArrowUp"]=false; keys["ArrowDown"]=false;
    } else {
      keys["ArrowUp"]=dy<-5; keys["ArrowDown"]=dy>5;
      keys["ArrowLeft"]=false; keys["ArrowRight"]=false;
    }
    touchData[t.identifier].x=t.clientX; touchData[t.identifier].y=t.clientY;
  });
  keys[" "]=true;
},{passive:true});
C.addEventListener("touchend",e=>{
  [...e.changedTouches].forEach(t=>delete touchData[t.identifier]);
  if(Object.keys(touchData).length===0){ keys[" "]=false; keys["ArrowLeft"]=keys["ArrowRight"]=keys["ArrowUp"]=keys["ArrowDown"]=false; }
},{passive:true});

// Draw inicial
draw();

// Escuchar teclado desde página padre (fix foco iframe)
window.addEventListener("message", e => {
  if(!e.data || e.data.type !== "keydown") return;
  document.dispatchEvent(new KeyboardEvent("keydown", {key: e.data.key, code: e.data.code, bubbles: true}));
});
</script>
