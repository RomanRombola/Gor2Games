<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Color Flood</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a15;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Courier New',monospace;color:#f0f0f0;padding:10px;}
h1{color:#00ffcc;font-size:14px;letter-spacing:3px;margin-bottom:6px;}
#hud{display:flex;gap:18px;margin-bottom:8px;font-size:12px;color:#aaa;}
#hud b{color:#00ffcc;}
#board{display:grid;border:1px solid rgba(255,255,255,0.07);border-radius:6px;overflow:hidden;margin-bottom:10px;}
.cell{width:18px;height:18px;transition:background .15s;}
#palette{display:flex;gap:8px;justify-content:center;margin-bottom:8px;}
.pal-btn{width:36px;height:36px;border-radius:50%;border:3px solid rgba(255,255,255,0.1);cursor:pointer;transition:all .15s;}
.pal-btn:hover,.pal-btn.active{border-color:#fff;transform:scale(1.2);}
#msg{font-size:13px;color:#aaa;text-align:center;height:18px;}
.btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#aaa;font-family:'Courier New',monospace;font-size:11px;padding:7px 18px;border-radius:8px;cursor:pointer;letter-spacing:1px;margin-top:4px;transition:all .2s;}
.btn:hover{border-color:#00ffcc;color:#00ffcc;}
</style>
</head>
<body>
<h1>🌊 COLOR FLOOD</h1>
<div id="hud">
  <span>MOVES <b id="moves">0</b>/<b id="maxm">25</b></span>
  <span>NIVEL <b id="lvl">1</b></span>
  <span>MEJOR <b id="best">-</b></span>
</div>
<div id="board"></div>
<div id="palette"></div>
<div id="msg">Elegí un color para inundar desde la esquina</div>
<button class="btn" onclick="newGame()">🔄 NUEVO</button>

<script>
const GRID=14,COLORS=['#ff3366','#ff6600','#ffe600','#39ff14','#00aaff','#a855f7'];
let grid=[],moves,maxMoves,level=1,best={},gameOver=false;

function newGame(){
  const size=GRID;
  maxMoves=22+Math.floor(level*1.5);
  document.getElementById('maxm').textContent=maxMoves;
  document.getElementById('lvl').textContent=level;
  moves=0;gameOver=false;
  document.getElementById('moves').textContent=0;
  document.getElementById('msg').textContent='Elegí un color para inundar desde la esquina';
  // Generar grilla aleatoria
  grid=Array.from({length:size},()=>Array.from({length:size},()=>Math.floor(Math.random()*COLORS.length)));
  renderBoard();renderPalette();
}

function renderBoard(){
  const b=document.getElementById('board');
  b.style.gridTemplateColumns=`repeat(${GRID},18px)`;
  b.innerHTML=grid.flat().map((c,i)=>`<div class="cell" style="background:${COLORS[c]}" data-i="${i}"></div>`).join('');
}

function renderPalette(){
  const p=document.getElementById('palette');
  p.innerHTML=COLORS.map((c,i)=>`<div class="pal-btn" style="background:${c}" onclick="flood(${i})"></div>`).join('');
}

function flood(colorIdx){
  if(gameOver) return;
  const curColor=grid[0][0];
  if(colorIdx===curColor) return;
  // BFS flood fill desde (0,0)
  const visited=Array.from({length:GRID},()=>new Array(GRID).fill(false));
  const queue=[[0,0]];visited[0][0]=true;
  while(queue.length){
    const [r,c]=queue.shift();
    grid[r][c]=colorIdx;
    [[r-1,c],[r+1,c],[r,c-1],[r,c+1]].forEach(([nr,nc])=>{
      if(nr>=0&&nr<GRID&&nc>=0&&nc<GRID&&!visited[nr][nc]&&grid[nr][nc]===curColor){
        visited[nr][nc]=true;queue.push([nr,nc]);
      }
    });
  }
  moves++;document.getElementById('moves').textContent=moves;
  renderBoard();
  // Highlight color activo
  document.querySelectorAll('.pal-btn')[colorIdx].classList.add('active');
  setTimeout(()=>document.querySelectorAll('.pal-btn').forEach(b=>b.classList.remove('active')),200);
  // Verificar victoria
  if(grid.flat().every(c=>c===colorIdx)){
    gameOver=true;
    document.getElementById('msg').textContent=`🏆 COMPLETADO en ${moves} movimientos!`;
    if(!best[level]||moves<best[level]){best[level]=moves;document.getElementById('best').textContent=moves;}
    setTimeout(()=>{level++;newGame();},1500);
    return;
  }
  // Verificar derrota
  if(moves>=maxMoves){
    gameOver=true;
    document.getElementById('msg').textContent='❌ Sin movimientos — Nivel reiniciado';
    setTimeout(()=>{newGame();},1200);
  }
}

newGame();
</script>
</body>
</html>
